name: deploy

on:
  # Via workflow_call, called from ci.yaml
  workflow_call:
    inputs:
      image:
        description: "Image and tag to potentially deploy. Current branch will be validated against should-deploy check."
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true
      FLY_PARIS_CODER_PROXY_SESSION_TOKEN:
        required: true
      FLY_SYDNEY_CODER_PROXY_SESSION_TOKEN:
        required: true
      FLY_SAO_PAULO_CODER_PROXY_SESSION_TOKEN:
        required: true
      FLY_JNB_CODER_PROXY_SESSION_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }} # no per-branch concurrency
  cancel-in-progress: false

jobs:
  # Determines if the given branch should be deployed to dogfood,
  # and which channel it maps to.
  should-deploy:
    name: should-deploy
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.check.outputs.verdict }}
      channel: ${{ steps.check.outputs.channel }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if deploy is enabled
        id: check
        run: |
          set -euo pipefail
          result="$(./scripts/should_deploy.sh)"
          if [[ "$result" == NOOP ]]; then
            echo "verdict=NOOP" >> "$GITHUB_OUTPUT"
            echo "channel=" >> "$GITHUB_OUTPUT"
          else
            # Output is "DEPLOY <channel>"
            channel="${result#DEPLOY }"
            echo "verdict=DEPLOY" >> "$GITHUB_OUTPUT"
            echo "channel=$channel" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: "deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: should-deploy
    if: needs.should-deploy.outputs.verdict == 'DEPLOY'
    permissions:
      contents: read
      id-token: write # to authenticate to EKS cluster
      packages: write # to retag image
    env:
      CHANNEL: ${{ needs.should-deploy.outputs.channel }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set deploy parameters
        id: params
        run: |
          set -euo pipefail
          channel="$CHANNEL"
          if [[ "$channel" == "dogfood" ]]; then
            echo "namespace=coder" >> "$GITHUB_OUTPUT"
            echo "image_tag=dogfood" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=coder-${channel}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${channel}" >> "$GITHUB_OUTPUT"
          fi

      - name: GHCR Login
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_DOGFOOD_DEPLOY_ROLE }}
          aws-region: ${{ vars.AWS_DOGFOOD_DEPLOY_REGION }}

      - name: Get Cluster Credentials
        run: aws eks update-kubeconfig --name "$AWS_DOGFOOD_CLUSTER_NAME" --region "$AWS_DOGFOOD_DEPLOY_REGION"
        env:
          AWS_DOGFOOD_CLUSTER_NAME: ${{ vars.AWS_DOGFOOD_CLUSTER_NAME }}
          AWS_DOGFOOD_DEPLOY_REGION: ${{ vars.AWS_DOGFOOD_DEPLOY_REGION }}

      - name: Set up Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3
        with:
          # Keep this and the github action up to date with the version of flux installed in dogfood cluster
          version: "2.8.2"

      # Retag image with the channel name while maintaining the
      # multi-arch manifest. For dogfood this produces :dogfood, for
      # release channels it produces :mainline, :stable, or :esr.
      - name: Tag image for channel
        run: docker buildx imagetools create --tag "ghcr.io/coder/coder-preview:$IMAGE_TAG" "$IMAGE"
        env:
          IMAGE: ${{ inputs.image }}
          IMAGE_TAG: ${{ steps.params.outputs.image_tag }}

      - name: Reconcile Flux
        run: |
          set -euxo pipefail
          ns="${NAMESPACE}"

          flux --namespace flux-system reconcile source git flux-system
          flux --namespace flux-system reconcile source git coder-main
          flux --namespace flux-system reconcile kustomization flux-system
          flux --namespace flux-system reconcile kustomization "${ns}"

          # Flux auto-generates HelmChart sources named
          # <namespace>-<helmrelease>. For dogfood the namespace is
          # "coder", for release channels it is "coder-<channel>".
          flux --namespace flux-system reconcile source chart "${ns}-coder"
          flux --namespace flux-system reconcile source chart "${ns}-coder-provisioner"
          flux --namespace "${ns}" reconcile helmrelease coder
          flux --namespace "${ns}" reconcile helmrelease coder-provisioner

          # Dogfood has additional tagged provisioner variants that
          # release channels do not use.
          if [[ "$CHANNEL" == "dogfood" ]]; then
            flux --namespace "${ns}" reconcile helmrelease coder-provisioner-tagged
            flux --namespace "${ns}" reconcile helmrelease coder-provisioner-tagged-prebuilds
          fi
        env:
          NAMESPACE: ${{ steps.params.outputs.namespace }}

      # Just updating Flux is usually not enough. The Helm release may get
      # redeployed, but unless something causes the Deployment to update the
      # pods won't be recreated. It's important that the pods get recreated,
      # since we use `imagePullPolicy: Always` to ensure we're running the
      # latest image.
      - name: Rollout Deployment
        run: |
          set -euxo pipefail
          ns="${NAMESPACE}"

          kubectl --namespace "${ns}" rollout restart deployment/coder
          kubectl --namespace "${ns}" rollout status deployment/coder
          kubectl --namespace "${ns}" rollout restart deployment/coder-provisioner
          kubectl --namespace "${ns}" rollout status deployment/coder-provisioner

          # Dogfood has additional tagged provisioner variants.
          if [[ "$CHANNEL" == "dogfood" ]]; then
            kubectl --namespace "${ns}" rollout restart deployment/coder-provisioner-tagged
            kubectl --namespace "${ns}" rollout status deployment/coder-provisioner-tagged
            kubectl --namespace "${ns}" rollout restart deployment/coder-provisioner-tagged-prebuilds
            kubectl --namespace "${ns}" rollout status deployment/coder-provisioner-tagged-prebuilds
          fi
        env:
          NAMESPACE: ${{ steps.params.outputs.namespace }}

  # Workspace proxies are only deployed for the dogfood channel
  # (dev.coder.com). Release channels do not use workspace proxies.
  deploy-wsproxies:
    runs-on: ubuntu-latest
    needs:
      - should-deploy
      - deploy
    if: needs.should-deploy.outputs.channel == 'dogfood'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Deploy workspace proxies
        run: |
          flyctl deploy --image "$IMAGE" --app paris-coder --config ./.github/fly-wsproxies/paris-coder.toml --env "CODER_PROXY_SESSION_TOKEN=$TOKEN_PARIS" --yes
          flyctl deploy --image "$IMAGE" --app sydney-coder --config ./.github/fly-wsproxies/sydney-coder.toml --env "CODER_PROXY_SESSION_TOKEN=$TOKEN_SYDNEY" --yes
          flyctl deploy --image "$IMAGE" --app jnb-coder --config ./.github/fly-wsproxies/jnb-coder.toml --env "CODER_PROXY_SESSION_TOKEN=$TOKEN_JNB" --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE: ${{ inputs.image }}
          TOKEN_PARIS: ${{ secrets.FLY_PARIS_CODER_PROXY_SESSION_TOKEN }}
          TOKEN_SYDNEY: ${{ secrets.FLY_SYDNEY_CODER_PROXY_SESSION_TOKEN }}
          TOKEN_JNB: ${{ secrets.FLY_JNB_CODER_PROXY_SESSION_TOKEN }}
