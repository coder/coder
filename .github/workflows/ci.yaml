name: ci

on:
  push:
    branches:
      - main
      - release/*

  # GitHub Actions does not reliably trigger push-based CI when a new
  # branch is created at a commit that already has a workflow run (e.g.
  # from main). The create event fires separately and ensures CI runs
  # on newly cut release branches. Non-release branch creations are
  # filtered out by the changes job condition.
  create:

  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for pull requests when developers push
# additional changes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    # For create events, only run on release branches to avoid
    # triggering CI for every feature branch creation.
    if: |
      github.event_name != 'create' || (
        github.event.ref_type == 'branch' &&
        startsWith(github.event.ref, 'release/')
      )
    outputs:
      docs-only: ${{ steps.filter.outputs.docs_count == steps.filter.outputs.all_count }}
      docs: ${{ steps.filter.outputs.docs }}
      go: ${{ steps.filter.outputs.go }}
      site: ${{ steps.filter.outputs.site }}
      k8s: ${{ steps.filter.outputs.k8s }}
      ci: ${{ steps.filter.outputs.ci }}
      db: ${{ steps.filter.outputs.db }}
      gomod: ${{ steps.filter.outputs.gomod }}
      offlinedocs-only: ${{ steps.filter.outputs.offlinedocs_count == steps.filter.outputs.all_count }}
      offlinedocs: ${{ steps.filter.outputs.offlinedocs }}
      tailnet-integration: ${{ steps.filter.outputs.tailnet-integration }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: check changed files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            all:
              - "**"
            docs:
              - "docs/**"
              - ".claude/docs/**"
              - "*.md"
              - "examples/web-server/**"
              - "examples/monitoring/**"
              - "examples/lima/**"
            db:
              - "**.sql"
              - "coderd/database/**"
            go:
              - "**.sql"
              - "**.go"
              - "**.golden"
              - "go.mod"
              - "go.sum"
              # Other non-Go files that may affect Go code:
              - "**.rego"
              - "**.sh"
              - "**.tpl"
              - "**.gotmpl"
              - "**.gotpl"
              - "Makefile"
              - "site/static/error.html"
              # Icon and theme files tested by Go (scripts/gensite):
              - "site/static/icon/**"
              - "site/src/theme/**"
              # Main repo directories for completeness in case other files are
              # touched:
              - "agent/**"
              - "aibridge/**"
              - "cli/**"
              - "cmd/**"
              - "coderd/**"
              - "enterprise/**"
              - "examples/**"
              - "helm/**"
              - "provisioner/**"
              - "provisionerd/**"
              - "provisionersdk/**"
              - "pty/**"
              - "scaletest/**"
              - "tailnet/**"
              - "testutil/**"
            gomod:
              - "go.mod"
              - "go.sum"
            site:
              - "site/**"
            k8s:
              - "helm/**"
              - "scripts/Dockerfile"
              - "scripts/Dockerfile.base"
              - "scripts/helm.sh"
            ci:
              - ".github/actions/**"
              - ".github/workflows/**"
            offlinedocs:
              - "offlinedocs/**"
            tailnet-integration:
              - "tailnet/**"
              - "go.mod"
              - "go.sum"

      - id: debug
        run: |
          echo "$FILTER_JSON"
        env:
          FILTER_JSON: ${{ toJSON(steps.filter.outputs) }}

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up mise tools
        uses: ./.github/actions/setup-mise
        with:
          install-args: "node pnpm"

      - name: Install pnpm dependencies
        uses: ./.github/actions/pnpm-install

      - name: Check docs
        run: pnpm check-docs

      # Vale prose linter, advisory only. Scoped to changed Markdown under
      # docs/. Every Vale step is `continue-on-error` so this section can
      # never block the required `lint-docs` job: a `vale sync` network
      # blip or a baseline rule violation surfaces as an annotation, not a
      # merge gate. Only markdownlint/table-formatter above stay blocking.
      # `vale --no-exit` additionally keeps the baseline error count from
      # un-overridden upstream Google rules from failing the step. Lives
      # here rather than a standalone workflow so docs lint stays in the
      # single required CI umbrella (see #25608). See DOCS-40.
      - name: Detect changed Markdown
        id: changed-md
        continue-on-error: true
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        with:
          files: |
            **.md
          separator: ","

      # `**.md` (not `docs/**.md`) because the action's globber collapses a
      # `**` adjacent to `.md` to a single path segment, so `docs/**.md`
      # only matches top-level docs/*.md and misses nested pages such as
      # docs/.style/style-guide/README.md. The prose step below re-filters to
      # docs/ paths.
      # Cache split into restore + conditional save to avoid letting PR
      # runs populate a cache that other branches restore from (the
      # zizmor `cache-poisoning` concern). Only pushes to the default
      # branch may write the cache; PRs may only read it.
      - name: Restore Vale styles
        id: vale-cache
        if: steps.changed-md.outputs.any_changed == 'true'
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Negation excludes the hand-authored Coder rules from the cache;
          # the key also hashes them so a rule change always invalidates it.
          # mise manages the Vale binary, so only the synced styles cache.
          path: |
            docs/.style/styles/*
            !docs/.style/styles/Coder
            docs/.style/.vale-synced
          key: vale-${{ hashFiles('.vale.ini', 'mise.toml', 'docs/.style/styles/Coder/**') }}
          restore-keys: |
            vale-

      - name: Prepare Vale styles
        if: steps.changed-md.outputs.any_changed == 'true'
        continue-on-error: true
        env:
          # Non-interactive: let mise auto-install the pinned Vale on first use.
          MISE_YES: "1"
        run: make docs/.style/.vale-synced

      - name: Vale prose lint
        if: steps.changed-md.outputs.any_changed == 'true'
        continue-on-error: true
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}
          # Non-interactive: let mise auto-install the pinned Vale on first use.
          MISE_YES: "1"
        run: |
          # all_changed_files is ACMRD and so lists paths this PR deleted.
          # Vale errors on a missing file (--no-exit only suppresses alert
          # exits, not runtime errors), so keep only docs/ paths still on
          # disk. See DOCS-40.
          files=$(printf '%s\n' "$ALL_CHANGED_FILES" \
            | tr ',' '\n' \
            | grep -E '^docs/' \
            | while IFS= read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done || true)
          if [ -z "$files" ]; then
            echo "No changed Markdown files under docs/ on disk; skipping Vale."
            exit 0
          fi
          # Vale's --output=line strips per-finding severity, so the
          # previous problem-matcher approach collapsed every finding to
          # a single hard-coded severity. Use --output=JSON instead and
          # emit GitHub workflow commands directly so error/warning/
          # suggestion render with their actual Vale severities. URL-
          # encode message bodies for `%`, `\r`, and `\n` per the
          # GitHub Actions workflow command spec. See DOCS-426.
          printf '%s\n' "$files" \
            | xargs -d '\n' mise exec "aqua:errata-ai/vale" -- vale --no-exit --output=JSON \
            | jq -r '
                to_entries[]
                | .key as $file
                | .value[]
                | (if .Severity == "suggestion" then "notice"
                   elif .Severity == "warning" then "warning"
                   else "error" end) as $level
                | (.Message | gsub("%"; "%25") | gsub("\r"; "%0D") | gsub("\n"; "%0A")) as $msg
                | "::\($level) file=\($file),line=\(.Line),col=\(.Span[0]),title=\(.Check)::\($msg)"
              '

      - name: Save Vale styles
        # Only the default branch is trusted to write the cache, so PR
        # runs cannot poison the cache that subsequent runs restore from.
        # Skip when the cache already had an exact key hit (no new content).
        if: github.ref == 'refs/heads/main' && steps.changed-md.outputs.any_changed == 'true' && steps.vale-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            docs/.style/styles/*
            !docs/.style/styles/Coder
            docs/.style/.vale-synced
          key: ${{ steps.vale-cache.outputs.cache-primary-key }}

  # Disabled due to instability. See: https://github.com/coder/coder/issues/14553
  # Re-enable once the flake hash calculation is stable.
  # update-flake:
  #   needs: changes
  #   if: needs.changes.outputs.gomod == 'true'
  #   runs-on: ${{ github.repository_owner == 'coder' && 'depot-ubuntu-22.04-8' || 'ubuntu-latest' }}
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  #       with:
  #         fetch-depth: 1
  #         # See: https://github.com/stefanzweifel/git-auto-commit-action?tab=readme-ov-file#commits-made-by-this-action-do-not-trigger-new-workflow-runs
  #         token: ${{ secrets.CDRCI_GITHUB_TOKEN }}

  #     - name: Set up mise tools
  #       uses: ./.github/actions/setup-mise
  #       with:
  #         install-args: "go"

  #     - name: Update Nix Flake SRI Hash
  #       run: ./scripts/update-flake.sh

  #     # auto update flake for dependabot
