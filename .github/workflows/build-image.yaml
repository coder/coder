# Build and push the Coder Docker image (for Helm) without requiring build-dylib or
# the full main CI. Uses your fork's Dockerfile.base (Terraform 1.11.5).
#
# Triggers: push to main, or "Run workflow" from the Actions tab.
# Image: ghcr.io/<owner>/coder:main (and :<version>, :latest)

name: build-image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build site (frontend)
        run: |
          cd site && pnpm build

      - name: Build Linux amd64 binary
        run: |
          version="$(./scripts/version.sh)"
          ./scripts/build_go.sh \
            --os linux \
            --arch amd64 \
            --version "$version" \
            --output "build/coder_${version}_linux_amd64"

      - name: Build base and Coder Docker image
        id: build-docker
        env:
          CODER_IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/coder
        run: |
          set -euxo pipefail
          version="$(./scripts/version.sh)"
          echo "version=$version" >> "$GITHUB_ENV"
          tag="${version//+/-}"
          image_base="ghcr.io/${{ github.repository_owner }}/coder"
          base_tag="ghcr.io/${{ github.repository_owner }}/coder-base:${tag}"

          ./scripts/build_docker.sh \
            --arch amd64 \
            --target "${image_base}:${tag}" \
            --version "$version" \
            --build-base "$base_tag" \
            "build/coder_${version}_linux_amd64"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=${image_base}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          version="$(./scripts/version.sh)"
          tag="${version//+/-}"
          image_base="ghcr.io/${{ github.repository_owner }}/coder"
          # Push version tag
          docker push "${image_base}:${tag}"
          # Push main and latest for convenience
          docker tag "${image_base}:${tag}" "${image_base}:main"
          docker tag "${image_base}:${tag}" "${image_base}:latest"
          docker push "${image_base}:main"
          docker push "${image_base}:latest"

      - name: Summary
        run: |
          version="$(./scripts/version.sh)"
          tag="${version//+/-}"
          image_base="ghcr.io/${{ github.repository_owner }}/coder"
          echo "## Coder image built and pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Use with Helm:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "helm upgrade coder <chart> -n <namespace> \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --set coder.image.repository=${image_base}" >> "$GITHUB_STEP_SUMMARY"
          echo "  --set coder.image.tag=main" >> "$GITHUB_STEP_SUMMARY"
          echo "  --set coder.image.pullPolicy=Always" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: \`${tag}\`, \`main\`, \`latest\`" >> "$GITHUB_STEP_SUMMARY"
