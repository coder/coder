name: Docs CI

on:
  push:
    branches:
      - main
    # Intentionally only matches doc content. Edits to this workflow file
    # alone would still trigger a run, but the `lint` and `fmt` steps gate
    # on `tj-actions/changed-files` matching `docs/**` or `**.md`, so the
    # job would no-op. The self-reference was wasted runner time. Removed
    # per DOCS-129.
    paths:
      - "docs/**"
      - "**.md"

  pull_request:
    paths:
      - "docs/**"
      - "**.md"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        id: changed-files
        with:
          files: |
            docs/**
            **.md
          separator: ","

      - name: lint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # shellcheck disable=SC2086
          pnpm exec markdownlint-cli2 $ALL_CHANGED_FILES
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

      - name: fmt
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # markdown-table-formatter requires a space separated list of files
          # shellcheck disable=SC2086
          echo $ALL_CHANGED_FILES | tr ',' '\n' | pnpm exec markdown-table-formatter --check
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
