name: Docs CI

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "**.md"
      - ".github/workflows/docs-ci.yaml"

  pull_request:
    paths:
      - "docs/**"
      - "**.md"
      - ".github/workflows/docs-ci.yaml"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      # Per-tool changed-files filters. Each tool gets its own `changed-*`
      # step scoped to the files it processes, keeping workflow-level `paths:`
      # broad. Adding a tool (e.g. image linter) only needs a new step pair.
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        id: changed-md
        with:
          files: |
            **.md
          separator: ","

      - name: lint
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          # `separator: ","` joins paths with commas, but markdownlint-cli2
          # takes files as argv. Split on the comma boundary with xargs (the
          # same shape `fmt` uses) so filenames containing spaces survive.
          echo "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' pnpm exec markdownlint-cli2
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}

      - name: fmt
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          # markdown-table-formatter reads newline-separated paths from stdin.
          echo "$ALL_CHANGED_FILES" | tr ',' '\n' | pnpm exec markdown-table-formatter --check
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}
