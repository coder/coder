name: Docs CI

on:
  push:
    branches:
      - main
    # Self-reference removed from both push and pull_request: the `lint`
    # and `fmt` steps gate on `tj-actions/changed-files` matching
    # `docs/**` or `**.md`, so a workflow-only edit produced an empty
    # run. `actionlint` and `make lint/actions` catch YAML problems
    # before merge regardless. See DOCS-129.
    paths:
      - "docs/**"
      - "**.md"

  pull_request:
    # Self-reference removed; see comment under `push:` above.
    paths:
      - "docs/**"
      - "**.md"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      # Per-tool changed-files filters. Each tool gets its own `changed-*`
      # step scoped to the files it processes, keeping workflow-level `paths:`
      # broad. Adding a tool (e.g. image linter) only needs a new step pair.
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        id: changed-md
        with:
          files: |
            **.md
          separator: ","

      # Both downstream tools take file paths as argv. `tj-actions/changed-files`
      # joins paths with `separator: ","`, which the shell does not split on, so
      # run the output through `tr ',' '\n' | xargs -d '\n'` to hand each path to
      # the tool as a distinct argument. This tolerates filenames containing
      # spaces and prevents silent fallbacks: `markdownlint-cli2` would treat a
      # comma-joined string as a single non-matching glob, and
      # `markdown-table-formatter` would fall back to scanning every `.md` in
      # the working tree when invoked with no positional args.
      #
      # `printf '%s\n'` is used instead of `echo` so a hypothetical leading
      # `-e` or `-n` in a path is treated as data, not a bash builtin flag.

      - name: lint
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          printf '%s\n' "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' pnpm exec markdownlint-cli2
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}

      - name: fmt
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          printf '%s\n' "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' pnpm exec markdown-table-formatter --check
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}

      # Vale's behavior on the next two steps:
      #
      # - `Prepare Vale styles` downloads the pinned Vale binary and runs
      #   `vale sync` to materialize the configured packages under
      #   StylesPath. This step has no `continue-on-error`: a download or
      #   sync failure should break the job.
      # - `prose` runs Vale against the changed-md set filtered to docs/
      #   paths only. We post-filter in shell rather than using a second
      #   tj-actions/changed-files step because the `docs/**.md` glob
      #   there silently skips dot-prefixed dirs (it would miss our own
      #   docs/.style/style-guide.md while still treating the top-level
      #   `**.md` filter as authoritative). The early exit handles PRs
      #   that only touched non-docs markdown like AGENTS.md or README.md.
      #   No second filter excludes docs/.style/styles/: synced upstream
      #   packages are gitignored (so changed-files never lists them) and
      #   tracked Coder/**.md files should go through Vale.
      #
      # The step uses `vale --no-exit` so the baseline error count from
      # un-overridden Google error-level rules does not fail CI, while
      # real failures (missing binary, bad config) still propagate. The
      # problem matcher at
      # `.github/vale-problem-matcher.json` parses `--output=line` output
      # and surfaces each alert as an inline PR annotation; remove the
      # matcher after the run so it does not leak into later steps.
      #
      # The cache below covers the synced upstream packages and the Vale
      # binary. Two layers of defense keep the hand-authored Coder rules
      # under docs/.style/styles/Coder safe from a stale cache:
      #
      #   1. The negation excludes docs/.style/styles/Coder from the
      #      cached paths. actions/cache negation can be unreliable
      #      (actions/toolkit#713, actions/cache#494) when patterns mix
      #      directory levels, but works here because both patterns sit
      #      directly under docs/.style/styles/.
      #   2. The cache key includes a hash of docs/.style/styles/Coder/**,
      #      so any rule change invalidates the cache even if a future
      #      cache release regresses the negation behavior. The key also
      #      hashes .vale.ini and mise.toml: either change forces a fresh
      #      `vale sync` and a fresh binary download.
      - name: Cache Vale styles and binary
        if: steps.changed-md.outputs.any_changed == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            docs/.style/styles/*
            !docs/.style/styles/Coder
            docs/.style/.vale-synced
            build/vale-*
          key: vale-${{ hashFiles('.vale.ini', 'mise.toml', 'docs/.style/styles/Coder/**') }}

      - name: Prepare Vale styles
        if: steps.changed-md.outputs.any_changed == 'true'
        run: make docs/.style/.vale-synced

      - name: prose
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          files=$(printf '%s\n' "$ALL_CHANGED_FILES" \
            | tr ',' '\n' \
            | grep -E '^docs/' || true)
          if [ -z "$files" ]; then
            echo "No changed Markdown files under docs/; skipping Vale."
            exit 0
          fi
          vale=$(find build/ -maxdepth 1 -name 'vale-*' -type f -print -quit)
          echo "::add-matcher::.github/vale-problem-matcher.json"
          printf '%s\n' "$files" | xargs -d '\n' "$vale" --no-exit --output=line
          echo "::remove-matcher owner=vale::"
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}
