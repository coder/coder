name: Docs CI

on:
  push:
    branches:
      - main
    # Self-reference removed from both push and pull_request: the `lint`
    # and `fmt` steps gate on `tj-actions/changed-files` matching
    # `docs/**` or `**.md`, so a workflow-only edit produced an empty
    # run. `actionlint` and `make lint/actions` catch YAML problems
    # before merge regardless. See DOCS-129.
    paths:
      - "docs/**"
      - "**.md"

  pull_request:
    # Self-reference removed; see comment under `push:` above.
    paths:
      - "docs/**"
      - "**.md"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      # Per-tool changed-files filters. Each tool gets its own `changed-*`
      # step scoped to the files it processes, keeping workflow-level `paths:`
      # broad. Adding a tool (e.g. image linter) only needs a new step pair.
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        id: changed-md
        with:
          files: |
            **.md
          separator: ","

      # Both downstream tools take file paths as argv. `tj-actions/changed-files`
      # joins paths with `separator: ","`, which the shell does not split on, so
      # run the output through `tr ',' '\n' | xargs -d '\n'` to hand each path to
      # the tool as a distinct argument. This tolerates filenames containing
      # spaces and prevents silent fallbacks: `markdownlint-cli2` would treat a
      # comma-joined string as a single non-matching glob, and
      # `markdown-table-formatter` would fall back to scanning every `.md` in
      # the working tree when invoked with no positional args.
      #
      # `printf '%s\n'` is used instead of `echo` so a hypothetical leading
      # `-e` or `-n` in a path is treated as data, not a bash builtin flag.

      - name: lint
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          printf '%s\n' "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' pnpm exec markdownlint-cli2
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}

      - name: fmt
        if: steps.changed-md.outputs.any_changed == 'true'
        run: |
          printf '%s\n' "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' pnpm exec markdown-table-formatter --check
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md.outputs.all_changed_files }}

      # Separate changed-files filter for Vale prose linting. Vale's
      # .vale.ini only configures rules under docs/, so a repo-wide **.md
      # filter would feed Vale paths it has no opinions on. The
      # docs/.style/styles/** subtree holds the synced upstream packages
      # and must never go through Vale itself, so files_ignore strips them
      # before the path list reaches the step.
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v45.0.7
        id: changed-md-docs
        with:
          files: |
            docs/**.md
          files_ignore: |
            docs/.style/styles/**
          separator: ","

      # `make docs/.style/.vale-synced` downloads the pinned Vale binary
      # into build/ and runs `vale sync` so the configured packages exist
      # under StylesPath. The sync is idempotent across runs and gated by
      # an mtime sentinel that the cache below preserves between workflow
      # invocations.
      - name: Cache Vale styles and binary
        if: steps.changed-md-docs.outputs.any_changed == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            docs/.style/styles/Google
            docs/.style/styles/alex
            docs/.style/styles/write-good
            docs/.style/.vale-synced
            build/vale-*
          key: vale-${{ hashFiles('.vale.ini', 'mise.toml') }}

      # The prose step is non-blocking by design (continue-on-error: true).
      # v1 lands every rule at `warning`, which makes Vale exit non-zero
      # even on clean PRs that happen to touch many lines. Annotations
      # stay visible in the step log; promote rules to `error` (and drop
      # continue-on-error) once their existing-content violation count
      # reaches zero. See DOCS-40.
      - name: prose
        if: steps.changed-md-docs.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          make docs/.style/.vale-synced
          vale=$(find build/ -maxdepth 1 -name 'vale-*' -type f -print -quit)
          printf '%s\n' "$ALL_CHANGED_FILES" | tr ',' '\n' | xargs -d '\n' "$vale"
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-md-docs.outputs.all_changed_files }}
