dirs:
  - docs
excludedDirs:
  # Downstream bug in linkspector means large markdown files fail to parse
  # but these are autogenerated and shouldn't need checking
  - docs/reference
  # Older changelogs may contain broken links
  - docs/changelogs
  # Contributor-facing style guide and Vale config. Not deployed to
  # coder.com/docs; chasing external links here is overkill.
  - docs/.style
ignorePatterns:
  - pattern: "localhost"
  - pattern: "example.com"
  - pattern: "mailto:"
  - pattern: "127.0.0.1"
  - pattern: "0.0.0.0"
  - pattern: "JFROG_URL"
  - pattern: "coder.company.org"
  # These real sites were blocking the linkspector action / GitHub runner IPs(?)
  - pattern: "i.imgur.com"
  - pattern: "code.visualstudio.com"
  - pattern: "www.emacswiki.org"
  - pattern: "linux.die.net/man"
  - pattern: "www.gnu.org"
  - pattern: "wiki.ubuntu.com"
  - pattern: "mutagen.io"
  - pattern: "dotnet.microsoft.com"
  - pattern: "docs.github.com"
  - pattern: "claude.ai"
  - pattern: "splunk.com"
  - pattern: "stackoverflow.com/questions"
  - pattern: "developer.hashicorp.com/terraform/language"
  - pattern: "platform.openai.com"
  - pattern: "api.openai.com"
  - pattern: "openai.com"
  # merriam-webster.com returns 403 from GitHub runner IPs
  - pattern: "merriam-webster.com"
aliveStatusCodes:
  - 200
