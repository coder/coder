rules:
  dangerous-triggers:
    ignore:
      # Both workflows use pull_request_target intentionally: they need
      # write access to create backport/cherry-pick branches and PRs.
      # They only run after merge (merged == true) and do not check out
      # or execute untrusted PR code.
      - "backport.yaml"
      - "cherry-pick.yaml"
      # flake-bot triggers on `workflow_run` (ci completion) by design. It
      # only acts on main-push failures (or manual workflow_dispatch), checks
      # out the already-merged main commit, routes all untrusted event values
      # through env vars, and performs all writes with a least-privilege
      # GitHub App token rather than the workflow token.
      - "flake-bot.yaml"
