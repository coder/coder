version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    labels: []
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: "chore"
    labels: []
    open-pull-requests-limit: 15
    groups:
      x:
        patterns:
          - "golang.org/x/*"
    ignore:
      # Patch updates are handled by the security-patch-prs workflow so this
      # lane stays focused on broader dependency updates.
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
      - dependency-name: "github.com/mark3labs/mcp-go"

  # Update our Dockerfile.
  - package-ecosystem: "docker"
    directories:
      - "/dogfood/coder"
      - "/dogfood/coder-envbuilder"
      - "/scripts"
      - "/examples/templates/docker/build"
      - "/examples/parameters/build"
      - "/scaletest/templates/scaletest-runner"
      - "/scripts/ironbank"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: "chore"
    labels: []
    ignore:
      # We need to coordinate terraform updates with the version hardcoded in
      # our Go code. These are handled by the security-patch-prs workflow.
      - dependency-name: "terraform"

  - package-ecosystem: "npm"
    directories:
      - "/site"
      - "/offlinedocs"
      - "/scripts"
      - "/scripts/apidocgen"

    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels: []
    groups:
      xterm:
        patterns:
          - "@xterm*"
      mui:
        patterns:
          - "@mui*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      emotion:
        patterns:
          - "@emotion*"
        exclude-patterns:
          - "jest-runner-eslint"
      jest:
        patterns:
          - "jest"
          - "@types/jest"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/plugin-react"
    ignore:
      # Ignore major version updates to avoid breaking changes
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      - dependency-name: "@playwright/test"
    open-pull-requests-limit: 15

  - package-ecosystem: "terraform"
    directories:
      - "dogfood/*/"
      - "examples/templates/*/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels: []
    groups:
      coder-modules:
        patterns:
          - "coder/*/coder"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
