name: "Test Go with PostgreSQL"
description: "Run Go tests with PostgreSQL database"

inputs:
  postgres-version:
    description: "PostgreSQL version to use"
    required: false
    default: "13"
  test-parallelism-packages:
    description: "Number of packages to test in parallel (-p flag)"
    required: false
    default: "8"
  test-parallelism-tests:
    description: "Number of tests to run in parallel within each package (-parallel flag)"
    required: false
    default: "8"
  race-detection:
    description: "Enable race detection"
    required: false
    default: "false"
  test-count:
    description: "Number of times to run each test (empty for cached results)"
    required: false
    default: ""
  test-packages:
    description: "Packages to test (default: ./...)"
    required: false
    default: "./..."
  run-regex:
    description: "Go test name regex passed via RUN"
    required: false
    default: ""
  test-shuffle:
    description: "Go test shuffle mode passed via TEST_SHUFFLE"
    required: false
    default: ""
  gotestsum-json-file:
    description: "Optional Linux path for gotestsum --jsonfile output. Use default for RUNNER_TEMP/go-test.json."
    required: false
    default: ""
  embedded-pg-path:
    description: "Path for embedded postgres data (Windows/macOS only)"
    required: false
    default: ""
  embedded-pg-cache:
    description: "Path for embedded postgres cache (Windows/macOS only)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Start PostgreSQL Docker container (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        POSTGRES_VERSION: ${{ inputs.postgres-version }}
      run: make test-postgres-docker

    - name: Setup Embedded Postgres (macOS)
      if: runner.os == 'macOS'
      shell: bash
      env:
        POSTGRES_VERSION: ${{ inputs.postgres-version }}
        EMBEDDED_PG_PATH: ${{ inputs.embedded-pg-path }}
        EMBEDDED_PG_CACHE_DIR: ${{ inputs.embedded-pg-cache }}
      run: |
        go run scripts/embedded-pg/main.go -path "${EMBEDDED_PG_PATH}" -cache "${EMBEDDED_PG_CACHE_DIR}"

    - name: Setup Embedded Postgres (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        POSTGRES_VERSION: ${{ inputs.postgres-version }}
        EMBEDDED_PG_PATH: ${{ inputs.embedded-pg-path }}
        EMBEDDED_PG_CACHE_DIR: ${{ inputs.embedded-pg-cache }}
      run: |
        go run scripts/embedded-pg/main.go -path "$env:EMBEDDED_PG_PATH" -cache "$env:EMBEDDED_PG_CACHE_DIR"

    - name: Run tests
      if: runner.os != 'Windows'
      shell: bash
      env:
        TEST_NUM_PARALLEL_PACKAGES: ${{ inputs.test-parallelism-packages }}
        TEST_NUM_PARALLEL_TESTS: ${{ inputs.test-parallelism-tests }}
        TEST_COUNT: ${{ inputs.test-count }}
        RUN: ${{ inputs.run-regex }}
        TEST_SHUFFLE: ${{ inputs.test-shuffle }}
        TEST_PACKAGES: ${{ inputs.test-packages }}
        RACE_DETECTION: ${{ inputs.race-detection }}
        GOTESTSUM_JSONFILE_INPUT: ${{ inputs.gotestsum-json-file }}
        TS_DEBUG_DISCO: "true"
        TS_DEBUG_DERP: "true"
        LC_CTYPE: "en_US.UTF-8"
        LC_ALL: "en_US.UTF-8"
      run: |
        set -euo pipefail

        # gotestsum natively reads GOTESTSUM_JSONFILE; set it directly instead
        # of writing a PATH shim. "default" is the historical
        # ${RUNNER_TEMP}/go-test.json location consumed by
        # ./.github/actions/go-test-failure-report.
        if [[ -n "${GOTESTSUM_JSONFILE_INPUT}" ]]; then
          if [[ "${GOTESTSUM_JSONFILE_INPUT}" == "default" ]]; then
            export GOTESTSUM_JSONFILE="${RUNNER_TEMP}/go-test.json"
          else
            export GOTESTSUM_JSONFILE="${GOTESTSUM_JSONFILE_INPUT}"
          fi
        fi

        if [[ ${RACE_DETECTION} == true ]]; then
          make test-race
        else
          make test
        fi

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        TEST_NUM_PARALLEL_PACKAGES: ${{ inputs.test-parallelism-packages }}
        TEST_NUM_PARALLEL_TESTS: ${{ inputs.test-parallelism-tests }}
        TEST_COUNT: ${{ inputs.test-count }}
        RUN: ${{ inputs.run-regex }}
        TEST_SHUFFLE: ${{ inputs.test-shuffle }}
        TEST_PACKAGES: ${{ inputs.test-packages }}
        RACE_DETECTION: ${{ inputs.race-detection }}
        GOTESTSUM_JSONFILE_INPUT: ${{ inputs.gotestsum-json-file }}
        TS_DEBUG_DISCO: "true"
        TS_DEBUG_DERP: "true"
      run: |
        $ErrorActionPreference = "Stop"

        if ($env:GOTESTSUM_JSONFILE_INPUT) {
          if ($env:GOTESTSUM_JSONFILE_INPUT -eq "default") {
            $env:GOTESTSUM_JSONFILE = Join-Path $env:RUNNER_TEMP "go-test.json"
          } else {
            $env:GOTESTSUM_JSONFILE = $env:GOTESTSUM_JSONFILE_INPUT
          }
        }

        $emptyGitConfig = Join-Path $env:RUNNER_TEMP "empty-gitconfig"
        New-Item -ItemType File -Path $emptyGitConfig -Force | Out-Null
        $env:GIT_CONFIG_GLOBAL = $emptyGitConfig
        $env:GIT_CONFIG_SYSTEM = $emptyGitConfig

        $gotestsumArgs = @("--format", "standard-quiet")
        if ($env:RACE_DETECTION -eq "true") {
          $gotestsumArgs += "--junitfile=gotests.xml"
        }
        if ($env:TEST_RETRIES) {
          $gotestsumArgs += "--rerun-fails=$env:TEST_RETRIES"
        }
        $gotestsumArgs += "--packages=$env:TEST_PACKAGES"
        $gotestsumArgs += "--"

        $goTestArgs = @(
          "-tags=testsmallbatch",
          "-v",
          "-timeout", "20m",
          "-p", $env:TEST_NUM_PARALLEL_PACKAGES,
          "-parallel=$env:TEST_NUM_PARALLEL_TESTS"
        )
        if ($env:RACE_DETECTION -eq "true") {
          $goTestArgs += "-race"
        }
        if ($env:TEST_COUNT) {
          $goTestArgs += "-count=$env:TEST_COUNT"
        }
        if ($env:RUN) {
          $goTestArgs += @("-run", $env:RUN)
        }
        if ($env:TEST_SHUFFLE) {
          $goTestArgs += "-shuffle=$env:TEST_SHUFFLE"
        }

        $gotestsum = (mise which gotestsum).Trim()
        $envBlock = [Environment]::GetEnvironmentVariables()
        $process = [System.Diagnostics.ProcessStartInfo]::new()
        $process.FileName = $gotestsum
        $process.UseShellExecute = $false
        $process.WorkingDirectory = (Get-Location).ProviderPath
        $process.Environment.Clear()
        foreach ($entry in $envBlock.GetEnumerator()) {
          if ($entry.Key -ine "Path") {
            $process.Environment[$entry.Key] = [string]$entry.Value
          }
        }
        $process.Environment["Path"] = $env:Path
        foreach ($arg in ($gotestsumArgs + $goTestArgs)) {
          $process.ArgumentList.Add($arg) | Out-Null
        }

        $child = [System.Diagnostics.Process]::Start($process)
        $child.WaitForExit()
        exit $child.ExitCode
