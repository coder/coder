<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="diag-title diag-desc">
  <title id="diag-title">Cursor system-identity flow</title>
  <desc id="diag-desc">Placeholder diagram. Coder keeps a warm pool of bot-owned workspaces per repository. When a Cursor session is queued for a repo, Cursor's scheduler picks one and the worker serves it. When the worker drains the workspace is deleted and the reconciler queues a replacement.</desc>
  <style>
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
    .sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#a); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="box" x="40"  y="80"  width="240" height="80"/>
  <text class="title" x="60" y="115">Reconciler</text>
  <text class="sub"   x="60" y="135">Coder prebuilds (or daemon)</text>
  <rect class="box" x="380" y="40"  width="240" height="60"/>
  <text class="title" x="400" y="74">Warm workspace pool</text>
  <text class="sub"   x="400" y="92">N workspaces per repo, bot-owned</text>
  <rect class="box" x="380" y="140" width="240" height="60"/>
  <text class="title" x="400" y="174">Cursor scheduler</text>
  <text class="sub"   x="400" y="192">picks a free worker for the repo</text>
  <rect class="box" x="720" y="90"  width="240" height="60"/>
  <text class="title" x="740" y="124">Session served</text>
  <text class="sub"   x="740" y="142">activeBcId in fleet API</text>
  <path class="arrow" d="M280,110 L380,75"/>
  <path class="arrow" d="M620,170 L720,130"/>
  <path class="arrow" d="M620,75  L720,115"/>
  <path class="arrow" d="M820,150 C820,260 280,260 280,160" stroke-dasharray="4 4"/>
</svg>
