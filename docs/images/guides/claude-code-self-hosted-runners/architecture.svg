<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 820" width="1320" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">Claude Code self-hosted runners on Coder, architecture overview</title>
  <desc id="diagram-desc">A Coder workspace, owned by a Coder developer, runs Anthropic's Claude Code self-hosted runner as a long-lived process. The runner dials out to api.anthropic.com to register and poll for sessions. Each runner locks to the first Anthropic user whose session lands on it; in the basic flow that is the same human who owns the Coder workspace. The runner spawns one child Claude Code process per assigned session. The child carries a per-session JWT that names the session creator, which may differ from the locked user. Child sessions reach the Claude model API and your internal Git, package registries, and services. No inbound connectivity from Anthropic is required.</desc>

  <defs>
    <style>
      svg { font-family: -apple-system, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif; }
      .bg { fill: #ffffff; }

      .zone-anthropic   { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .zone-coder       { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .zone-internal    { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.5; }

      .card-anthropic   { fill: #ffffff; stroke: #fbbf24; stroke-width: 1.25; }
      .card-coder       { fill: #ffffff; stroke: #a78bfa; stroke-width: 1.25; }
      .card-internal    { fill: #ffffff; stroke: #67e8f9; stroke-width: 1.25; }

      .workspace        { fill: #fdfcff; stroke: #7c3aed; stroke-width: 1.75; }
      .runner-card      { fill: #faf5ff; stroke: #a78bfa; stroke-width: 1.25; }
      .session-card     { fill: #ffffff; stroke: #a78bfa; stroke-width: 1; stroke-dasharray: 4 3; }
      .coderd-card      { fill: #ffffff; stroke: #c4b5fd; stroke-width: 1; stroke-dasharray: 3 3; }

      .owner-badge      { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1; }
      .lock-badge       { fill: #fef3c7; stroke: #b45309; stroke-width: 1; }
      .creator-badge    { fill: #ffffff; stroke: #b45309; stroke-width: 1; stroke-dasharray: 3 2; }

      .zone-label       { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .zone-anthropic-l { fill: #b45309; }
      .zone-coder-l     { fill: #6d28d9; }
      .zone-internal-l  { fill: #0e7490; }

      .title            { font-size: 14px; font-weight: 600; fill: #111827; }
      .title-sm         { font-size: 12px; font-weight: 600; fill: #111827; }
      .subtitle         { font-size: 12px; fill: #4b5563; }
      .mono             { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11px; fill: #1f2937; }
      .mono-sm          { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace; font-size: 10px; fill: #1f2937; }
      .small            { font-size: 11px; fill: #4b5563; }
      .badge-label      { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
      .badge-coder-l    { fill: #6d28d9; }
      .badge-anthropic-l{ fill: #b45309; }

      .arrow-anthropic  { fill: none; stroke: #b45309; stroke-width: 1.6; }
      .arrow-egress     { fill: none; stroke: #0e7490; stroke-width: 1.6; }
      .arrow-build      { fill: none; stroke: #a78bfa; stroke-width: 1.2; stroke-dasharray: 5 4; }
      .arrow-internal   { fill: none; stroke: #6b7280; stroke-width: 1.2; }

      .arrow-label      { font-size: 11px; fill: #111827; font-weight: 500; }
      .arrow-label-bg   { fill: #ffffff; }

      .legend-box       { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
      .footnote         { font-size: 11px; fill: #4b5563; font-style: italic; }
    </style>
    <marker id="ah-anthropic" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="ah-egress" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0e7490"/>
    </marker>
    <marker id="ah-build" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <marker id="ah-internal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="1320" height="820"/>

  <!-- ====================================================== -->
  <!-- Zone 1: Anthropic                                       -->
  <!-- ====================================================== -->
  <rect class="zone-anthropic" x="32" y="64" width="288" height="680" rx="14"/>
  <text class="zone-label zone-anthropic-l" x="48" y="92">Anthropic</text>

  <!-- Developer surfaces card -->
  <rect class="card-anthropic" x="56" y="116" width="240" height="140" rx="10"/>
  <text class="title" x="72" y="140">Developer surfaces</text>
  <text class="small" x="72" y="158">Where sessions are started</text>
  <text class="mono" x="72" y="184">claude.ai/code</text>
  <text class="mono" x="72" y="202">mobile apps</text>
  <text class="mono" x="72" y="220">routines, agents, API</text>
  <text class="small" x="72" y="244">Each session carries a JWT</text>

  <!-- Control plane card -->
  <rect class="card-anthropic" x="56" y="280" width="240" height="180" rx="10"/>
  <text class="title" x="72" y="304">Control plane</text>
  <text class="small" x="72" y="322">api.anthropic.com</text>
  <text class="mono" x="72" y="348">Per-pool session queue</text>
  <text class="mono" x="72" y="366">Runner registration</text>
  <text class="mono" x="72" y="384">Issues runner tokens</text>
  <text class="mono" x="72" y="402">Assigns sessions</text>
  <text class="mono" x="72" y="420">Forwards events to user</text>

  <!-- Claude model API card -->
  <rect class="card-anthropic" x="56" y="484" width="240" height="120" rx="10"/>
  <text class="title" x="72" y="508">Claude model API</text>
  <text class="small" x="72" y="526">Inference for each session</text>
  <text class="mono" x="72" y="552">Each child process</text>
  <text class="mono" x="72" y="570">calls the model API</text>
  <text class="mono" x="72" y="588">on its own.</text>

  <!-- ====================================================== -->
  <!-- Zone 2: Coder deployment                                -->
  <!-- ====================================================== -->
  <rect class="zone-coder" x="352" y="64" width="640" height="680" rx="14"/>
  <text class="zone-label zone-coder-l" x="368" y="92">Coder deployment</text>

  <!-- Coderd badge -->
  <rect class="coderd-card" x="376" y="116" width="592" height="56" rx="8"/>
  <text class="title" x="392" y="140">Coder control plane (coderd)</text>
  <text class="small" x="392" y="158">Builds the workspace from a template. Not in the runner traffic path.</text>

  <!-- Workspace -->
  <rect class="workspace" x="376" y="196" width="592" height="528" rx="12"/>
  <text class="title" x="392" y="220">Coder workspace</text>

  <!-- Owner badge top-right of workspace header -->
  <rect class="owner-badge" x="752" y="206" width="200" height="34" rx="6"/>
  <text class="badge-label badge-coder-l" x="764" y="221">Coder workspace owner</text>
  <text class="mono" x="764" y="234">prebuilds svc-account</text>

  <text class="small" x="392" y="240">One prebuilt workspace per slot in the pool. Anonymous until Anthropic</text>
  <text class="small" x="392" y="256">routes a session here, then locked at the runner layer (not the Coder</text>
  <text class="small" x="392" y="272">layer). Bot git identity baked into the image.</text>

  <!-- coder_script card -->
  <rect class="runner-card" x="400" y="290" width="544" height="74" rx="8"/>
  <text class="title-sm" x="416" y="312">coder_script  ·  starts the runner</text>
  <text class="mono-sm" x="416" y="332">claude self-hosted-runner --pool-secret-file ... --capacity N</text>
  <text class="small" x="416" y="350">Long-lived process. Logs to ~/.claude/runner.log.</text>

  <!-- Runner process card with lock badge -->
  <rect class="runner-card" x="400" y="384" width="544" height="110" rx="8"/>
  <text class="title-sm" x="416" y="406">Runner process</text>

  <rect class="lock-badge" x="700" y="394" width="232" height="34" rx="6"/>
  <text class="badge-label badge-anthropic-l" x="712" y="409">Locked to Anthropic user</text>
  <text class="mono" x="712" y="422">@alice  (first session wins)</text>

  <text class="mono-sm" x="416" y="430">register, poll, refresh lease</text>
  <text class="mono-sm" x="416" y="448">spawn child claude per assigned session</text>
  <text class="mono-sm" x="416" y="466">stream events back to Anthropic</text>
  <text class="small" x="416" y="484">In Phase 1 the workspace is bot-owned; the runner picks up a real user only at first session.</text>

  <!-- Child sessions row label -->
  <text class="small" x="416" y="516">Child claude session processes (up to --capacity)</text>

  <!-- All three sessions belong to the locked user. Anthropic's design:
       "A runner serves one user at a time ... continues to serve only that
       account until the account's queued and active sessions drain to zero."
       Parallelism comes from different surfaces the same user is using. -->
  <rect class="session-card" x="400" y="528" width="172" height="120" rx="8"/>
  <text class="title-sm" x="412" y="550">session 1</text>
  <rect class="creator-badge" x="412" y="558" width="148" height="28" rx="5"/>
  <text class="badge-label badge-anthropic-l" x="420" y="571">Session creator</text>
  <text class="mono-sm" x="420" y="582">@alice (from JWT)</text>
  <text class="mono-sm" x="412" y="606">from claude.ai/code</text>
  <text class="mono-sm" x="412" y="622">tab A, repo X</text>

  <rect class="session-card" x="586" y="528" width="172" height="120" rx="8"/>
  <text class="title-sm" x="598" y="550">session 2</text>
  <rect class="creator-badge" x="598" y="558" width="148" height="28" rx="5"/>
  <text class="badge-label badge-anthropic-l" x="606" y="571">Session creator</text>
  <text class="mono-sm" x="606" y="582">@alice (from JWT)</text>
  <text class="mono-sm" x="598" y="606">from a scheduled</text>
  <text class="mono-sm" x="598" y="622">routine, repo Y</text>

  <rect class="session-card" x="772" y="528" width="172" height="120" rx="8"/>
  <text class="title-sm" x="784" y="550">session N</text>
  <rect class="creator-badge" x="784" y="558" width="148" height="28" rx="5"/>
  <text class="badge-label badge-anthropic-l" x="792" y="571">Session creator</text>
  <text class="mono-sm" x="792" y="582">@alice (from JWT)</text>
  <text class="mono-sm" x="784" y="606">from the mobile</text>
  <text class="mono-sm" x="784" y="622">app, repo Z</text>

  <!-- Workspace footer: why multiple sessions + identity model -->
  <text class="small" x="400" y="672">Why multiple sessions on one runner?</text>
  <text class="mono-sm" x="400" y="688">One locked user, several parallel work streams (web tabs, routines, agents, mobile) up to --capacity.</text>
  <text class="mono-sm" x="400" y="704">All sessions on this runner share the same creator: the locked user. Anthropic keeps it that way for the runner's lifetime.</text>
  <text class="small" x="400" y="724">Phase 1: Coder owner = prebuilds svc-account, locked Anthropic user = session creator (all @alice). Phase 2 middleware can claim the prebuild on behalf of @alice so all three match.</text>

  <!-- ====================================================== -->
  <!-- Zone 3: Your network                                    -->
  <!-- ====================================================== -->
  <rect class="zone-internal" x="1024" y="64" width="264" height="680" rx="14"/>
  <text class="zone-label zone-internal-l" x="1040" y="92">Your network</text>

  <rect class="card-internal" x="1048" y="116" width="216" height="110" rx="10"/>
  <text class="title" x="1064" y="140">Internal Git</text>
  <text class="small" x="1064" y="158">SSH or HTTPS to your host</text>
  <text class="mono" x="1064" y="184">github.example.com</text>
  <text class="mono" x="1064" y="202">gitlab.example.com</text>

  <rect class="card-internal" x="1048" y="246" width="216" height="110" rx="10"/>
  <text class="title" x="1064" y="270">Package registries</text>
  <text class="small" x="1064" y="288">Where dependencies live</text>
  <text class="mono" x="1064" y="314">Artifactory, Nexus,</text>
  <text class="mono" x="1064" y="332">npm, PyPI, GoProxy</text>

  <rect class="card-internal" x="1048" y="376" width="216" height="110" rx="10"/>
  <text class="title" x="1064" y="400">Internal services</text>
  <text class="small" x="1064" y="418">Databases, staging APIs</text>
  <text class="mono" x="1064" y="444">reachable from this</text>
  <text class="mono" x="1064" y="462">workspace's network</text>

  <rect class="card-internal" x="1048" y="506" width="216" height="110" rx="10"/>
  <text class="title" x="1064" y="530">Secret broker</text>
  <text class="small" x="1064" y="548">Optional (stage 2)</text>
  <text class="mono" x="1064" y="574">Vault, AWS STS, IdP</text>
  <text class="mono" x="1064" y="592">per-creator credentials</text>

  <!-- ====================================================== -->
  <!-- Arrows                                                  -->
  <!-- ====================================================== -->

  <!-- A. Developer surface to Anthropic control plane (internal to Anthropic) -->
  <line class="arrow-internal" x1="176" y1="260" x2="176" y2="278" marker-end="url(#ah-internal)"/>

  <!-- B. coderd (dashed) builds workspace: two short pillars with label between them. -->
  <line class="arrow-build" x1="500" y1="172" x2="500" y2="194" marker-end="url(#ah-build)"/>
  <line class="arrow-build" x1="844" y1="172" x2="844" y2="194" marker-end="url(#ah-build)"/>
  <text class="arrow-label" x="620" y="188">workspace builds, owner = prebuilds svc-account</text>

  <!-- C. Runner <-> Anthropic control plane: two visibly separated parallel arrows. -->
  <!-- Outbound (runner -> Anthropic): upper band. -->
  <path class="arrow-anthropic" d="M 400 410 C 360 410, 340 402, 296 402" marker-end="url(#ah-anthropic)"/>
  <text class="arrow-label" x="312" y="384">register, poll,</text>
  <text class="arrow-label" x="312" y="398">stream events</text>

  <!-- Inbound (Anthropic -> runner): lower band. -->
  <path class="arrow-anthropic" d="M 296 446 C 340 446, 360 454, 400 454" marker-end="url(#ah-anthropic)"/>
  <text class="arrow-label" x="312" y="470">session assignments</text>
  <text class="small" x="312" y="484">(over the runner's outbound HTTPS)</text>

  <!-- E. Child sessions -> Claude model API. -->
  <path class="arrow-anthropic" d="M 400 588 C 360 588, 340 580, 296 580" marker-end="url(#ah-anthropic)"/>
  <text class="arrow-label" x="312" y="568">model inference</text>

  <!-- F. Sessions -> Internal network. Fan out from the right edge of the workspace card. -->
  <path class="arrow-egress" d="M 944 580 C 980 580, 1015 171, 1048 171" marker-end="url(#ah-egress)"/>
  <path class="arrow-egress" d="M 944 596 C 982 596, 1015 301, 1048 301" marker-end="url(#ah-egress)"/>
  <path class="arrow-egress" d="M 944 612 C 982 612, 1015 431, 1048 431" marker-end="url(#ah-egress)"/>
  <path class="arrow-egress" d="M 944 628 C 982 628, 1015 561, 1048 561" marker-end="url(#ah-egress)"/>

  <!-- ====================================================== -->
  <!-- Legend                                                  -->
  <!-- ====================================================== -->
  <rect class="legend-box" x="32" y="760" width="1256" height="44" rx="8"/>

  <line class="arrow-anthropic" x1="48" y1="780" x2="80" y2="780" marker-end="url(#ah-anthropic)"/>
  <text class="small" x="92" y="784">Outbound HTTPS to api.anthropic.com</text>

  <line class="arrow-egress" x1="384" y1="780" x2="416" y2="780" marker-end="url(#ah-egress)"/>
  <text class="small" x="428" y="784">Egress to your internal network</text>

  <line class="arrow-build" x1="672" y1="780" x2="704" y2="780" marker-end="url(#ah-build)"/>
  <text class="small" x="716" y="784">Coder builds the workspace from a template</text>

  <rect class="owner-badge" x="1006" y="770" width="14" height="14" rx="3"/>
  <text class="small" x="1026" y="784">Coder owner</text>

  <rect class="lock-badge" x="1108" y="770" width="14" height="14" rx="3"/>
  <text class="small" x="1128" y="784">Anthropic lock</text>

  <rect class="creator-badge" x="1216" y="770" width="14" height="14" rx="3"/>
  <text class="small" x="1236" y="784">Per-session JWT</text>

  <!-- Footnote -->
  <text class="footnote" x="32" y="752">No inbound connectivity from Anthropic. The workspace dials out and the runner streams events over the same connection.</text>
</svg>
