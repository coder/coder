<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="user-diagram-title user-diagram-desc">
  <title id="user-diagram-title">User identity flow: the orchestrator maps an Anthropic email to a Coder user and creates the workspace on their behalf</title>
  <desc id="user-diagram-desc">When a session is queued from @alice on claude.ai/code, a spawn hint carries her account email. The orchestrator polls Anthropic, receives the spawn hint, and runs its spawn-runner hook. The hook reads CLAUDE_RUNNER_ACCOUNT_EMAIL, looks up the Coder user by email, and finds alice. Coder creates the workspace on behalf of alice. The workspace is owned by @alice, locked to @alice, and Coder external auth wires GIT_ASKPASS so git push runs as alice. The runner is born locked with no first-session race.</desc>

  <defs>
    <style>
      svg { font-family: -apple-system, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif; }
      .bg               { fill: #ffffff; }
      .zone-anthropic   { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .zone-coder       { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .zone-orch        { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.5; }
      .card-anthropic   { fill: #ffffff; stroke: #fbbf24; stroke-width: 1.25; }
      .card-orch        { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.25; }
      .workspace-card   { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1.75; }
      .owner-badge      { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1; }
      .lock-badge       { fill: #fef3c7; stroke: #b45309; stroke-width: 1; }
      .zone-label       { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .zone-anthropic-l { fill: #b45309; }
      .zone-coder-l     { fill: #6d28d9; }
      .zone-orch-l      { fill: #374151; }
      .badge-label      { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
      .badge-coder-l    { fill: #6d28d9; }
      .badge-anthropic-l{ fill: #b45309; }
      .title            { font-size: 13px; font-weight: 600; fill: #111827; }
      .title-sm         { font-size: 11px; font-weight: 600; fill: #111827; }
      .small            { font-size: 12px; fill: #4b5563; }
      .mono             { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11px; fill: #1f2937; }
      .arrow-anthropic  { fill: none; stroke: #b45309; stroke-width: 1.6; }
      .arrow-coder      { fill: none; stroke: #7c3aed; stroke-width: 1.4; }
      .arrow-orch       { fill: none; stroke: #374151; stroke-width: 1.4; }
      .arrow-label      { font-size: 11.5px; fill: #111827; font-weight: 600; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
    </style>
    <marker id="usr-ah-anthropic" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="usr-ah-coder" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="usr-ah-orch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="400"/>

  <!-- Anthropic zone -->
  <rect class="zone-anthropic" x="24" y="40" width="196" height="200" rx="12"/>
  <text class="zone-label zone-anthropic-l" x="40" y="64">Anthropic</text>

  <rect class="card-anthropic" x="40" y="82" width="164" height="68" rx="8"/>
  <text class="title" x="56" y="102">Session queued</text>
  <text class="small" x="56" y="118">from @alice</text>
  <text class="mono" x="56" y="136">claude.ai/code</text>

  <rect class="card-anthropic" x="40" y="162" width="164" height="64" rx="8"/>
  <text class="title" x="56" y="182">Spawn hint</text>
  <text class="small" x="56" y="198">with account email</text>
  <text class="mono" x="56" y="214">alice@corp.dev</text>

  <!-- Orchestrator zone -->
  <rect class="zone-orch" x="260" y="40" width="224" height="320" rx="12"/>
  <text class="zone-label zone-orch-l" x="276" y="64">Orchestrator</text>

  <rect class="card-orch" x="276" y="82" width="192" height="56" rx="8"/>
  <text class="title" x="292" y="102">Polls Anthropic</text>
  <text class="small" x="292" y="118">receives spawn hint</text>

  <rect class="card-orch" x="276" y="152" width="192" height="52" rx="8"/>
  <text class="title" x="292" y="174">spawn-runner hook</text>
  <text class="small" x="292" y="192">invoked by orchestrator</text>

  <rect class="card-orch" x="276" y="218" width="192" height="128" rx="8"/>
  <text class="title" x="292" y="238">Hook logic</text>
  <text class="small" x="292" y="258">reads env var:</text>
  <text class="mono" x="292" y="276">CLAUDE_RUNNER_</text>
  <text class="mono" x="292" y="290">ACCOUNT_EMAIL</text>
  <text class="small" x="292" y="312">looks up Coder user</text>
  <text class="small" x="292" y="328">by email; match: alice</text>

  <!-- Coder zone -->
  <rect class="zone-coder" x="524" y="40" width="412" height="320" rx="12"/>
  <text class="zone-label zone-coder-l" x="540" y="64">Coder</text>

  <rect class="card-orch" x="540" y="82" width="192" height="56" rx="8"/>
  <text class="title" x="556" y="102">Workspace created</text>
  <text class="small" x="556" y="118">on behalf of alice</text>

  <!-- Workspace card -->
  <rect class="workspace-card" x="540" y="152" width="380" height="194" rx="8"/>
  <text class="title-sm" x="556" y="174">workspace</text>

  <rect class="owner-badge" x="556" y="184" width="148" height="22" rx="4"/>
  <text class="badge-label badge-coder-l" x="564" y="199">Owner: @alice</text>

  <rect class="lock-badge" x="556" y="214" width="148" height="22" rx="4"/>
  <text class="badge-label badge-anthropic-l" x="564" y="229">Locked: @alice</text>

  <text class="small" x="556" y="260">Coder external auth</text>
  <text class="small" x="556" y="276">wires GIT_ASKPASS</text>

  <text class="mono" x="556" y="300">git push as alice</text>

  <text class="small" x="556" y="326">runner born locked</text>
  <text class="small" x="556" y="340">(no first-session race)</text>

  <!-- Work order detail on right side of workspace card -->
  <text class="title-sm" x="748" y="174">work order</text>
  <text class="mono" x="748" y="196">--lock-to-account</text>
  <text class="mono" x="748" y="210">@alice</text>

  <!-- Arrows -->
  <!-- Anthropic spawn hint -> Orchestrator polls -->
  <path class="arrow-anthropic" d="M 204 116 C 228 116, 248 110, 276 110" marker-end="url(#usr-ah-anthropic)"/>
  <text class="arrow-label" x="216" y="104">spawn hint</text>

  <!-- Orchestrator polls -> spawn-runner hook -->
  <path class="arrow-orch" d="M 372 138 L 372 152" marker-end="url(#usr-ah-orch)"/>

  <!-- spawn-runner hook -> hook logic -->
  <path class="arrow-orch" d="M 372 204 L 372 218" marker-end="url(#usr-ah-orch)"/>

  <!-- Hook logic -> Coder workspace created -->
  <path class="arrow-coder" d="M 468 268 C 492 240, 510 116, 540 110" marker-end="url(#usr-ah-coder)"/>
  <text class="arrow-label" x="480" y="196">create</text>

  <!-- Coder workspace created -> workspace -->
  <path class="arrow-coder" d="M 636 138 L 636 152" marker-end="url(#usr-ah-coder)"/>

  <!-- Footnote -->
  <text class="small" x="24" y="386">User identity is prototyped and proven. The orchestrator's spawn-runner hook maps the Anthropic email to a Coder user and creates the workspace on their behalf.</text>
</svg>
