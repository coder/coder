<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="sys-diagram-title sys-diagram-desc">
  <title id="sys-diagram-title">System identity flow: Coder maintains a pool of bot-owned runner workspaces</title>
  <desc id="sys-diagram-desc">Coder prebuilds maintain N warm workspaces, each owned by the prebuilds service account and each running one Claude Code self-hosted runner. When an Anthropic session arrives, one workspace's runner locks to the developer's Anthropic account and serves their sessions. When work drains, the workspace deletes itself and Coder queues a replacement, keeping the pool at N.</desc>

  <defs>
    <style>
      svg { font-family: -apple-system, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif; }
      .bg               { fill: #ffffff; }
      .zone-anthropic   { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .zone-coder       { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .card-anthropic   { fill: #ffffff; stroke: #fbbf24; stroke-width: 1.25; }
      .workspace-warm   { fill: #fdfcff; stroke: #7c3aed; stroke-width: 1.4; }
      .workspace-locked { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1.75; }
      .workspace-empty  { fill: #fafafa; stroke: #d1d5db; stroke-width: 1; stroke-dasharray: 3 3; }
      .lock-badge       { fill: #fef3c7; stroke: #b45309; stroke-width: 1; }
      .zone-label       { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .zone-anthropic-l { fill: #b45309; }
      .zone-coder-l     { fill: #6d28d9; }
      .badge-label      { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
      .badge-anthropic-l{ fill: #b45309; }
      .title            { font-size: 13px; font-weight: 600; fill: #111827; }
      .title-sm         { font-size: 11px; font-weight: 600; fill: #111827; }
      .small            { font-size: 12px; fill: #4b5563; }
      .mono             { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11px; fill: #1f2937; }
      .arrow-anthropic  { fill: none; stroke: #b45309; stroke-width: 1.6; }
      .arrow-coder      { fill: none; stroke: #7c3aed; stroke-width: 1.4; stroke-dasharray: 5 4; }
      .arrow-loop       { fill: none; stroke: #6b7280; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .arrow-label      { font-size: 11.5px; fill: #111827; font-weight: 600; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
    </style>
    <marker id="sys-ah-anthropic" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="sys-ah-coder" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="sys-ah-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="360"/>

  <!-- Anthropic zone -->
  <rect class="zone-anthropic" x="24" y="40" width="208" height="280" rx="12"/>
  <text class="zone-label zone-anthropic-l" x="40" y="64">Anthropic</text>

  <rect class="card-anthropic" x="40" y="88" width="176" height="80" rx="8"/>
  <text class="title" x="56" y="110">Session arrives</text>
  <text class="small" x="56" y="128">from @alice</text>
  <text class="mono" x="56" y="148">claude.ai/code</text>

  <rect class="card-anthropic" x="40" y="208" width="176" height="80" rx="8"/>
  <text class="title" x="56" y="230">Pool scheduler</text>
  <text class="small" x="56" y="248">picks a free runner</text>
  <text class="small" x="56" y="262">and locks it to @alice</text>

  <!-- Coder zone -->
  <rect class="zone-coder" x="280" y="40" width="656" height="280" rx="12"/>
  <text class="zone-label zone-coder-l" x="296" y="64">Coder</text>

  <!-- Pool of warm workspaces (3 visible + ellipsis) -->
  <rect class="workspace-warm" x="304" y="100" width="132" height="96" rx="8"/>
  <text class="title-sm" x="316" y="120">workspace #1</text>
  <text class="small" x="316" y="138">runner: idle</text>
  <text class="mono" x="316" y="156">unlocked</text>
  <text class="mono" x="316" y="170">0 / 4 sessions</text>
  <text class="small" x="316" y="186">owner: svc-account</text>

  <rect class="workspace-locked" x="448" y="100" width="132" height="96" rx="8"/>
  <text class="title-sm" x="460" y="120">workspace #2</text>
  <rect class="lock-badge" x="460" y="128" width="108" height="20" rx="4"/>
  <text class="badge-label badge-anthropic-l" x="466" y="142">Locked: @alice</text>
  <text class="mono" x="460" y="160">runner: serving</text>
  <text class="mono" x="460" y="174">3 / 4 sessions</text>
  <text class="small" x="460" y="188">owner: svc-account</text>

  <rect class="workspace-warm" x="592" y="100" width="132" height="96" rx="8"/>
  <text class="title-sm" x="604" y="120">workspace #3</text>
  <text class="small" x="604" y="138">runner: idle</text>
  <text class="mono" x="604" y="156">unlocked</text>
  <text class="mono" x="604" y="170">0 / 4 sessions</text>
  <text class="small" x="604" y="186">owner: svc-account</text>

  <text class="small" x="744" y="156">. . .</text>
  <text class="small" x="744" y="172">up to N</text>

  <!-- Self-eviction + replacement -->
  <rect class="workspace-empty" x="304" y="224" width="132" height="72" rx="8"/>
  <text class="title-sm" x="316" y="244">drain + delete</text>
  <text class="small" x="316" y="262">runner exits 0</text>
  <text class="mono" x="316" y="278">coder delete</text>

  <rect class="workspace-warm" x="592" y="224" width="132" height="72" rx="8"/>
  <text class="title-sm" x="604" y="244">replacement</text>
  <text class="small" x="604" y="262">prebuild reconciler</text>
  <text class="small" x="604" y="278">queues a new one</text>

  <!-- Arrows -->
  <!-- Anthropic session -> locked workspace -->
  <path class="arrow-anthropic" d="M 216 116 C 300 76, 400 76, 500 100" marker-end="url(#sys-ah-anthropic)"/>
  <text class="arrow-label" x="260" y="82">routes to free runner</text>

  <!-- Locked workspace serves sessions back -->
  <path class="arrow-anthropic" d="M 448 168 C 380 200, 290 220, 232 228" marker-end="url(#sys-ah-anthropic)"/>
  <text class="arrow-label" x="248" y="218">streams results</text>

  <!-- Locked workspace -> drain -->
  <path class="arrow-loop" d="M 460 196 C 440 220, 420 224, 392 224" marker-end="url(#sys-ah-loop)"/>
  <text class="arrow-label" x="396" y="212">when drained</text>

  <!-- Drain -> replacement -->
  <path class="arrow-coder" d="M 436 260 C 500 260, 540 260, 592 260" marker-end="url(#sys-ah-coder)"/>
  <text class="arrow-label" x="476" y="252">refill</text>

  <!-- Replacement -> warm pool slot (loop back) -->
  <path class="arrow-coder" d="M 660 224 C 660 210, 660 200, 660 198" marker-end="url(#sys-ah-coder)"/>

  <!-- Footnote -->
  <text class="small" x="24" y="346">Each runner is one Coder workspace. Each commit is the bot identity. Anthropic's pool scheduler decides which workspace serves which developer.</text>
</svg>
