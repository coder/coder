er for proto3 files. It uses tree-sitter and runs in single file mode.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'protols' },\\n+  filetypes = { 'proto' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/protols.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/protols.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/psalm.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/vimeo/psalm\\n+---\\n+--- Can be installed with composer.\\n+--- ```sh\\n+--- composer global require vimeo/psalm\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'psalm', '--language-server' },\\n+  filetypes = { 'php' },\\n+  root_markers = { 'psalm.xml', 'psalm.xml.dist' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/psalm.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/psalm.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pug.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/opa-oz/pug-lsp\\n+---\\n+--- An implementation of the Language Protocol Server for [Pug.js](http://pugjs.org)\\n+---\\n+--- PugLSP can be installed via `go install github.com/opa-oz/pug-lsp@latest`, or manually downloaded from [releases page](https://github.com/opa-oz/pug-lsp/releases)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pug-lsp' },\\n+  filetypes = { 'pug' },\\n+  root_markers = { 'package.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pug.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pug.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/puppet.lua\\n@@ -0,0 +1,28 @@\\n+---@brief\\n+---\\n+--- LSP server for Puppet.\\n+---\\n+--- Installation:\\n+---\\n+--- - Clone the editor-services repository:\\n+---     https://github.com/puppetlabs/puppet-editor-services\\n+---\\n+--- - Navigate into that directory and run: `bundle install`\\n+---\\n+--- - Install the 'puppet-lint' gem: `gem install puppet-lint`\\n+---\\n+--- - Add that repository to $PATH.\\n+---\\n+--- - Ensure you can run `puppet-languageserver` from outside the editor-services directory.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'puppet-languageserver', '--stdio' },\\n+  filetypes = { 'puppet' },\\n+  root_markers = {\\n+    'manifests',\\n+    '.puppet-lint.rc',\\n+    'hiera.yaml',\\n+    '.git',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/puppet.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/puppet.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/purescriptls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/nwolverson/purescript-language-server\\n+---\\n+--- The `purescript-language-server` can be added to your project and `$PATH` via\\n+---\\n+--- * JavaScript package manager such as npm, pnpm, Yarn, et al.\\n+--- * Nix under the `nodePackages` and `nodePackages_latest` package sets\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'purescript-language-server', '--stdio' },\\n+  filetypes = { 'purescript' },\\n+  root_markers = { 'bower.json', 'flake.nix', 'psc-package.json', 'shell.nix', 'spago.dhall', 'spago.yaml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/purescriptls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/purescriptls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pylsp.lua\\n@@ -0,0 +1,41 @@\\n+---@brief\\n+---\\n+--- https://github.com/python-lsp/python-lsp-server\\n+---\\n+--- A Python 3.6+ implementation of the Language Server Protocol.\\n+---\\n+--- See the [project's README](https://github.com/python-lsp/python-lsp-server) for installation instructions.\\n+---\\n+--- Configuration options are documented [here](https://github.com/python-lsp/python-lsp-server/blob/develop/CONFIGURATION.md).\\n+--- In order to configure an option, it must be translated to a nested Lua table and included in the `settings` argument to the `config('pylsp', {})` function.\\n+--- For example, in order to set the `pylsp.plugins.pycodestyle.ignore` option:\\n+--- ```lua\\n+--- vim.lsp.config('pylsp', {\\n+---   settings = {\\n+---     pylsp = {\\n+---       plugins = {\\n+---         pycodestyle = {\\n+---           ignore = {'W391'},\\n+---           maxLineLength = 100\\n+---         }\\n+---       }\\n+---     }\\n+---   }\\n+--- })\\n+--- ```\\n+---\\n+--- Note: This is a community fork of `pyls`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pylsp' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    '.git',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pylsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pylsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pylyzer.lua\\n@@ -0,0 +1,35 @@\\n+---@brief\\n+---\\n+--- https://github.com/mtshiba/pylyzer\\n+---\\n+--- `pylyzer`, a fast static code analyzer \\u0026 language server for Python.\\n+---\\n+--- `pylyzer` requires Erg as dependency, and finds it via `ERG_PATH` environment variable.\\n+--- This config sets `ERG_PATH=\\\"~/.erg\\\"`. Set `cmd_env` if you want to change it.\\n+--- To install Erg, simply extract tarball/zip from [Erg releases](https://github.com/erg-lang/erg/releases/latest)\\n+--- to the the path where you want to install it, e.g. `~/.erg`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pylyzer', '--server' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'setup.py',\\n+    'tox.ini',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    'pyproject.toml',\\n+    '.git',\\n+  },\\n+  settings = {\\n+    python = {\\n+      diagnostics = true,\\n+      inlayHints = true,\\n+      smartCompletion = true,\\n+      checkOnType = false,\\n+    },\\n+  },\\n+  cmd_env = {\\n+    ERG_PATH = vim.env.ERG_PATH or vim.fs.joinpath(vim.uv.os_homedir(), '.erg'),\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pylyzer.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pylyzer.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pyre.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://pyre-check.org/\\n+---\\n+--- `pyre` a static type checker for Python 3.\\n+---\\n+--- `pyre` offers an extremely limited featureset. It currently only supports diagnostics,\\n+--- which are triggered on save.\\n+---\\n+--- Do not report issues for missing features in `pyre` to `lspconfig`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pyre', 'persistent' },\\n+  filetypes = { 'python' },\\n+  root_markers = { '.pyre_configuration' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pyre.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pyre.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pyrefly.lua\\n@@ -0,0 +1,26 @@\\n+---@brief\\n+---\\n+--- https://pyrefly.org/\\n+---\\n+---`pyrefly`, a faster Python type checker written in Rust.\\n+--\\n+-- `pyrefly` is still in development, so please report any errors to\\n+-- our issues page at https://github.com/facebook/pyrefly/issues.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pyrefly', 'lsp' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyrefly.toml',\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    '.git',\\n+  },\\n+  on_exit = function(code, _, _)\\n+    vim.notify('Closing Pyrefly LSP exited with code: ' .. code, vim.log.levels.INFO)\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pyrefly.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pyrefly.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pyright.lua\\n@@ -0,0 +1,65 @@\\n+---@brief\\n+---\\n+--- https://github.com/microsoft/pyright\\n+---\\n+--- `pyright`, a static type checker and language server for python\\n+\\n+local function set_python_path(command)\\n+  local path = command.args\\n+  local clients = vim.lsp.get_clients {\\n+    bufnr = vim.api.nvim_get_current_buf(),\\n+    name = 'pyright',\\n+  }\\n+  for _, client in ipairs(clients) do\\n+    if client.settings then\\n+      client.settings.python = vim.tbl_deep_extend('force', client.settings.python, { pythonPath = path })\\n+    else\\n+      client.config.settings = vim.tbl_deep_extend('force', client.config.settings, { python = { pythonPath = path } })\\n+    end\\n+    client:notify('workspace/didChangeConfiguration', { settings = nil })\\n+  end\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pyright-langserver', '--stdio' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    'pyrightconfig.json',\\n+    '.git',\\n+  },\\n+  settings = {\\n+    python = {\\n+      analysis = {\\n+        autoSearchPaths = true,\\n+        useLibraryCodeForTypes = true,\\n+        diagnosticMode = 'openFilesOnly',\\n+      },\\n+    },\\n+  },\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspPyrightOrganizeImports', function()\\n+      local params = {\\n+        command = 'pyright.organizeimports',\\n+        arguments = { vim.uri_from_bufnr(bufnr) },\\n+      }\\n+\\n+      -- Using client.request() directly because \\\"pyright.organizeimports\\\" is private\\n+      -- (not advertised via capabilities), which client:exec_cmd() refuses to call.\\n+      -- https://github.com/neovim/neovim/blob/c333d64663d3b6e0dd9aa440e433d346af4a3d81/runtime/lua/vim/lsp/client.lua#L1024-L1030\\n+      client.request('workspace/executeCommand', params, nil, bufnr)\\n+    end, {\\n+      desc = 'Organize Imports',\\n+    })\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspPyrightSetPythonPath', set_python_path, {\\n+      desc = 'Reconfigure pyright with the provided python path',\\n+      nargs = 1,\\n+      complete = 'file',\\n+    })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pyright.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pyright.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/qmlls.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://doc.qt.io/qt-6/qtqml-tooling-qmlls.html\\n+---\\n+--- \\u003e QML Language Server is a tool shipped with Qt that helps you write code in your favorite (LSP-supporting) editor.\\n+---\\n+--- Source in the [QtDeclarative repository](https://code.qt.io/cgit/qt/qtdeclarative.git/)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'qmlls' },\\n+  filetypes = { 'qml', 'qmljs' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/qmlls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/qmlls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/quick_lint_js.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://quick-lint-js.com/\\n+---\\n+--- quick-lint-js finds bugs in JavaScript programs.\\n+---\\n+--- See installation [instructions](https://quick-lint-js.com/install/)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'quick-lint-js', '--lsp-server' },\\n+  filetypes = { 'javascript', 'typescript' },\\n+  root_markers = { 'package.json', 'jsconfig.json', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/quick_lint_js.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/quick_lint_js.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/r_language_server.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- [languageserver](https://github.com/REditorSupport/languageserver) is an\\n+--- implementation of the Microsoft's Language Server Protocol for the R\\n+--- language.\\n+---\\n+--- It is released on CRAN and can be easily installed by\\n+---\\n+--- ```r\\n+--- install.packages(\\\"languageserver\\\")\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'R', '--no-echo', '-e', 'languageserver::run()' },\\n+  filetypes = { 'r', 'rmd', 'quarto' },\\n+  root_dir = function(bufnr, on_dir)\\n+    on_dir(vim.fs.root(bufnr, '.git') or vim.uv.os_homedir())\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/r_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/r_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/racket_langserver.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- [https://github.com/jeapostrophe/racket-langserver](https://github.com/jeapostrophe/racket-langserver)\\n+---\\n+--- The Racket language server. This project seeks to use\\n+--- [DrRacket](https://github.com/racket/drracket)'s public API to provide\\n+--- functionality that mimics DrRacket's code tools as closely as possible.\\n+---\\n+--- Install via `raco`: `raco pkg install racket-langserver`\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'racket', '--lib', 'racket-langserver' },\\n+  filetypes = { 'racket', 'scheme' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/racket_langserver.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/racket_langserver.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/raku_navigator.lua\\n@@ -0,0 +1,28 @@\\n+---@brief\\n+---\\n+--- https://github.com/bscan/RakuNavigator\\n+--- A Raku language server\\n+--- **By default, raku_navigator doesn't have a `cmd` set.** This is because nvim-lspconfig does not make assumptions about your path.\\n+--- You have to install the language server manually.\\n+--- Clone the RakuNavigator repo, install based on the [instructions](https://github.com/bscan/raku_Navigator#installation-for-other-editors),\\n+--- and point `cmd` to `server.js` inside the `server/out` directory:\\n+--- ```lua\\n+--- cmd = {'node', '\\u003cpath_to_repo\\u003e/server/out/server.js', '--stdio'}\\n+--- ```\\n+--- At minimum, you will need `raku` in your path. If you want to use a non-standard `raku` you will need to set your configuration like so:\\n+--- ```lua\\n+--- settings = {\\n+---   raku_navigator = {\\n+---     rakuPath = '/some/odd/location/my-raku'\\n+---   }\\n+--- }\\n+--- ```\\n+--- The `contributes.configuration.properties` section of `raku_navigator`'s `package.json` has all available configuration settings. All\\n+--- settings have a reasonable default, but, at minimum, you may want to point `raku_navigator` at your `raku_tidy` and `raku_critic` configurations.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {},\\n+  filetypes = { 'raku' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/raku_navigator.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/raku_navigator.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/reason_ls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- Reason language server\\n+---\\n+--- You can install reason language server from [reason-language-server](https://github.com/jaredly/reason-language-server) repository.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'reason-language-server' },\\n+  filetypes = { 'reason' },\\n+  root_markers = { 'bsconfig.json', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/reason_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/reason_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/regal.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- https://github.com/StyraInc/regal\\n+---\\n+--- A linter for Rego, with support for running as an LSP server.\\n+---\\n+--- `regal` can be installed by running:\\n+--- ```sh\\n+--- go install github.com/StyraInc/regal@latest\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'regal', 'language-server' },\\n+  filetypes = { 'rego' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern '*.rego'(fname) or vim.fs.dirname(vim.fs.find('.git', { path = fname, upward = true })[1]))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/regal.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/regal.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/regols.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- https://github.com/kitagry/regols\\n+---\\n+--- OPA Rego language server.\\n+---\\n+--- `regols` can be installed by running:\\n+--- ```sh\\n+--- go install github.com/kitagry/regols@latest\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'regols' },\\n+  filetypes = { 'rego' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern '*.rego'(fname) or vim.fs.dirname(vim.fs.find('.git', { path = fname, upward = true })[1]))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/regols.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/regols.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/remark_ls.lua\\n@@ -0,0 +1,46 @@\\n+---@brief\\n+---\\n+--- https://github.com/remarkjs/remark-language-server\\n+---\\n+--- `remark-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g remark-language-server\\n+--- ```\\n+---\\n+--- `remark-language-server` uses the same\\n+--- [configuration files](https://github.com/remarkjs/remark/tree/main/packages/remark-cli#example-config-files-json-yaml-js)\\n+--- as `remark-cli`.\\n+---\\n+--- This uses a plugin based system. Each plugin needs to be installed locally using `npm` or `yarn`.\\n+---\\n+--- For example, given the following `.remarkrc.json`:\\n+---\\n+--- ```json\\n+--- {\\n+---   \\\"presets\\\": [\\n+---     \\\"remark-preset-lint-recommended\\\"\\n+---   ]\\n+--- }\\n+--- ```\\n+---\\n+--- `remark-preset-lint-recommended` needs to be installed in the local project:\\n+---\\n+--- ```sh\\n+--- npm install remark-preset-lint-recommended\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'remark-language-server', '--stdio' },\\n+  filetypes = { 'markdown' },\\n+  root_markers = {\\n+    '.remarkrc',\\n+    '.remarkrc.json',\\n+    '.remarkrc.js',\\n+    '.remarkrc.cjs',\\n+    '.remarkrc.mjs',\\n+    '.remarkrc.yml',\\n+    '.remarkrc.yaml',\\n+    '.remarkignore',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/remark_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/remark_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rescriptls.lua\\n@@ -0,0 +1,58 @@\\n+---@brief\\n+---\\n+--- https://github.com/rescript-lang/rescript-vscode/tree/master/server\\n+---\\n+--- ReScript Language Server can be installed via npm:\\n+--- ```sh\\n+--- npm install -g @rescript/language-server\\n+--- ```\\n+---\\n+--- See [package.json](https://github.com/rescript-lang/rescript-vscode/blob/master/package.json#L139)\\n+--- for init_options supported.\\n+---\\n+--- For example, in order to disable the `inlayHints` option:\\n+--- ```lua\\n+--- vim.lsp.config('rescriptls', {\\n+---   settings = {\\n+---     rescript = {\\n+---       settings = {\\n+---         inlayHints = { enable = false },\\n+---       },\\n+---     },\\n+---   })\\n+--- }\\n+--- ```\\n+---\\n+--- Detect file changes: While using @rescript/language-server \\u003e= 1.63.0 you have to detect file changes by registering the didChangeWatchedFiles hook.\\n+--- ```lua\\n+--- capabilities = {\\n+---     workspace = {\\n+---         didChangeWatchedFiles = {\\n+---             dynamicRegistration = true,\\n+---         },\\n+---     },\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rescript-language-server', '--stdio' },\\n+  filetypes = { 'rescript' },\\n+  root_markers = { 'bsconfig.json', 'rescript.json', '.git' },\\n+  settings = {},\\n+  init_options = {\\n+    extensionConfiguration = {\\n+      -- buggy, prompts much too often, superseded by incrementalTypechecking, below\\n+      askToStartBuild = false,\\n+\\n+      allowBuiltInFormatter = true, -- lower latency\\n+      incrementalTypechecking = { -- removes the need for external build process\\n+        enabled = true,\\n+        acrossFiles = true,\\n+      },\\n+      cache = { projectConfig = { enabled = true } }, -- speed up latency dramatically\\n+      codeLens = true,\\n+      inlayHints = { enable = true },\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rescriptls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rescriptls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rls.lua\\n@@ -0,0 +1,35 @@\\n+---@brief\\n+---\\n+--- https://github.com/rust-lang/rls\\n+---\\n+--- rls, a language server for Rust\\n+---\\n+--- See https://github.com/rust-lang/rls#setup to setup rls itself.\\n+--- See https://github.com/rust-lang/rls#configuration for rls-specific settings.\\n+--- All settings listed on the rls configuration section of the readme\\n+--- must be set under settings.rust as follows:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('rls', {\\n+---   settings = {\\n+---     rust = {\\n+---       unstable_features = true,\\n+---       build_on_save = false,\\n+---       all_features = true,\\n+---     },\\n+---   },\\n+--- })\\n+--- ```\\n+---\\n+--- If you want to use rls for a particular build, eg nightly, set cmd as follows:\\n+---\\n+--- ```lua\\n+--- cmd = {\\\"rustup\\\", \\\"run\\\", \\\"nightly\\\", \\\"rls\\\"}\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rls' },\\n+  filetypes = { 'rust' },\\n+  root_markers = { 'Cargo.toml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rnix.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://github.com/nix-community/rnix-lsp\\n+---\\n+--- A language server for Nix providing basic completion and formatting via nixpkgs-fmt.\\n+---\\n+--- To install manually, run `cargo install rnix-lsp`. If you are using nix, rnix-lsp is in nixpkgs.\\n+---\\n+--- This server accepts configuration via the `settings` key.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rnix-lsp' },\\n+  filetypes = { 'nix' },\\n+  root_dir = function(bufnr, on_dir)\\n+    on_dir(vim.fs.root(bufnr, '.git') or vim.uv.os_homedir())\\n+  end,\\n+  settings = {},\\n+  init_options = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rnix.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rnix.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/robotcode.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://robotcode.io\\n+---\\n+--- RobotCode - Language Server Protocol implementation for Robot Framework.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'robotcode', 'language-server' },\\n+  filetypes = { 'robot', 'resource' },\\n+  root_markers = { 'robot.toml', 'pyproject.toml', 'Pipfile', '.git' },\\n+  get_language_id = function(_, _)\\n+    return 'robotframework'\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/robotcode.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/robotcode.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/robotframework_ls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/robocorp/robotframework-lsp\\n+---\\n+--- Language Server Protocol implementation for Robot Framework.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'robotframework_ls' },\\n+  filetypes = { 'robot' },\\n+  root_markers = { 'robotidy.toml', 'pyproject.toml', 'conda.yaml', 'robot.yaml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/robotframework_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/robotframework_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/roc_ls.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/roc-lang/roc/tree/main/crates/language_server#roc_language_server\\n+---\\n+--- The built-in language server for the Roc programming language.\\n+--- [Installation](https://github.com/roc-lang/roc/tree/main/crates/language_server#installing)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'roc_language_server' },\\n+  filetypes = { 'roc' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/roc_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/roc_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rome.lua\\n@@ -0,0 +1,25 @@\\n+---@brief\\n+---\\n+--- https://rome.tools\\n+---\\n+--- Language server for the Rome Frontend Toolchain.\\n+---\\n+--- (Unmaintained, use [Biome](https://biomejs.dev/blog/annoucing-biome) instead.)\\n+---\\n+--- ```sh\\n+--- npm install [-g] rome\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rome', 'lsp-proxy' },\\n+  filetypes = {\\n+    'javascript',\\n+    'javascriptreact',\\n+    'json',\\n+    'typescript',\\n+    'typescript.tsx',\\n+    'typescriptreact',\\n+  },\\n+  root_markers = { 'package.json', 'node_modules', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rome.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rome.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/roslyn_ls.lua\\n@@ -0,0 +1,237 @@\\n+---@brief\\n+---\\n+--- https://github.com/dotnet/roslyn\\n+--\\n+-- To install the server, compile from source or download as nuget package.\\n+-- Go to `https://dev.azure.com/azure-public/vside/_artifacts/feed/vs-impl/NuGet/Microsoft.CodeAnalysis.LanguageServer.\\u003cplatform\\u003e/overview`\\n+-- replace `\\u003cplatform\\u003e` with one of the following `linux-x64`, `osx-x64`, `win-x64`, `neutral` (for more info on the download location see https://github.com/dotnet/roslyn/issues/71474#issuecomment-2177303207).\\n+-- Download and extract it (nuget's are zip files).\\n+-- - if you chose `neutral` nuget version, then you have to change the `cmd` like so:\\n+--   cmd = {\\n+--     'dotnet',\\n+--     '\\u003cmy_folder\\u003e/Microsoft.CodeAnalysis.LanguageServer.dll',\\n+--     '--logLevel', -- this property is required by the server\\n+--     'Information',\\n+--     '--extensionLogDirectory', -- this property is required by the server\\n+--     fs.joinpath(uv.os_tmpdir(), 'roslyn_ls/logs'),\\n+--     '--stdio',\\n+--   },\\n+--   where `\\u003cmy_folder\\u003e` has to be the folder you extracted the nuget package to.\\n+-- - for all other platforms put the extracted folder to neovim's PATH (`vim.env.PATH`)\\n+\\n+local uv = vim.uv\\n+local fs = vim.fs\\n+\\n+local group = vim.api.nvim_create_augroup('lspconfig.roslyn_ls', { clear = true })\\n+\\n+---@param client vim.lsp.Client\\n+---@param target string\\n+local function on_init_sln(client, target)\\n+  vim.notify('Initializing: ' .. target, vim.log.levels.TRACE, { title = 'roslyn_ls' })\\n+  ---@diagnostic disable-next-line: param-type-mismatch\\n+  client:notify('solution/open', {\\n+    solution = vim.uri_from_fname(target),\\n+  })\\n+end\\n+\\n+---@param client vim.lsp.Client\\n+---@param project_files string[]\\n+local function on_init_project(client, project_files)\\n+  vim.notify('Initializing: projects', vim.log.levels.TRACE, { title = 'roslyn_ls' })\\n+  ---@diagnostic disable-next-line: param-type-mismatch\\n+  client:notify('project/open', {\\n+    projects = vim.tbl_map(function(file)\\n+      return vim.uri_from_fname(file)\\n+    end, project_files),\\n+  })\\n+end\\n+\\n+---@param client vim.lsp.Client\\n+local function refresh_diagnostics(client)\\n+  local buffers = vim.lsp.get_buffers_by_client_id(client.id)\\n+  for _, buf in ipairs(buffers) do\\n+    if vim.api.nvim_buf_is_loaded(buf) then\\n+      client:request(\\n+        vim.lsp.protocol.Methods.textDocument_diagnostic,\\n+        { textDocument = vim.lsp.util.make_text_document_params(buf) },\\n+        nil,\\n+        buf\\n+      )\\n+    end\\n+  end\\n+end\\n+\\n+local function roslyn_handlers()\\n+  return {\\n+    ['workspace/projectInitializationComplete'] = function(_, _, ctx)\\n+      vim.notify('Roslyn project initialization complete', vim.log.levels.INFO, { title = 'roslyn_ls' })\\n+      local client = assert(vim.lsp.get_client_by_id(ctx.client_id))\\n+      refresh_diagnostics(client)\\n+      return vim.NIL\\n+    end,\\n+    ['workspace/_roslyn_projectNeedsRestore'] = function(_, result, ctx)\\n+      local client = assert(vim.lsp.get_client_by_id(ctx.client_id))\\n+\\n+      ---@diagnostic disable-next-line: param-type-mismatch\\n+      client:request('workspace/_roslyn_restore', result, function(err, response)\\n+        if err then\\n+          vim.notify(err.message, vim.log.levels.ERROR, { title = 'roslyn_ls' })\\n+        end\\n+        if response then\\n+          for _, v in ipairs(response) do\\n+            vim.notify(v.message, vim.log.levels.INFO, { title = 'roslyn_ls' })\\n+          end\\n+        end\\n+      end)\\n+\\n+      return vim.NIL\\n+    end,\\n+    ['razor/provideDynamicFileInfo'] = function(_, _, _)\\n+      vim.notify(\\n+        'Razor is not supported.\\\\nPlease use https://github.com/tris203/rzls.nvim',\\n+        vim.log.levels.WARN,\\n+        { title = 'roslyn_ls' }\\n+      )\\n+      return vim.NIL\\n+    end,\\n+  }\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  name = 'roslyn_ls',\\n+  offset_encoding = 'utf-8',\\n+  cmd = {\\n+    'Microsoft.CodeAnalysis.LanguageServer',\\n+    '--logLevel',\\n+    'Information',\\n+    '--extensionLogDirectory',\\n+    fs.joinpath(uv.os_tmpdir(), 'roslyn_ls/logs'),\\n+    '--stdio',\\n+  },\\n+  filetypes = { 'cs' },\\n+  handlers = roslyn_handlers(),\\n+\\n+  commands = {\\n+    ['roslyn.client.completionComplexEdit'] = function(command, ctx)\\n+      local client = assert(vim.lsp.get_client_by_id(ctx.client_id))\\n+      local args = command.arguments or {}\\n+      local uri, edit = args[1], args[2]\\n+\\n+      if uri and edit and edit.newText and edit.range then\\n+        local workspace_edit = {\\n+          changes = {\\n+            [uri.uri] = {\\n+              {\\n+                range = edit.range,\\n+                newText = edit.newText,\\n+              },\\n+            },\\n+          },\\n+        }\\n+        vim.lsp.util.apply_workspace_edit(workspace_edit, client.offset_encoding)\\n+      else\\n+        vim.notify('roslyn_ls: completionComplexEdit args not understood: ' .. vim.inspect(args), vim.log.levels.WARN)\\n+      end\\n+    end,\\n+  },\\n+\\n+  root_dir = function(bufnr, cb)\\n+    local bufname = vim.api.nvim_buf_get_name(bufnr)\\n+    -- don't try to find sln or csproj for files from libraries\\n+    -- outside of the project\\n+    if not bufname:match('^' .. fs.joinpath('/tmp/MetadataAsSource/')) then\\n+      -- try find solutions root first\\n+      local root_dir = fs.root(bufnr, function(fname, _)\\n+        return fname:match('%.sln[x]?$') ~= nil\\n+      end)\\n+\\n+      if not root_dir then\\n+        -- try find projects root\\n+        root_dir = fs.root(bufnr, function(fname, _)\\n+          return fname:match('%.csproj$') ~= nil\\n+        end)\\n+      end\\n+\\n+      if root_dir then\\n+        cb(root_dir)\\n+      end\\n+    end\\n+  end,\\n+  on_init = {\\n+    function(client)\\n+      local root_dir = client.config.root_dir\\n+\\n+      -- try load first solution we find\\n+      for entry, type in fs.dir(root_dir) do\\n+        if type == 'file' and (vim.endswith(entry, '.sln') or vim.endswith(entry, '.slnx')) then\\n+          on_init_sln(client, fs.joinpath(root_dir, entry))\\n+          return\\n+        end\\n+      end\\n+\\n+      -- if no solution is found load project\\n+      for entry, type in fs.dir(root_dir) do\\n+        if type == 'file' and vim.endswith(entry, '.csproj') then\\n+          on_init_project(client, { fs.joinpath(root_dir, entry) })\\n+        end\\n+      end\\n+    end,\\n+  },\\n+\\n+  on_attach = function(client, bufnr)\\n+    -- avoid duplicate autocmds for same buffer\\n+    if vim.api.nvim_get_autocmds({ buffer = bufnr, group = group })[1] then\\n+      return\\n+    end\\n+\\n+    vim.api.nvim_create_autocmd({ 'BufWritePost', 'InsertLeave' }, {\\n+      group = group,\\n+      buffer = bufnr,\\n+      callback = function()\\n+        refresh_diagnostics(client)\\n+      end,\\n+      desc = 'roslyn_ls: refresh diagnostics',\\n+    })\\n+  end,\\n+\\n+  capabilities = {\\n+    -- HACK: Doesn't show any diagnostics if we do not set this to true\\n+    textDocument = {\\n+      diagnostic = {\\n+        dynamicRegistration = true,\\n+      },\\n+    },\\n+  },\\n+  settings = {\\n+    ['csharp|background_analysis'] = {\\n+      dotnet_analyzer_diagnostics_scope = 'fullSolution',\\n+      dotnet_compiler_diagnostics_scope = 'fullSolution',\\n+    },\\n+    ['csharp|inlay_hints'] = {\\n+      csharp_enable_inlay_hints_for_implicit_object_creation = true,\\n+      csharp_enable_inlay_hints_for_implicit_variable_types = true,\\n+      csharp_enable_inlay_hints_for_lambda_parameter_types = true,\\n+      csharp_enable_inlay_hints_for_types = true,\\n+      dotnet_enable_inlay_hints_for_indexer_parameters = true,\\n+      dotnet_enable_inlay_hints_for_literal_parameters = true,\\n+      dotnet_enable_inlay_hints_for_object_creation_parameters = true,\\n+      dotnet_enable_inlay_hints_for_other_parameters = true,\\n+      dotnet_enable_inlay_hints_for_parameters = true,\\n+      dotnet_suppress_inlay_hints_for_parameters_that_differ_only_by_suffix = true,\\n+      dotnet_suppress_inlay_hints_for_parameters_that_match_argument_name = true,\\n+      dotnet_suppress_inlay_hints_for_parameters_that_match_method_intent = true,\\n+    },\\n+    ['csharp|symbol_search'] = {\\n+      dotnet_search_reference_assemblies = true,\\n+    },\\n+    ['csharp|completion'] = {\\n+      dotnet_show_name_completion_suggestions = true,\\n+      dotnet_show_completion_items_from_unimported_namespaces = true,\\n+      dotnet_provide_regex_completions = true,\\n+    },\\n+    ['csharp|code_lens'] = {\\n+      dotnet_enable_references_code_lens = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/roslyn_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/roslyn_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rpmspec.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://github.com/dcermak/rpm-spec-language-server\\n+---\\n+--- Language server protocol (LSP) support for RPM Spec files.\\n+---\\n+--- `rpm-spec-language-server` can be installed by running,\\n+---\\n+--- ```sh\\n+--- pip install rpm-spec-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rpm_lsp_server', '--stdio' },\\n+  filetypes = { 'spec' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rpmspec.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rpmspec.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rubocop.lua\\n@@ -0,0 +1,10 @@\\n+---@brief\\n+---\\n+--- https://github.com/rubocop/rubocop\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rubocop', '--lsp' },\\n+  filetypes = { 'ruby' },\\n+  root_markers = { 'Gemfile', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/rubocop.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/rubocop.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ruby_lsp.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- https://shopify.github.io/ruby-lsp/\\n+---\\n+--- This gem is an implementation of the language server protocol specification for\\n+--- Ruby, used to improve editor features.\\n+---\\n+--- Install the gem. There's no need to require it, since the server is used as a\\n+--- standalone executable.\\n+---\\n+--- ```sh\\n+--- gem install ruby-lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ruby-lsp' },\\n+  filetypes = { 'ruby', 'eruby' },\\n+  root_markers = { 'Gemfile', '.git' },\\n+  init_options = {\\n+    formatter = 'auto',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ruby_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ruby_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ruff.lua\\n@@ -0,0 +1,35 @@\\n+---@brief\\n+---\\n+--- https://github.com/astral-sh/ruff\\n+---\\n+--- A Language Server Protocol implementation for Ruff, an extremely fast Python linter and code formatter, written in Rust. It can be installed via `pip`.\\n+---\\n+--- ```sh\\n+--- pip install ruff\\n+--- ```\\n+---\\n+--- **Available in Ruff `v0.4.5` in beta and stabilized in Ruff `v0.5.3`.**\\n+---\\n+--- This is the new built-in language server written in Rust. It supports the same feature set as `ruff-lsp`, but with superior performance and no installation required. Note that the `ruff-lsp` server will continue to be maintained until further notice.\\n+---\\n+--- Server settings can be provided via:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('ruff', {\\n+---   init_options = {\\n+---     settings = {\\n+---       -- Server settings should go here\\n+---     }\\n+---   }\\n+--- })\\n+--- ```\\n+---\\n+--- Refer to the [documentation](https://docs.astral.sh/ruff/editors/) for more details.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ruff', 'server' },\\n+  filetypes = { 'python' },\\n+  root_markers = { 'pyproject.toml', 'ruff.toml', '.ruff.toml', '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ruff.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ruff.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ruff_lsp.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/astral-sh/ruff-lsp\\n+---\\n+--- A Language Server Protocol implementation for Ruff, an extremely fast Python linter and code transformation tool, written in Rust. It can be installed via pip.\\n+---\\n+--- ```sh\\n+--- pip install ruff-lsp\\n+--- ```\\n+---\\n+--- Extra CLI arguments for `ruff` can be provided via\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('ruff_lsp', {\\n+---   init_options = {\\n+---     settings = {\\n+---       -- Any extra CLI arguments for `ruff` go here.\\n+---       args = {},\\n+---     }\\n+---   }\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ruff-lsp' },\\n+  filetypes = { 'python' },\\n+  root_markers = { 'pyproject.toml', 'ruff.toml', '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ruff_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ruff_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/rune_languageserver.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://crates.io/crates/rune-languageserver\\n+---\\n+--- A language server for the [Rune](https://rune-rs.github.io/) Language,\\n+--- an embeddable dynamic programming language for Rust\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'rune-languageserver' },\\n+  filetypes