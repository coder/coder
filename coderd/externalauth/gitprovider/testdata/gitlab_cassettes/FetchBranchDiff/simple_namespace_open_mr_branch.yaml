   local fnlpath = vim.fs.joinpath(path, 'flsproject.fnl')\\n+      return (vim.uv.fs_stat(fnlpath) or {}).type == 'file'\\n+    end\\n+    on_dir(vim.iter(vim.fs.parents(fname)):find(has_fls_project_cfg) or vim.fs.root(0, '.git'))\\n+  end,\\n+  settings = {},\\n+  capabilities = {\\n+    offsetEncoding = { 'utf-8', 'utf-16' },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fennel_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fennel_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/fish_lsp.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/ndonfris/fish-lsp\\n+---\\n+--- A Language Server Protocol (LSP) tailored for the fish shell.\\n+--- This project aims to enhance the coding experience for fish,\\n+--- by introducing a suite of intelligent features like auto-completion,\\n+--- scope aware symbol analysis, per-token hover generation, and many others.\\n+---\\n+--- [homepage](https://www.fish-lsp.dev/)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'fish-lsp', 'start' },\\n+  filetypes = { 'fish' },\\n+  root_markers = { 'config.fish', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fish_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fish_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/flow.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://flow.org/\\n+--- https://github.com/facebook/flow\\n+---\\n+--- See below for how to setup Flow itself.\\n+--- https://flow.org/en/docs/install/\\n+---\\n+--- See below for lsp command options.\\n+---\\n+--- ```sh\\n+--- npx flow lsp --help\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'npx', '--no-install', 'flow', 'lsp' },\\n+  filetypes = { 'javascript', 'javascriptreact', 'javascript.jsx' },\\n+  root_markers = { '.flowconfig' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/flow.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/flow.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/flux_lsp.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/influxdata/flux-lsp\\n+--- `flux-lsp` can be installed via `cargo`:\\n+--- ```sh\\n+--- cargo install --git https://github.com/influxdata/flux-lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'flux-lsp' },\\n+  filetypes = { 'flux' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/flux_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/flux_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/foam_ls.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- https://github.com/FoamScience/foam-language-server\\n+---\\n+--- `foam-language-server` can be installed via `npm`\\n+--- ```sh\\n+--- npm install -g foam-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'foam-ls', '--stdio' },\\n+  filetypes = { 'foam', 'OpenFOAM' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(vim.iter(vim.fs.parents(fname)):find(function(path)\\n+      if vim.uv.fs_stat(path .. '/system/controlDict') then\\n+        return path\\n+      end\\n+    end))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/foam_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/foam_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/fortls.lua\\n@@ -0,0 +1,27 @@\\n+---@brief\\n+---\\n+--- https://fortls.fortran-lang.org/index.html\\n+---\\n+--- fortls is a Fortran Language Server, the server can be installed via pip\\n+---\\n+--- ```sh\\n+--- pip install fortls\\n+--- ```\\n+---\\n+--- Settings to the server can be passed either through the `cmd` option or through\\n+--- a local configuration file e.g. `.fortls`. For more information\\n+--- see the `fortls` [documentation](https://fortls.fortran-lang.org/options.html).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'fortls',\\n+    '--notify_init',\\n+    '--hover_signature',\\n+    '--hover_language=fortran',\\n+    '--use_signature_help',\\n+  },\\n+  filetypes = { 'fortran' },\\n+  root_markers = { '.fortls', '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fortls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fortls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/fsautocomplete.lua\\n@@ -0,0 +1,54 @@\\n+---@brief\\n+---\\n+--- https://github.com/fsharp/FsAutoComplete\\n+---\\n+--- Language Server for F# provided by FsAutoComplete (FSAC).\\n+---\\n+--- FsAutoComplete requires the [dotnet-sdk](https://dotnet.microsoft.com/download) to be installed.\\n+---\\n+--- The preferred way to install FsAutoComplete is with `dotnet tool install --global fsautocomplete`.\\n+---\\n+--- Instructions to compile from source are found on the main [repository](https://github.com/fsharp/FsAutoComplete).\\n+---\\n+--- You may also need to configure the filetype as Vim defaults to Forth for `*.fs` files:\\n+---\\n+--- `autocmd BufNewFile,BufRead *.fs,*.fsx,*.fsi set filetype=fsharp`\\n+---\\n+--- This is automatically done by plugins such as [PhilT/vim-fsharp](https://github.com/PhilT/vim-fsharp), [fsharp/vim-fsharp](https://github.com/fsharp/vim-fsharp), and [adelarsq/neofsharp.vim](https://github.com/adelarsq/neofsharp.vim).\\n+---\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'fsautocomplete', '--adaptive-lsp-server-enabled' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.sln', '*.fsproj', '.git')(fname))\\n+  end,\\n+  filetypes = { 'fsharp' },\\n+  init_options = {\\n+    AutomaticWorkspaceInit = true,\\n+  },\\n+  -- this recommended settings values taken from  https://github.com/ionide/FsAutoComplete?tab=readme-ov-file#settings\\n+  settings = {\\n+    FSharp = {\\n+      keywordsAutocomplete = true,\\n+      ExternalAutocomplete = false,\\n+      Linter = true,\\n+      UnionCaseStubGeneration = true,\\n+      UnionCaseStubGenerationBody = 'failwith \\\"Not Implemented\\\"',\\n+      RecordStubGeneration = true,\\n+      RecordStubGenerationBody = 'failwith \\\"Not Implemented\\\"',\\n+      InterfaceStubGeneration = true,\\n+      InterfaceStubGenerationObjectIdentifier = 'this',\\n+      InterfaceStubGenerationMethodBody = 'failwith \\\"Not Implemented\\\"',\\n+      UnusedOpensAnalyzer = true,\\n+      UnusedDeclarationsAnalyzer = true,\\n+      UseSdkScripts = true,\\n+      SimplifyNameAnalyzer = true,\\n+      ResolveNamespaces = true,\\n+      EnableReferenceCodeLens = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fsautocomplete.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fsautocomplete.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/fsharp_language_server.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- F# Language Server\\n+--- https://github.com/faldor20/fsharp-language-server\\n+---\\n+--- An implementation of the language server protocol using the F# Compiler Service.\\n+---\\n+--- Build the project from source and override the command path to location of DLL.\\n+---\\n+--- If filetype determination is not already performed by an available plugin ([PhilT/vim-fsharp](https://github.com/PhilT/vim-fsharp), [fsharp/vim-fsharp](https://github.com/fsharp/vim-fsharp), and [adelarsq/neofsharp.vim](https://github.com/adelarsq/neofsharp.vim).\\n+--- ), then the following must be added to initialization configuration:\\n+---\\n+---\\n+--- `autocmd BufNewFile,BufRead *.fs,*.fsx,*.fsi set filetype=fsharp`\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'dotnet', 'FSharpLanguageServer.dll' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.sln', '*.fsproj', '.git')(fname))\\n+  end,\\n+  filetypes = { 'fsharp' },\\n+  init_options = {\\n+    AutomaticWorkspaceInit = true,\\n+  },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fsharp_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fsharp_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/fstar.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/FStarLang/FStar\\n+---\\n+--- LSP support is included in FStar. Make sure `fstar.exe` is in your PATH.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'fstar.exe', '--lsp' },\\n+  filetypes = { 'fstar' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/fstar.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/fstar.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/futhark_lsp.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/diku-dk/futhark\\n+---\\n+--- Futhark Language Server\\n+---\\n+--- This language server comes with the futhark compiler and is run with the command\\n+--- ```\\n+--- futhark lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'futhark', 'lsp' },\\n+  filetypes = { 'futhark', 'fut' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/futhark_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/futhark_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gdscript.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/godotengine/godot\\n+---\\n+--- Language server for GDScript, used by Godot Engine.\\n+\\n+local port = os.getenv 'GDScript_Port' or '6005'\\n+local cmd = vim.lsp.rpc.connect('127.0.0.1', tonumber(port))\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = cmd,\\n+  filetypes = { 'gd', 'gdscript', 'gdscript3' },\\n+  root_markers = { 'project.godot', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gdscript.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gdscript.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gdshader_lsp.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/godofavacyn/gdshader-lsp\\n+---\\n+--- A language server for the Godot Shading language.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gdshader-lsp', '--stdio' },\\n+  filetypes = { 'gdshader', 'gdshaderinc' },\\n+  root_markers = { 'project.godot' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gdshader_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gdshader_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gh_actions_ls.lua\\n@@ -0,0 +1,57 @@\\n+---@brief\\n+--- https://github.com/lttb/gh-actions-language-server\\n+---\\n+--- Language server for GitHub Actions.\\n+---\\n+--- The projects [forgejo](https://forgejo.org/) and [gitea](https://about.gitea.com/)\\n+--- design their actions to be as compatible to github as possible\\n+--- with only [a few differences](https://docs.gitea.com/usage/actions/comparison#unsupported-workflows-syntax) between the systems.\\n+--- The `gh_actions_ls` is therefore enabled for those `yaml` files as well.\\n+---\\n+--- The `gh-actions-language-server` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g gh-actions-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gh-actions-language-server', '--stdio' },\\n+  filetypes = { 'yaml' },\\n+\\n+  -- `root_dir` ensures that the LSP does not attach to all yaml files\\n+  root_dir = function(bufnr, on_dir)\\n+    local parent = vim.fs.dirname(vim.api.nvim_buf_get_name(bufnr))\\n+    if\\n+      vim.endswith(parent, '/.github/workflows')\\n+      or vim.endswith(parent, '/.forgejo/workflows')\\n+      or vim.endswith(parent, '/.gitea/workflows')\\n+    then\\n+      on_dir(parent)\\n+    end\\n+  end,\\n+  handlers = {\\n+    ['actions/readFile'] = function(_, result)\\n+      if type(result.path) ~= 'string' then\\n+        return nil, nil\\n+      end\\n+      local file_path = vim.uri_to_fname(result.path)\\n+      if vim.fn.filereadable(file_path) == 1 then\\n+        local f = assert(io.open(file_path, 'r'))\\n+        local text = f:read('*a')\\n+        f:close()\\n+\\n+        return text, nil\\n+      end\\n+      return nil, nil\\n+    end,\\n+  },\\n+  init_options = {}, -- needs to be present https://github.com/neovim/nvim-lspconfig/pull/3713#issuecomment-2857394868\\n+  capabilities = {\\n+    workspace = {\\n+      didChangeWorkspaceFolders = {\\n+        dynamicRegistration = true,\\n+      },\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gh_actions_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gh_actions_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ghcide.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/digital-asset/ghcide\\n+---\\n+--- A library for building Haskell IDE tooling.\\n+--- \\\"ghcide\\\" isn't for end users now. Use \\\"haskell-language-server\\\" instead of \\\"ghcide\\\".\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ghcide', '--lsp' },\\n+  filetypes = { 'haskell', 'lhaskell' },\\n+  root_markers = { 'stack.yaml', 'hie-bios', 'BUILD.bazel', 'cabal.config', 'package.yaml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ghcide.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ghcide.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ghdl_ls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/ghdl/ghdl-language-server\\n+---\\n+--- A language server for VHDL, using ghdl as its backend.\\n+---\\n+--- `ghdl-ls` is part of pyghdl, for installation instructions see\\n+--- [the upstream README](https://github.com/ghdl/ghdl/tree/master/pyGHDL/lsp).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ghdl-ls' },\\n+  filetypes = { 'vhdl' },\\n+  root_markers = { 'hdl-prj.json', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ghdl_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ghdl_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ginko_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+---`ginko_ls` is meant to be a feature-complete language server for device-trees.\\n+--- Language servers can be used in many editors, such as Visual Studio Code, Emacs\\n+--- or Vim\\n+---\\n+--- Install `ginko_ls` from https://github.com/Schottkyc137/ginko and add it to path\\n+---\\n+--- `ginko_ls` doesn't require any configuration.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ginko_ls' },\\n+  filetypes = { 'dts' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ginko_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ginko_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gitlab_ci_ls.lua\\n@@ -0,0 +1,26 @@\\n+---@brief\\n+---\\n+--- https://github.com/alesbrelih/gitlab-ci-ls\\n+---\\n+--- Language Server for Gitlab CI\\n+---\\n+--- `gitlab-ci-ls` can be installed via cargo:\\n+--- cargo install gitlab-ci-ls\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+local cache_dir = vim.uv.os_homedir() .. '/.cache/gitlab-ci-ls/'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gitlab-ci-ls' },\\n+  filetypes = { 'yaml.gitlab' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('.git', '.gitlab*')(fname))\\n+  end,\\n+  init_options = {\\n+    cache_path = cache_dir,\\n+    log_path = cache_dir .. '/log/gitlab-ci-ls.log',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gitlab_ci_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gitlab_ci_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/glasgow.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/nolanderc/glasgow\\n+---\\n+--- Provides language features for WGSL (WebGPU Shading Language):\\n+--- - Completions:\\n+---     - Local functions/variables/types.\\n+---     - Fields and swizzles.\\n+---     - Builtin types and functions (`dot`, `reflect`, `textureSample`, `vec3`, `mat4x2`, etc.)\\n+--- - Hover Documentation:\\n+---     - Function signatures.\\n+---     - Variable types.\\n+---     - Includes builtin types and functions. Text is taken from the WGSL specification.\\n+--- - Goto Definition\\n+--- - Find all References\\n+--- - Rename\\n+--- - Formatter\\n+---\\n+--- `glasgow` can be installed via `cargo`:\\n+--- ```sh\\n+--- cargo install glasgow\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'glasgow' },\\n+  filetypes = { 'wgsl' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/glasgow.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/glasgow.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gleam.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/gleam-lang/gleam\\n+---\\n+--- A language server for Gleam Programming Language.\\n+---\\n+--- It comes with the Gleam compiler, for installation see: [Installing Gleam](https://gleam.run/getting-started/installing/)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gleam', 'lsp' },\\n+  filetypes = { 'gleam' },\\n+  root_markers = { 'gleam.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gleam.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gleam.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/glint.lua\\n@@ -0,0 +1,54 @@\\n+---@brief\\n+---\\n+--- https://github.com/typed-ember/glint\\n+--- https://typed-ember.gitbook.io/glint/\\n+--- `glint-language-server` is installed when adding `@glint/core` to your project's devDependencies:\\n+---\\n+--- ```sh\\n+--- npm install @glint/core --save-dev\\n+--- yarn add -D @glint/core\\n+---\\n+--- This configuration uses the local installation of `glint-language-server`\\n+--- (found in the `node_modules` directory of your project).\\n+---\\n+--- To use a global installation of `glint-language-server`,\\n+--- set the `init_options.glint.useGlobal` to `true`.\\n+---\\n+--- vim.lsp.config('glint', {\\n+---   init_options = {\\n+---     glint = {\\n+---       useGlobal = true,\\n+---     },\\n+---   },\\n+--- })\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = function(dispatchers, config)\\n+    local cmd = (config.init_options.glint.useGlobal or not config.root_dir) and { 'glint-language-server' }\\n+      or { config.root_dir .. '/node_modules/.bin/glint-language-server' }\\n+    return vim.lsp.rpc.start(cmd, dispatchers)\\n+  end,\\n+  init_options = {\\n+    glint = {\\n+      useGlobal = false,\\n+    },\\n+  },\\n+  filetypes = {\\n+    'html.handlebars',\\n+    'handlebars',\\n+    'typescript',\\n+    'typescript.glimmer',\\n+    'javascript',\\n+    'javascript.glimmer',\\n+  },\\n+  root_markers = {\\n+    '.glintrc.yml',\\n+    '.glintrc',\\n+    '.glintrc.json',\\n+    '.glintrc.js',\\n+    'glint.config.js',\\n+    'package.json',\\n+  },\\n+  workspace_required = true,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/glint.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/glint.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/glsl_analyzer.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/nolanderc/glsl_analyzer\\n+---\\n+--- Language server for GLSL\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'glsl_analyzer' },\\n+  filetypes = { 'glsl', 'vert', 'tesc', 'tese', 'frag', 'geom', 'comp' },\\n+  root_markers = { '.git' },\\n+  capabilities = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/glsl_analyzer.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/glsl_analyzer.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/glslls.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- https://github.com/svenstaro/glsl-language-server\\n+---\\n+--- Language server implementation for GLSL\\n+---\\n+--- `glslls` can be compiled and installed manually, or, if your distribution has access to the AUR,\\n+--- via the `glsl-language-server` AUR package\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'glslls', '--stdin' },\\n+  filetypes = { 'glsl', 'vert', 'tesc', 'tese', 'frag', 'geom', 'comp' },\\n+  root_markers = { '.git' },\\n+  capabilities = {\\n+    textDocument = {\\n+      completion = {\\n+        editsNearCursor = true,\\n+      },\\n+    },\\n+    offsetEncoding = { 'utf-8', 'utf-16' },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/glslls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/glslls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gnls.lua\\n@@ -0,0 +1,21 @@\\n+---@brief\\n+---\\n+--- https://github.com/microsoft/gnls\\n+---\\n+--- Microsoft's language server for GN build files.\\n+---\\n+--- Assuming there is a `gnls` script somewhere in your `$PATH`, containing\\n+--- for example:\\n+---\\n+--- ```shell\\n+--- GNLS_SRC_DIR=\\u003c/path/to/gnls\\u003e\\n+---\\n+--- exec node ${GNLS_SRC_DIR}/build/server.js $@\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gnls', '--stdio' },\\n+  filetypes = { 'gn' },\\n+  root_markers = { '.gn', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gnls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gnls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/golangci_lint_ls.lua\\n@@ -0,0 +1,52 @@\\n+---@brief\\n+---\\n+--- Combination of both lint server and client\\n+---\\n+--- https://github.com/nametake/golangci-lint-langserver\\n+--- https://github.com/golangci/golangci-lint\\n+---\\n+---\\n+--- Installation of binaries needed is done via\\n+---\\n+--- ```\\n+--- go install github.com/nametake/golangci-lint-langserver@latest\\n+--- go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'golangci-lint-langserver' },\\n+  filetypes = { 'go', 'gomod' },\\n+  init_options = {\\n+    command = { 'golangci-lint', 'run', '--output.json.path=stdout', '--show-stats=false' },\\n+  },\\n+  root_markers = {\\n+    '.golangci.yml',\\n+    '.golangci.yaml',\\n+    '.golangci.toml',\\n+    '.golangci.json',\\n+    'go.work',\\n+    'go.mod',\\n+    '.git',\\n+  },\\n+  before_init = function(_, config)\\n+    -- Add support for golangci-lint V1 (in V2 `--out-format=json` was replaced by\\n+    -- `--output.json.path=stdout`).\\n+    local v1, v2 = false, false\\n+    -- PERF: `golangci-lint version` is very slow (about 0.1 sec) so let's find\\n+    -- version using `go version -m $(which golangci-lint) | grep '^\\\\smod'`.\\n+    if vim.fn.executable 'go' == 1 then\\n+      local exe = vim.fn.exepath 'golangci-lint'\\n+      local version = vim.system({ 'go', 'version', '-m', exe }):wait()\\n+      v1 = string.match(version.stdout, '\\\\tmod\\\\tgithub.com/golangci/golangci%-lint\\\\t')\\n+      v2 = string.match(version.stdout, '\\\\tmod\\\\tgithub.com/golangci/golangci%-lint/v2\\\\t')\\n+    end\\n+    if not v1 and not v2 then\\n+      local version = vim.system({ 'golangci-lint', 'version' }):wait()\\n+      v1 = string.match(version.stdout, 'version v?1%.')\\n+    end\\n+    if v1 then\\n+      config.init_options.command = { 'golangci-lint', 'run', '--out-format', 'json' }\\n+    end\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/golangci_lint_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/golangci_lint_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gopls.lua\\n@@ -0,0 +1,99 @@\\n+---@brief\\n+---\\n+--- https://github.com/golang/tools/tree/master/gopls\\n+---\\n+--- Google's lsp server for golang.\\n+\\n+--- @class go_dir_custom_args\\n+---\\n+--- @field envvar_id string\\n+---\\n+--- @field custom_subdir string?\\n+\\n+local mod_cache = nil\\n+local std_lib = nil\\n+\\n+---@param custom_args go_dir_custom_args\\n+---@param on_complete fun(dir: string | nil)\\n+local function identify_go_dir(custom_args, on_complete)\\n+  local cmd = { 'go', 'env', custom_args.envvar_id }\\n+  vim.system(cmd, { text = true }, function(output)\\n+    local res = vim.trim(output.stdout or '')\\n+    if output.code == 0 and res ~= '' then\\n+      if custom_args.custom_subdir and custom_args.custom_subdir ~= '' then\\n+        res = res .. custom_args.custom_subdir\\n+      end\\n+      on_complete(res)\\n+    else\\n+      vim.schedule(function()\\n+        vim.notify(\\n+          ('[gopls] identify ' .. custom_args.envvar_id .. ' dir cmd failed with code %d: %s\\\\n%s'):format(\\n+            output.code,\\n+            vim.inspect(cmd),\\n+            output.stderr\\n+          )\\n+        )\\n+      end)\\n+      on_complete(nil)\\n+    end\\n+  end)\\n+end\\n+\\n+---@return string?\\n+local function get_std_lib_dir()\\n+  if std_lib and std_lib ~= '' then\\n+    return std_lib\\n+  end\\n+\\n+  identify_go_dir({ envvar_id = 'GOROOT', custom_subdir = '/src' }, function(dir)\\n+    if dir then\\n+      std_lib = dir\\n+    end\\n+  end)\\n+  return std_lib\\n+end\\n+\\n+---@return string?\\n+local function get_mod_cache_dir()\\n+  if mod_cache and mod_cache ~= '' then\\n+    return mod_cache\\n+  end\\n+\\n+  identify_go_dir({ envvar_id = 'GOMODCACHE' }, function(dir)\\n+    if dir then\\n+      mod_cache = dir\\n+    end\\n+  end)\\n+  return mod_cache\\n+end\\n+\\n+---@param fname string\\n+---@return string?\\n+local function get_root_dir(fname)\\n+  if mod_cache and fname:sub(1, #mod_cache) == mod_cache then\\n+    local clients = vim.lsp.get_clients({ name = 'gopls' })\\n+    if #clients \\u003e 0 then\\n+      return clients[#clients].config.root_dir\\n+    end\\n+  end\\n+  if std_lib and fname:sub(1, #std_lib) == std_lib then\\n+    local clients = vim.lsp.get_clients({ name = 'gopls' })\\n+    if #clients \\u003e 0 then\\n+      return clients[#clients].config.root_dir\\n+    end\\n+  end\\n+  return vim.fs.root(fname, 'go.work') or vim.fs.root(fname, 'go.mod') or vim.fs.root(fname, '.git')\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'gopls' },\\n+  filetypes = { 'go', 'gomod', 'gowork', 'gotmpl' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    get_mod_cache_dir()\\n+    get_std_lib_dir()\\n+    -- see: https://github.com/neovim/nvim-lspconfig/issues/804\\n+    on_dir(get_root_dir(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gopls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gopls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/gradle_ls.lua\\n@@ -0,0 +1,28 @@\\n+---@brief\\n+---\\n+--- https://github.com/microsoft/vscode-gradle\\n+---\\n+--- Microsoft's lsp server for gradle files\\n+---\\n+--- If you're setting this up manually, build vscode-gradle using `./gradlew installDist` and point `cmd` to the `gradle-language-server` generated in the build directory\\n+\\n+local bin_name = 'gradle-language-server'\\n+if vim.fn.has 'win32' == 1 then\\n+  bin_name = bin_name .. '.bat'\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'groovy' },\\n+  root_markers = {\\n+    'settings.gradle', -- Gradle (multi-project)\\n+    'build.gradle', -- Gradle\\n+  },\\n+  cmd = { bin_name },\\n+  -- gradle-language-server expects init_options.settings to be defined\\n+  init_options = {\\n+    settings = {\\n+      gradleWrapperEnabled = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/gradle_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/gradle_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/grammarly.lua\\n@@ -0,0 +1,26 @@\\n+---@brief\\n+---\\n+--- https://github.com/znck/grammarly\\n+---\\n+--- `grammarly-languageserver` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm i -g grammarly-languageserver\\n+--- ```\\n+---\\n+--- WARNING: Since this language server uses Grammarly's API, any document you open with it running is shared with them. Please evaluate their [privacy policy](https://www.grammarly.com/privacy-policy) before using this.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'grammarly-languageserver', '--stdio' },\\n+  filetypes = { 'markdown' },\\n+  root_markers = { '.git' },\\n+  handlers = {\\n+    ['$/updateDocumentState'] = function()\\n+      return ''\\n+    end,\\n+  },\\n+  init_options = {\\n+    clientId = 'client_BaDkMgx4X19X9UxxYRCXZo',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/grammarly.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/grammarly.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/graphql.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- https://github.com/graphql/graphiql/tree/main/packages/graphql-language-service-cli\\n+---\\n+--- `graphql-lsp` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g graphql-language-service-cli\\n+--- ```\\n+---\\n+--- Note that you must also have [the graphql package](https://github.com/graphql/graphql-js) installed within your project and create a [GraphQL config file](https://the-guild.dev/graphql/config/docs).\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'graphql-lsp', 'server', '-m', 'stream' },\\n+  filetypes = { 'graphql', 'typescriptreact', 'javascriptreact' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('.graphqlrc*', '.graphql.config.*', 'graphql.config.*')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/graphql.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/graphql.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/groovyls.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/prominic/groovy-language-server.git\\n+---\\n+--- Requirements:\\n+---  - Linux/macOS (for now)\\n+---  - Java 11+\\n+---\\n+--- `groovyls` can be installed by following the instructions [here](https://github.com/prominic/groovy-language-server.git#build).\\n+---\\n+--- If you have installed groovy language server, you can set the `cmd` custom path as follow:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('groovyls', {\\n+---     -- Unix\\n+---     cmd = { \\\"java\\\", \\\"-jar\\\", \\\"path/to/groovyls/groovy-language-server-all.jar\\\" },\\n+---     ...\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'java',\\n+    '-jar',\\n+    'groovy-language-server-all.jar',\\n+  },\\n+  filetypes = { 'groovy' },\\n+  root_markers = { 'Jenkinsfile', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/groovyls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/groovyls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/guile_ls.lua\\n@@ -0,0 +1,21 @@\\n+---@brief\\n+---\\n+--- https://codeberg.org/rgherdt/scheme-lsp-server\\n+---\\n+--- The recommended way is to install guile-lsp-server is using Guix. Unfortunately it is still not available at the official Guix channels, but you can use the provided channel guix.scm in the repo:\\n+--- ```sh\\n+--- guix package -f guix.scm\\n+--- ```\\n+---\\n+--- Checkout the repo for more info.\\n+---\\n+--- Note: This LSP will start on `scheme.guile` filetype. You can set this file type using `:help modeline` or adding https://gitlab.com/HiPhish/guile.vim to your plugins to automatically set it.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'guile-lsp-server' },\\n+  filetypes = {\\n+    'scheme.guile',\\n+  },\\n+  root_markers = { 'guix.scm', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/guile_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/guile_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/harper_ls.lua\\n@@ -0,0 +1,51 @@\\n+---@brief\\n+---\\n+--- https://github.com/automattic/harper\\n+---\\n+--- The language server for Harper, the slim, clean language checker for developers.\\n+---\\n+--- See our [documentation](https://writewithharper.com/docs/integrations/neovim) for more information on settings.\\n+---\\n+--- In short, they should look something like this:\\n+--- ```lua\\n+--- vim.lsp.config('harper_ls', {\\n+---   settings = {\\n+---     [\\\"harper-ls\\\"] = {\\n+---       userDictPath = \\\"~/dict.txt\\\"\\n+---     }\\n+---   },\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'harper-ls', '--stdio' },\\n+  filetypes = {\\n+    'c',\\n+    'cpp',\\n+    'cs',\\n+    'gitcommit',\\n+    'go',\\n+    'html',\\n+    'java',\\n+    'javascript',\\n+    'lua',\\n+    'markdown',\\n+    'nix',\\n+    'python',\\n+    'ruby',\\n+    'rust',\\n+    'swift',\\n+    'toml',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'haskell',\\n+    'cmake',\\n+    'typst',\\n+    'php',\\n+    'dart',\\n+    'clojure',\\n+    'sh',\\n+  },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/harper_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/harper_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hdl_checker.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/suoto/hdl_checker\\n+--- Language server for hdl-checker.\\n+--- Install using: `pip install hdl-checker --upgrade`\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hdl_checker', '--lsp' },\\n+  filetypes = { 'vhdl', 'verilog', 'systemverilog' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hdl_checker.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hdl_checker.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/helm_ls.lua\\n@@ -0,0 +1,25 @@\\n+---@brief\\n+---\\n+--- https://github.com/mrjosh/helm-ls\\n+---\\n+--- Helm Language server. (This LSP is in early development)\\n+---\\n+--- `helm Language server` can be installed by following the instructions [here](https://github.com/mrjosh/helm-ls).\\n+---\\n+--- The default `cmd` assumes that the `helm_ls` binary can be found in `$PATH`.\\n+---\\n+--- If need Helm file highlight use [vim-helm](https://github.com/towolf/vim-helm) plugin.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'helm_ls', 'serve' },\\n+  filetypes = { 'helm', 'yaml.helm-values' },\\n+  root_markers = { 'Chart.yaml' },\\n+  capabilities = {\\n+    workspace = {\\n+      didChangeWatchedFiles = {\\n+        dynamicRegistration = true,\\n+      },\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/helm_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/helm_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/herb_ls.lua\\n@@ -0,0 +1,29 @@\\n+---@brief\\n+---\\n+--- https://www.npmjs.com/package/@herb-tools/language-server\\n+--- https://github.com/marcoroth/herb\\n+---\\n+--- HTML+ERB (HTML + Embedded Ruby)\\n+--- Powerful and seamless HTML-aware ERB parsing and tooling.\\n+---\\n+--- Herb is designed from the ground up to deeply understand `.html.erb` files,\\n+--- preserving both HTML and embedded Ruby structure without losing any details.\\n+---\\n+--- `herb-language-server` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g @herb-tools/language-server\\n+--- ```\\n+---\\n+--- or via `yarn`:\\n+---\\n+--- ```sh\\n+--- yarn global add @herb-tools/language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'herb-language-server', '--stdio' },\\n+  filetypes = { 'html', 'eruby' },\\n+  root_markers = { 'Gemfile', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/herb_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/herb_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hhvm.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- Language server for programs written in Hack\\n+--- https://hhvm.com/\\n+--- https://github.com/facebook/hhvm\\n+--- See below for how to setup HHVM \\u0026 typechecker:\\n+--- https://docs.hhvm.com/hhvm/getting-started/getting-started\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hh_client', 'lsp' },\\n+  filetypes = { 'php', 'hack' },\\n+  root_markers = { '.hhconfig' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hhvm.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hhvm.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hie.lua\\n@@ -0,0 +1,25 @@\\n+---@brief\\n+---\\n+--- https://github.com/haskell/haskell-ide-engine\\n+---\\n+--- the following init_options are supported (see https://github.com/haskell/haskell-ide-engine#configuration):\\n+--- ```lua\\n+--- init_options = {\\n+---   languageServerHaskell = {\\n+---     hlintOn = bool;\\n+---     maxNumberOfProblems = number;\\n+---     diagnosticsDebounceDuration = number;\\n+---     liquidOn = bool (default false);\\n+---     completionSnippetsOn = bool (default true);\\n+---     formatOnImportOn = bool (default true);\\n+---     formattingProvider = string (default \\\"brittany\\\", alternate \\\"floskell\\\");\\n+---   }\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hie-wrapper', '--lsp' },\\n+  filetypes = { 'haskell' },\\n+  root_markers = { 'stack.yaml', 'package.yaml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hie.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hie.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hlasm.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- `hlasm_language_server` is a language server for the High Level Assembler language used on IBM SystemZ mainframes.\\n+---\\n+--- To learn how to configure the HLASM language server, see the [HLASM Language Support documentation](https://github.com/eclipse-che4z/che-che4z-lsp-for-hlasm).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hlasm_language_server' },\\n+  filetypes = { 'hlasm' },\\n+  root_markers = { '.hlasmplugin' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hlasm.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hlasm.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hls.lua\\n@@ -0,0 +1,31 @@\\n+---@brief\\n+---\\n+--- https://github.com/haskell/haskell-language-server\\n+---\\n+--- Haskell Language Server\\n+---\\n+--- If you are using HLS 1.9.0.0, enable the language server to launch on Cabal files as well:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('hls', {\\n+---   filetypes = { 'haskell', 'lhaskell', 'cabal' },\\n+--- })\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'haskell-language-server-wrapper', '--lsp' },\\n+  filetypes = { 'haskell', 'lhaskell' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('hie.yaml', 'stack.yaml', 'cabal.project', '*.cabal', 'package.yaml')(fname))\\n+  end,\\n+  settings = {\\n+    haskell = {\\n+      formattingProvider = 'ormolu',\\n+      cabalFormattingProvider = 'cabalfmt',\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hoon_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/urbit/hoon-language-server\\n+---\\n+--- A language server for Hoon.\\n+---\\n+--- The language server can be installed via `npm install -g @hoon-language-server`\\n+---\\n+--- Start a fake ~zod with `urbit -F zod`.\\n+--- Start the language server at the Urbit Dojo prompt with: `|start %language-server`\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hoon-language-server' },\\n+  filetypes = { 'hoon' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hoon_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hoon_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/html.lua\\n@@ -0,0 +1,36 @@\\n+---@brief\\n+---\\n+--- https://github.com/hrsh7th/vscode-langservers-extracted\\n+---\\n+--- `vscode-html-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm i -g vscode-langservers-extracted\\n+--- ```\\n+---\\n+--- Neovim does not currently include built-in snippets. `vscode-html-language-server` only provides completions when snippet support is enabled.\\n+--- To enable completion, install a snippet plugin and add the following override to your language client capabilities during setup.\\n+---\\n+--- The code-formatting feature of the lsp can be controlled with the `provideFormatter` option.\\n+---\\n+--- ```lua\\n+--- --Enable (broadcasting) snippet capability for completion\\n+--- local capabilities = vim.lsp.protocol.make_client_capabilities()\\n+--- capabilities.textDocument.completion.completionItem.snippetSupport = true\\n+---\\n+--- vim.lsp.config('html', {\\n+---   capabilities = capabilities,\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'vscode-html-language-server', '--stdio' },\\n+  filetypes = { 'html', 'templ' },\\n+  root_markers = { 'package.json', '.git' },\\n+  settings = {},\\n+  init_options = {\\n+    provideFormatter = true,\\n+    embeddedLanguages = { css = true, javascript = true },\\n+    configurationSection = { 'html', 'css', 'javascript' },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/html.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/html.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/htmx.lua\\n@@ -0,0 +1,64 @@\\n+---@brief\\n+---\\n+--- https://github.com/ThePrimeagen/htmx-lsp\\n+---\\n+--- `htmx-lsp` can be installed via `cargo`:\\n+--- ```sh\\n+--- cargo install htmx-lsp\\n+--- ```\\n+---\\n+--- Lsp is still very much work in progress and experimental. Use at your own risk.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'htmx-lsp' },\\n+  filetypes = { -- filetypes copied and adjusted from tailwindcss-intellisense\\n+    -- html\\n+    'aspnetcorerazor',\\n+    'astro',\\n+    'astro-markdown',\\n+    'blade',\\n+    'clojure',\\n+    'django-html',\\n+    'htmldjango',\\n+    'edge',\\n+    'eelixir', -- vim ft\\n+    'elixir',\\n+    'ejs',\\n+    'erb',\\n+    'eruby', -- vim ft\\n+    'gohtml',\\n+    'gohtmltmpl',\\n+    'haml',\\n+    'handlebars',\\n+    'hbs',\\n+    'html',\\n+    'htmlangular',\\n+    'html-eex',\\n+    'heex',\\n+    'jade',\\n+    'leaf',\\n+    'liquid',\\n+    'markdown',\\n+    'mdx',\\n+    'mustache',\\n+    'njk',\\n+    'nunjucks',\\n+    'php',\\n+    'razor',\\n+    'slim',\\n+    'twig',\\n+    -- js\\n+    'javascript',\\n+    'javascriptreact',\\n+    'reason',\\n+    'rescript',\\n+    'typescript',\\n+    'typescriptreact',\\n+    -- mixed\\n+    'vue',\\n+    'svelte',\\n+    'templ',\\n+  },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/htmx.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/htmx.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hydra_lsp.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/Retsediv/hydra-lsp\\n+---\\n+--- LSP for Hydra Python package config files.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hydra-lsp' },\\n+  filetypes = { 'yaml' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hydra_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hydra_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/hyprls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/hyprland-community/hyprls\\n+---\\n+--- `hyprls` can be installed via `go`:\\n+--- ```sh\\n+--- go install github.com/hyprland-community/hyprls/cmd/hyprls@latest\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'hyprls', '--stdio' },\\n+  filetypes = { 'hyprlang' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/hyprls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/hyprls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/idris2_lsp.lua\\n@@ -0,0 +1,42 @@\\n+---@brief\\n+---\\n+--- https://github.com/idris-community/idris2-lsp\\n+---\\n+--- The Idris 2 language server.\\n+---\\n+--- Plugins for the Idris 2 filetype include\\n+--- [Idris2-Vim](https://github.com/edwinb/idris2-vim) (fewer features, stable) and\\n+--- [Nvim-Idris2](https://github.com/ShinKage/nvim-idris2) (cutting-edge,\\n+--- experimental).\\n+---\\n+--- Idris2-Lsp requires a build of Idris 2 that includes the \\\"Idris 2 API\\\" package.\\n+--- Package managers with known support for this build include the\\n+--- [AUR](https://aur.archlinux.org/packages/idris2/) and\\n+--- [Homebrew](https://formulae.brew.sh/formula/idris2#default).\\n+---\\n+--- If your package manager does not support the Idris 2 API, you will need to build\\n+--- Idris 2 from source. Refer to the\\n+--- [the Idris 2 installation instructions](https://github.com/idris-lang/Idris2/blob/main/INSTALL.md)\\n+--- for details.  Steps 5 and 8 are listed as \\\"optional\\\" in that guide, but they are\\n+--- necessary in order to make the Idris 2 API available.\\n+---\\n+--- You need to install a version of Idris2-Lsp that is compatible with your\\n+--- version of Idris 2. There should be a branch corresponding to every released\\n+--- Idris 2 version after v0.4.0. Use the latest commit on that branch. For example,\\n+--- if you have Idris v0.5.1, you should use the v0.5.1 branch of Idris2-Lsp.\\n+---\\n+--- If your Idris 2 version is newer than the newest Idris2-Lsp branch, use the\\n+--- latest commit on the `master` branch, and set a reminder to check the Idris2-Lsp\\n+--- repo for the release of a compatible versioned branch.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'idris2-lsp' },\\n+  filetypes = { 'idris2' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern '*.ipkg'(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/idris2_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/idris2_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/intelephense.lua\\n@@ -0,0 +1,33 @@\\n+---@brief\\n+---\\n+--- https://intelephense.com/\\n+---\\n+--- `intelephense` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g intelephense\\n+--- ```\\n+---\\n+--- ```lua\\n+--- -- See https://github.com/bmewburn/intelephense-docs/blob/master/installation.md#initialisation-options\\n+--- init_options = {\\n+---   storagePath = …, -- Optional absolute path to storage dir. Defaults to os.tmpdir().\\n+---   globalStoragePath = …, -- Optional absolute path to a global storage dir. Defaults to os.homedir().\\n+---   licenceKey = …, -- Optional licence key or absolute path to a text file containing the licence key.\\n+---   clearCache = …, -- Optional flag to clear server state. State can also be cleared by deleting {storagePath}/intelephense\\n+--- }\\n+--- -- See https://github.com/bmewburn/intelephense-docs\\n+--- settings = {\\n+---   intelephense = {\\n+---     files = {\\n+---       maxSize = 1000000;\\n+---     };\\n+---   };\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'intelephense', '--stdio' },\\n+  filetypes = { 'php' },\\n+  root_markers = { '.git', 'composer.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/intelephense.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/intelephense.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/janet_lsp.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/CFiggers/janet-lsp\\n+---\\n+--- A Language Server Protocol implementation for Janet.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'janet-lsp',\\n+    '--stdio',\\n+  },\\n+  filetypes = { 'janet' },\\n+  root_markers = { 'project.janet', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/janet_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/janet_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/java_language_server.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/georgewfraser/java-language-server\\n+---\\n+--- Java language server\\n+---\\n+--- Point `cmd` to `lang_server_linux.sh` or the equivalent script for macOS/Windows provided by java-language-server\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'java' },\\n+  root_markers = { 'build.gradle', 'build.gradle.kts', 'pom.xml', '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/java_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/java_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jdtls.lua\\n@@ -0,0 +1,93 @@\\n+---@brief\\n+---\\n+--- https://projects.eclipse.org/projects/eclipse.jdt.ls\\n+---\\n+--- Language server for Java.\\n+---\\n+--- IMPORTANT: If you want all the features jdtls has to offer, [nvim-jdtls](https://github.com/mfussenegger/nvim-jdtls)\\n+--- is highly recommended. If all you need is diagnostics, completion, imports, gotos and formatting and some code actions\\n+--- you can keep reading here.\\n+---\\n+--- For manual installation you can download precompiled binaries from the\\n+--- [official downloads site](http://download.eclipse.org/jdtls/snapshots/?d)\\n+--- and ensure that the `PATH` variable contains the `bin` directory of the extracted archive.\\n+---\\n+--- ```lua\\n+---   -- init.lua\\n+---   vim.lsp.enable('jdtls')\\n+--- ```\\n+---\\n+--- You can also pass extra custom jvm arguments with the JDTLS_JVM_ARGS environment variable as a space separated list of arguments,\\n+--- that will be converted to multiple --jvm-arg=\\u003cparam\\u003e args when passed to the jdtls script. This will allow for example tweaking\\n+--- the jvm arguments or integration with external tools like lombok:\\n+---\\n+--- ```sh\\n+--- export JDTLS_JVM_ARGS=\\\"-javaagent:$HOME/.local/share/java/lombok.jar\\\"\\n+--- ```\\n+---\\n+--- For automatic installation you can use the following unofficial installers/launchers under your own risk:\\n+---   - [jdtls-launcher](https://github.com/eruizc-dev/jdtls-launcher) (Includes lombok support by default)\\n+---     ```lua\\n+---       -- init.lua\\n+---       vim.lsp.config('jdtls', { cmd = { 'jdtls' } })\\n+---     ```\\n+\\n+local env = {\\n+  HOME = vim.uv.os_homedir(),\\n+  XDG_CACHE_HOME = os.getenv 'XDG_CACHE_HOME',\\n+  JDTLS_JVM_ARGS = os.getenv 'JDTLS_JVM_ARGS',\\n+}\\n+\\n+local function get_cache_dir()\\n+  return env.XDG_CACHE_HOME and env.XDG_CACHE_HOME or env.HOME .. '/.cache'\\n+end\\n+\\n+local function get_jdtls_cache_dir()\\n+  return get_cache_dir() .. '/jdtls'\\n+end\\n+\\n+local function get_jdtls_config_dir()\\n+  return get_jdtls_cache_dir() .. '/config'\\n+end\\n+\\n+local function get_jdtls_workspace_dir()\\n+  return get_jdtls_cache_dir() .. '/workspace'\\n+end\\n+\\n+local function get_jdtls_jvm_args()\\n+  local args = {}\\n+  for a in string.gmatch((env.JDTLS_JVM_ARGS or ''), '%S+') do\\n+    local arg = string.format('--jvm-arg=%s', a)\\n+    table.insert(args, arg)\\n+  end\\n+  return unpack(args)\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'jdtls',\\n+    '-configuration',\\n+    get_jdtls_config_dir(),\\n+    '-data',\\n+    get_jdtls_workspace_dir(),\\n+    get_jdtls_jvm_args(),\\n+  },\\n+  filetypes = { 'java' },\\n+  root_markers = {\\n+    -- Multi-module projects\\n+    '.git',\\n+    'build.gradle',\\n+    'build.gradle.kts',\\n+    -- Single-module projects\\n+    'build.xml', -- Ant\\n+    'pom.xml', -- Maven\\n+    'settings.gradle', -- Gradle\\n+    'settings.gradle.kts', -- Gradle\\n+  },\\n+  init_options = {\\n+    workspace = get_jdtls_workspace_dir(),\\n+    jvm_args = {},\\n+    os_config = nil,\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jdtls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jdtls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jedi_language_server.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://github.com/pappasam/jedi-language-server\\n+---\\n+--- `jedi-language-server`, a language server for Python, built on top of jedi\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'jedi-language-server' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    '.git',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jedi_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jedi_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jinja_lsp.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- jinja-lsp enhances minijinja development experience by providing Helix/Nvim users with advanced features such as autocomplete, syntax highlighting, hover, goto definition, code actions and linting.\\n+---\\n+--- The file types are not detected automatically, you can register them manually (see below) or override the filetypes:\\n+---\\n+--- ```lua\\n+--- vim.filetype.add {\\n+---   extension = {\\n+---     jinja = 'jinja',\\n+---     jinja2 = 'jinja',\\n+---     j2 = 'jinja',\\n+---   },\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  name = 'jinja_lsp',\\n+  cmd = { 'jinja-lsp' },\\n+  filetypes = { 'jinja' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jinja_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jinja_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jqls.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/wader/jq-lsp\\n+--- Language server for jq, written using Go.\\n+--- You can install the server easily using go install:\\n+--- ```sh\\n+--- # install directly\\n+--- go install github.com/wader/jq-lsp@master\\n+--- # copy binary to $PATH\\n+--- cp $(go env GOPATH)/bin/jq-lsp /usr/local/bin\\n+---\\n+--- ```\\n+--- Note: To activate properly nvim needs to know the jq filetype.\\n+--- You can add it via:\\n+--- ```lua\\n+--- vim.cmd([[au BufRead,BufNewFile *.jq setfiletype jq]])\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'jq-lsp' },\\n+  filetypes = { 'jq' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jqls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jqls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jsonls.lua\\n@@ -0,0 +1,32 @@\\n+---@brief\\n+---\\n+--- https://github.com/hrsh7th/vscode-langservers-extracted\\n+---\\n+--- vscode-json-language-server, a language server for JSON and JSON schema\\n+---\\n+--- `vscode-json-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm i -g vscode-langservers-extracted\\n+--- ```\\n+---\\n+--- `vscode-json-language-server` only provides completions when snippet support is enabled. If you use Neovim older than v0.10 you need to enable completion, install a snippet plugin and add the following override to your language client capabilities during setup.\\n+---\\n+--- ```lua\\n+--- --Enable (broadcasting) snippet capability for completion\\n+--- local capabilities = vim.lsp.protocol.make_client_capabilities()\\n+--- capabilities.textDocument.completion.completionItem.snippetSupport = true\\n+---\\n+--- vim.lsp.config('jsonls', {\\n+---   capabilities = capabilities,\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'vscode-json-language-server', '--stdio' },\\n+  filetypes = { 'json', 'jsonc' },\\n+  init_options = {\\n+    provideFormatter = true,\\n+  },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jsonls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jsonls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/jsonnet_ls.lua\\n@@ -0,0 +1,20 @@\\n+--- @brief\\n+---\\n+--- https://github.com/grafana/jsonnet-language-server\\n+---\\n+--- A Language Server Protocol (LSP) server for Jsonnet.\\n+---\\n+--- The language server can be installed with `go`:\\n+--- ```sh\\n+--- go install github.com/grafana/jsonnet-language-server@latest\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'jsonnet-language-server' },\\n+  filetypes = {\\n+    'jsonnet',\\n+    'libsonnet',\\n+  },\\n+  root_markers = { 'jsonnetfile.json', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/jsonnet_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/jsonnet_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/julials.lua\\n@@ -0,0 +1,131 @@\\n+---@brief\\n+---\\n+--- https://github.com/julia-vscode/julia-vscode\\n+---\\n+--- LanguageServer.jl can be installed with `julia` and `Pkg`:\\n+--- ```sh\\n+--- julia --project=~/.julia/environments/nvim-lspconfig -e 'using Pkg; Pkg.add(\\\"LanguageServer\\\")'\\n+--- ```\\n+--- where `~/.julia/environments/nvim-lspconfig` is the location where\\n+--- the default configuration expects LanguageServer.jl to be installed.\\n+---\\n+--- To update an existing install, use the following command:\\n+--- ```sh\\n+--- julia --project=~/.julia/environments/nvim-lspconfig -e 'using Pkg; Pkg.update()'\\n+--- ```\\n+---\\n+--- Note: In order to have LanguageServer.jl pick up installed packages or dependencies in a\\n+--- Julia project, you must make sure that the project is instantiated:\\n+--- ```sh\\n+--- julia --project=/path/to/my/project -e 'using Pkg; Pkg.instantiate()'\\n+--- ```\\n+---\\n+--- Note: The julia programming language searches for global environments within the `environments/`\\n+--- folder of `$JULIA_DEPOT_PATH` entries. By default this simply `~/.julia/environments`\\n+\\n+local root_files = { 'Project.toml', 'JuliaProject.toml' }\\n+\\n+local function activate_env(path)\\n+  assert(vim.fn.has 'nvim-0.10' == 1, 'requires Nvim 0.10 or newer')\\n+  local bufnr = vim.api.nvim_get_current_buf()\\n+  local julials_clients = vim.lsp.get_clients { bufnr = bufnr, name = 'julials' }\\n+  assert(\\n+    #julials_clients \\u003e 0,\\n+    'method julia/activateenvironment is not supported by any servers active on the current buffer'\\n+  )\\n+  local function _activate_env(environment)\\n+    if environment then\\n+      for _, julials_client in ipairs(julials_clients) do\\n+        julials_client:notify('julia/activateenvironment', { envPath = environment })\\n+      end\\n+      vim.notify('Julia environment activated: \\\\n`' .. environment .. '`', vim.log.levels.INFO)\\n+    end\\n+  end\\n+  if path then\\n+    path = vim.fs.normalize(vim.fn.fnamemodify(vim.fn.expand(path), ':p'))\\n+    local found_env = false\\n+    for _, project_file in ipairs(root_files) do\\n+      local file = vim.uv.fs_stat(vim.fs.joinpath(path, project_file))\\n+      if file and file.type then\\n+        found_env = true\\n+        break\\n+      end\\n+    end\\n+    if not found_env then\\n+      vim.notify('Path is not a julia environment: \\\\n`' .. path .. '`', vim.log.levels.WARN)\\n+      return\\n+    end\\n+    _activate_env(path)\\n+  else\\n+    local depot_paths = vim.env.JULIA_DEPOT_PATH\\n+        and vim.split(vim.env.JULIA_DEPOT_PATH, vim.fn.has 'win32' == 1 and ';' or ':')\\n+      or { vim.fn.expand '~/.julia' }\\n+    local environments = {}\\n+    vim.list_extend(environments, vim.fs.find(root_files, { type = 'file', upward = true, limit = math.huge }))\\n+    for _, depot_path in ipairs(depot_paths) do\\n+      local depot_env = vim.fs.joinpath(vim.fs.normalize(depot_path), 'environments')\\n+      vim.list_extend(\\n+        environments,\\n+        vim.fs.find(function(name, env_path)\\n+          return vim.tbl_contains(root_files, name) and string.sub(env_path, #depot_env + 1):match '^/[^/]*$'\\n+        end, { path = depot_env, type = 'file', limit = math.huge })\\n+      )\\n+    end\\n+    environments = vim.tbl_map(vim.fs.dirname, environments)\\n+    vim.ui.select(environments, { prompt = 'Select a Julia environment' }, _activate_env)\\n+  end\\n+end\\n+\\n+local cmd = {\\n+  'julia',\\n+  '--startup-file=no',\\n+  '--history-file=no',\\n+  '-e',\\n+  [[\\n+    # Load LanguageServer.jl: attempt to load from ~/.julia/environments/nvim-lspconfig\\n+    # with the regular load path as a fallback\\n+    ls_install_path = joinpath(\\n+        get(DEPOT_PATH, 1, joinpath(homedir(), \\\".julia\\\")),\\n+        \\\"environments\\\", \\\"nvim-lspconfig\\\"\\n+    )\\n+    pushfirst!(LOAD_PATH, ls_install_path)\\n+    using LanguageServer\\n+    popfirst!(LOAD_PATH)\\n+    depot_path = get(ENV, \\\"JULIA_DEPOT_PATH\\\", \\\"\\\")\\n+    project_path = let\\n+        dirname(something(\\n+            ## 1. Finds an explicitly set project (JULIA_PROJECT)\\n+            Base.load_path_expand((\\n+                p = get(ENV, \\\"JULIA_PROJECT\\\", nothing);\\n+                p === nothing ? nothing : isempty(p) ? nothing : p\\n+            )),\\n+            ## 2. Look for a Project.toml file in the current working directory,\\n+            ##    or parent directories, with $HOME as an upper boundary\\n+            Base.current_project(),\\n+            ## 3. First entry in the load path\\n+            get(Base.load_path(), 1, nothing),\\n+            ## 4. Fallback to default global environment,\\n+            ##    this is more or less unreachable\\n+            Base.load_path_expand(\\\"@v#.#\\\"),\\n+        ))\\n+    end\\n+    @info \\\"Running language server\\\" VERSION pwd() project_path depot_path\\n+    server = LanguageServer.LanguageServerInstance(stdin, stdout, project_path, depot_path)\\n+    server.runlinter = true\\n+    run(server)\\n+  ]],\\n+}\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = cmd,\\n+  filetypes = { 'julia' },\\n+  root_markers = root_files,\\n+  on_attach = function(_, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspJuliaActivateEnv', activate_env, {\\n+      desc = 'Activate a Julia environment',\\n+      nargs = '?',\\n+      complete = 'file',\\n+    })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/julials.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/julials.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/just.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/terror/just-lsp\\n+---\\n+--- `just-lsp` is an LSP for just built on top of the tree-sitter-just parser.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'just-lsp' },\\n+  filetypes = { 'just' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/just.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/just.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/kcl.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/kcl-lang/kcl.nvim\\n+---\\n+--- Language server for the KCL configuration and policy language.\\n+---\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'kcl-language-server' },\\n+  filetypes = { 'kcl' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/kcl.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/kcl.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/koka.lua\\n@@ -0,0 +1,11 @@\\n+---@brief\\n+---\\n+--- https://koka-lang.github.io/koka/doc/index.html\\n+--- Koka is a functional programming language with effect types and handlers.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'koka', '--language-server', '--lsstdio' },\\n+  filetypes = { 'koka' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/koka.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/koka.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/kotlin_language_server.lua\\n@@ -0,0 +1,42 @@\\n+---@brief\\n+---\\n+--- A kotlin language server which was developed for internal usage and\\n+--- released afterwards. Maintaining is not done by the original author,\\n+--- but by fwcd.\\n+---\\n+--- It is built via gradle and developed on github.\\n+--- Source and additional description:\\n+--- https://github.com/fwcd/kotlin-language-server\\n+---\\n+--- This server requires vim to be aware of the kotlin-filetype.\\n+--- You could refer for this capability to:\\n+--- https://github.com/udalov/kotlin-vim (recommended)\\n+--- Note that there is no LICENSE specified yet.\\n+---\\n+--- For faster startup, you can setup caching by specifying a storagePath\\n+--- in the init_options. The default is your home directory.\\n+\\n+--- The presence of one of these files indicates a project root directory\\n+--\\n+--  These are configuration files for the various build systems supported by\\n+--  Kotlin. I am not sure whether the language server supports Ant projects,\\n+--  but I'm keeping it here as well since Ant does support Kotlin.\\n+local root_files = {\\n+  'settings.gradle', -- Gradle (multi-project)\\n+  'settings.gradle.kts', -- Gradle (multi-project)\\n+  'build.xml', -- Ant\\n+  'pom.xml', -- Maven\\n+  'build.gradle', -- Gradle\\n+  'build.gradle.kts', -- Gradle\\n+}\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'kotlin' },\\n+  root_markers = root_files,\\n+  cmd = { 'kotlin-language-server' },\\n+  init_options = {\\n+    -- Enables caching and use project root to store cache data.\\n+    storagePath = vim.fs.root(vim.fn.expand '%:p:h', root_files),\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/kotlin_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/kotlin_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/kotlin_lsp.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---Pre-alpha official Kotlin support for Visual Studio Code and an implementation of Language Server Protocol for the Kotlin language.\\n+---\\n+---The server is based on IntelliJ IDEA and the IntelliJ IDEA Kotlin Plugin implementation.\\n+\\n+--- The presence of one of these files indicates a project root directory\\n+--\\n+--  These are configuration files for the various build systems supported by\\n+--  Kotlin.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'kotlin' },\\n+  cmd = { 'kotlin-lsp', '--stdio' },\\n+  root_markers = {\\n+    'settings.gradle', -- Gradle (multi-project)\\n+    'settings.gradle.kts', -- Gradle (multi-project)\\n+    'pom.xml', -- Maven\\n+    'build.gradle', -- Gradle\\n+    'build.gradle.kts', -- Gradle\\n+    'workspace.json', -- Used to integrate your own build system\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/kotlin_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/kotlin_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/kulala_ls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/mistweaverco/kulala-ls\\n+---\\n+--- A minimal language server for HTTP syntax.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'kulala-ls', '--stdio' },\\n+  filetypes = { 'http' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/kulala_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/kulala_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/laravel_ls.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/laravel-ls/laravel-ls\\n+---\\n+--- `laravel-ls`, language server for laravel\\n+---\\n+--- The default `cmd` assumes that the `laravel-ls` binary can be found in `$PATH`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'laravel-ls' },\\n+  filetypes = { 'php', 'blade' },\\n+  root_markers = { 'artisan' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/laravel_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/laravel_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lean3ls.lua\\n@@ -0,0 +1,40 @@\\n+---@brief\\n+---\\n+--- https://github.com/leanprover/lean-client-js/tree/master/lean-language-server\\n+---\\n+--- Lean installation instructions can be found\\n+--- [here](https://leanprover-community.github.io/get_started.html#regular-install).\\n+---\\n+--- Once Lean is installed, you can install the Lean 3 language server by running\\n+--- ```sh\\n+--- npm install -g lean-language-server\\n+--- ```\\n+---\\n+--- Note: that if you're using [lean.nvim](https://github.com/Julian/lean.nvim),\\n+--- that plugin fully handles the setup of the Lean language server,\\n+--- and you shouldn't set up `lean3ls` both with it and `lspconfig`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lean-language-server', '--stdio', '--', '-M', '4096', '-T', '100000' },\\n+  filetypes = { 'lean3' },\\n+  offset_encoding = 'utf-32',\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    fname = vim.fs.normalize(fname)\\n+    -- check if inside elan stdlib\\n+    local stdlib_dir\\n+    do\\n+      local _, endpos = fname:find '/lean/library'\\n+      if endpos then\\n+        stdlib_dir = fname:sub(1, endpos)\\n+      end\\n+    end\\n+\\n+    on_dir(\\n+      vim.fs.root(fname, { 'leanpkg.toml', 'leanpkg.path' })\\n+        or stdlib_dir\\n+        or vim.fs.dirname(vim.fs.find('.git', { path = fname, upward = true })[1])\\n+    )\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lean3ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lean3ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lelwel_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/0x2a-42/lelwel\\n+---\\n+--- Language server for lelwel grammars.\\n+---\\n+--- You can install `lelwel-ls` via cargo:\\n+--- ```sh\\n+--- cargo install --features=\\\"lsp\\\" lelwel\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lelwel-ls' },\\n+  filetypes = { 'llw' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lelwel_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lelwel_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lemminx.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/eclipse/lemminx\\n+---\\n+--- The easiest way to install the server is to get a binary from https://github.com/redhat-developer/vscode-xml/releases and place it on your PATH.\\n+---\\n+--- NOTE to macOS users: Binaries from unidentified developers are blocked by default. If you trust the downloaded binary, run it once, cancel the prompt, then remove the binary from Gatekeeper quarantine with `xattr -d com.apple.quarantine lemminx`. It should now run without being blocked.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lemminx' },\\n+  filetypes = { 'xml', 'xsd', 'xsl', 'xslt', 'svg' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lemminx.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lemminx.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lexical.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- https://github.com/lexical-lsp/lexical\\n+---\\n+--- Lexical is a next-generation language server for the Elixir programming language.\\n+---\\n+--- Follow the [Detailed Installation Instructions](https://github.com/lexical-lsp/lexical/blob/main/pages/installation.md)\\n+---\\n+--- **By default, `lexical` doesn't have a `cmd` set.**\\n+--- This is because nvim-lspconfig does not make assumptions about your path.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'elixir', 'eelixir', 'heex', 'surface' },\\n+  root_markers = { 'mix.exs', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lexical.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lexical.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lsp_ai.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/SilasMarvin/lsp-ai\\n+---\\n+--- LSP-AI is an open source language server that serves as a backend for AI-powered functionality in your favorite code\\n+--- editors. It offers features like in-editor chatting with LLMs and code completions.\\n+---\\n+---\\n+--- You will need to provide configuration for the inference backends and models you want to use, as well as configure\\n+--- completion/code actions. See the [wiki docs](https://github.com/SilasMarvin/lsp-ai/wiki/Configuration) and\\n+--- [examples](https://github.com/SilasMarvin/lsp-ai/blob/main/examples/nvim) for more information.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lsp-ai' },\\n+  filetypes = {},\\n+  root_dir = nil,\\n+  init_options = {\\n+    memory = {\\n+      file_store = vim.empty_dict(),\\n+    },\\n+    models = vim.empty_dict(),\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lsp_ai.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lsp_ai.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ltex.lua\\n@@ -0,0 +1,85 @@\\n+---@brief\\n+---\\n+--- https://github.com/valentjn/ltex-ls\\n+---\\n+--- LTeX Language Server: LSP language server for LanguageTool \U0001F50D✔️ with support for LaTeX \U0001F393, Markdown \U0001F4DD, and others\\n+---\\n+--- To install, download the latest [release](https://github.com/valentjn/ltex-ls/releases) and ensure `ltex-ls` is on your path.\\n+---\\n+--- This server accepts configuration via the `settings` key.\\n+---\\n+--- ```lua\\n+---   settings = {\\n+--- \\t\\tltex = {\\n+--- \\t\\t\\tlanguage = \\\"en-GB\\\",\\n+--- \\t\\t},\\n+--- \\t},\\n+--- ```\\n+---\\n+--- To support org files or R sweave, users can define a custom filetype autocommand (or use a plugin which defines these filetypes):\\n+---\\n+--- ```lua\\n+--- vim.cmd [[ autocmd BufRead,BufNewFile *.org set filetype=org ]]\\n+--- ```\\n+\\n+local language_id_mapping = {\\n+  bib = 'bibtex',\\n+  plaintex = 'tex',\\n+  rnoweb = 'rsweave',\\n+  rst = 'restructuredtext',\\n+  tex = 'latex',\\n+  pandoc = 'markdown',\\n+  text = 'plaintext',\\n+}\\n+\\n+local filetypes = {\\n+  'bib',\\n+  'gitcommit',\\n+  'markdown',\\n+  'org',\\n+  'plaintex',\\n+  'rst',\\n+  'rnoweb',\\n+  'tex',\\n+  'pandoc',\\n+  'quarto',\\n+  'rmd',\\n+  'context',\\n+  'html',\\n+  'xhtml',\\n+  'mail',\\n+  'text',\\n+}\\n+\\n+local function get_language_id(_, filetype)\\n+  local language_id = language_id_mapping[filetype]\\n+  if language_id then\\n+    return language_id\\n+  else\\n+    return filetype\\n+  end\\n+end\\n+local enabled_ids = {}\\n+do\\n+  local enabled_keys = {}\\n+  for _, ft in ipairs(filetypes) do\\n+    local id = get_language_id({}, ft)\\n+    if not enabled_keys[id] then\\n+      enabled_keys[id] = true\\n+      table.insert(enabled_ids, id)\\n+    end\\n+  end\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ltex-ls' },\\n+  filetypes = filetypes,\\n+  root_markers = { '.git' },\\n+  get_language_id = get_language_id,\\n+  settings = {\\n+    ltex = {\\n+      enabled = enabled_ids,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ltex.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ltex.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ltex_plus.lua\\n@@ -0,0 +1,87 @@\\n+---@brief\\n+---\\n+--- https://github.com/ltex-plus/ltex-ls-plus\\n+---\\n+--- LTeX Language Server: LSP language server for LanguageTool \U0001F50D✔️ with support for LaTeX \U0001F393, Markdown \U0001F4DD, and others\\n+---\\n+--- To install, download the latest [release](https://github.com/ltex-plus/ltex-ls-plus) and ensure `ltex-ls-plus` is on your path.\\n+---\\n+--- This server accepts configuration via the `settings` key.\\n+---\\n+--- ```lua\\n+---   settings = {\\n+---     ltex = {\\n+---       language = \\\"en-GB\\\",\\n+---     },\\n+---   },\\n+--- ```\\n+---\\n+--- To support org files or R sweave, users can define a custom filetype autocommand (or use a plugin which defines these filetypes):\\n+---\\n+--- ```lua\\n+--- vim.cmd [[ autocmd BufRead,BufNewFile *.org set filetype=org ]]\\n+--- ```\\n+\\n+local language_id_mapping = {\\n+  bib = 'bibtex',\\n+  pandoc = 'markdown',\\n+  plaintex = 'tex',\\n+  rnoweb = 'rsweave',\\n+  rst = 'restructuredtext',\\n+  tex = 'latex',\\n+  text = 'plaintext',\\n+}\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ltex-ls-plus' },\\n+  filetypes = {\\n+    'bib',\\n+    'context',\\n+    'gitcommit',\\n+    'html',\\n+    'markdown',\\n+    'org',\\n+    'pandoc',\\n+    'plaintex',\\n+    'quarto',\\n+    'mail',\\n+    'mdx',\\n+    'rmd',\\n+    'rnoweb',\\n+    'rst',\\n+    'tex',\\n+    'text',\\n+    'typst',\\n+    'xhtml',\\n+  },\\n+  root_markers = { '.git' },\\n+  get_language_id = function(_, filetype)\\n+    return language_id_mapping[filetype] or filetype\\n+  end,\\n+  settings = {\\n+    ltex = {\\n+      enabled = {\\n+        'bib',\\n+        'context',\\n+        'gitcommit',\\n+        'html',\\n+        'markdown',\\n+        'org',\\n+        'pandoc',\\n+        'plaintex',\\n+        'quarto',\\n+        'mail',\\n+        'mdx',\\n+        'rmd',\\n+        'rnoweb',\\n+        'rst',\\n+        'tex',\\n+        'latex',\\n+        'text',\\n+        'typst',\\n+        'xhtml',\\n+      },\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ltex_plus.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ltex_plus.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lua_ls.lua\\n@@ -0,0 +1,85 @@\\n+---@brief\\n+---\\n+--- https://github.com/luals/lua-language-server\\n+---\\n+--- Lua language server.\\n+---\\n+--- `lua-language-server` can be installed by following the instructions [here](https://luals.github.io/#neovim-install).\\n+---\\n+--- The default `cmd` assumes that the `lua-language-server` binary can be found in `$PATH`.\\n+---\\n+--- If you primarily use `lua-language-server` for Neovim, and want to provide completions,\\n+--- analysis, and location handling for plugins on runtime path, you can use the following\\n+--- settings.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('lua_ls', {\\n+---   on_init = function(client)\\n+---     if client.workspace_folders then\\n+---       local path = client.workspace_folders[1].name\\n+---       if\\n+---         path ~= vim.fn.stdpath('config')\\n+---         and (vim.uv.fs_stat(path .. '/.luarc.json') or vim.uv.fs_stat(path .. '/.luarc.jsonc'))\\n+---       then\\n+---         return\\n+---       end\\n+---     end\\n+---\\n+---     client.config.settings.Lua = vim.tbl_deep_extend('force', client.config.settings.Lua, {\\n+---       runtime = {\\n+---         -- Tell the language server which version of Lua you're using (most\\n+---         -- likely LuaJIT in the case of Neovim)\\n+---         version = 'LuaJIT',\\n+---         -- Tell the language server how to find Lua modules same way as Neovim\\n+---         -- (see `:h lua-module-load`)\\n+---         path = {\\n+---           'lua/?.lua',\\n+---           'lua/?/init.lua',\\n+---         },\\n+---       },\\n+---       -- Make the server aware of Neovim runtime files\\n+---       workspace = {\\n+---         checkThirdParty = false,\\n+---         library = {\\n+---           vim.env.VIMRUNTIME\\n+---           -- Depending on the usage, you might want to add additional paths\\n+---           -- here.\\n+---           -- '${3rd}/luv/library'\\n+---           -- '${3rd}/busted/library'\\n+---         }\\n+---         -- Or pull in all of 'runtimepath'.\\n+---         -- NOTE: this is a lot slower and will cause issues when working on\\n+---         -- your own configuration.\\n+---         -- See https://github.com/neovim/nvim-lspconfig/issues/3189\\n+---         -- library = {\\n+---         --   vim.api.nvim_get_runtime_file('', true),\\n+---         -- }\\n+---       }\\n+---     })\\n+---   end,\\n+---   settings = {\\n+---     Lua = {}\\n+---   }\\n+--- })\\n+--- ```\\n+---\\n+--- See `lua-language-server`'s [documentation](https://luals.github.io/wiki/settings/) for an explanation of the above fields:\\n+--- * [Lua.runtime.path](https://luals.github.io/wiki/settings/#runtimepath)\\n+--- * [Lua.workspace.library](https://luals.github.io/wiki/settings/#workspacelibrary)\\n+---\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lua-language-server' },\\n+  filetypes = { 'lua' },\\n+  root_markers = {\\n+    '.luarc.json',\\n+    '.luarc.jsonc',\\n+    '.luacheckrc',\\n+    '.stylua.toml',\\n+    'stylua.toml',\\n+    'selene.toml',\\n+    'selene.yml',\\n+    '.git',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lua_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lua_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/luau_lsp.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://github.com/JohnnyMorganz/luau-lsp\\n+---\\n+--- Language server for the [Luau](https://luau-lang.org/) language.\\n+---\\n+--- `luau-lsp` can be installed by downloading one of the release assets available at https://github.com/JohnnyMorganz/luau-lsp.\\n+---\\n+--- You might also have to set up automatic filetype detection for Luau files, for example like so:\\n+---\\n+--- ```vim\\n+--- autocmd BufRead,BufNewFile *.luau setf luau\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'luau-lsp', 'lsp' },\\n+  filetypes = { 'luau' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/luau_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/luau_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/lwc_ls.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/forcedotcom/lightning-language-server/\\n+---\\n+--- Language server for Lightning Web Components.\\n+---\\n+--- For manual installation, utilize the official [NPM package](https://www.npmjs.com/package/@salesforce/lwc-language-server).\\n+--- Then, configure `cmd` to run the Node script at the unpacked location:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('lwc_ls', {\\n+---   cmd = {\\n+---     'node',\\n+---     '/path/to/node_modules/@salesforce/lwc-language-server/bin/lwc-language-server.js',\\n+---     '--stdio'\\n+---   }\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'lwc-language-server', '--stdio' },\\n+  filetypes = { 'javascript', 'html' },\\n+  root_markers = { 'sfdx-project.json' },\\n+  init_options = {\\n+    embeddedLanguages = {\\n+      javascript = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/lwc_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/lwc_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/m68k.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/grahambates/m68k-lsp\\n+---\\n+--- Language server for Motorola 68000 family assembly\\n+---\\n+--- `m68k-lsp-server` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g m68k-lsp-server\\n+--- ```\\n+---\\n+--- Ensure you are using the 68k asm syntax variant in Neovim.\\n+---\\n+--- ```lua\\n+--- vim.g.asmsyntax = 'asm68k'\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'm68k-lsp-server', '--stdio' },\\n+  filetypes = { 'asm68k' },\\n+  root_markers = { 'Makefile', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/m68k.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/m68k.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/markdown_oxide.lua\\n@@ -0,0 +1,37 @@\\n+---@brief\\n+---\\n+--- https://github.com/Feel-ix-343/markdown-oxide\\n+---\\n+--- Editor Agnostic PKM: you bring the text editor and we\\n+--- bring the PKM.\\n+---\\n+--- Inspired by and compatible with Obsidian.\\n+---\\n+--- Check the readme to see how to properly setup.\\n+\\n+---@param client vim.lsp.Client\\n+---@param bufnr integer\\n+---@param cmd string\\n+local function command_factory(client, bufnr, cmd)\\n+  return client:exec_cmd({\\n+    title = ('Markdown-Oxide-%s'):format(cmd),\\n+    command = 'jump',\\n+    arguments = { cmd },\\n+  }, { bufnr = bufnr })\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  root_markers = { '.git', '.obsidian', '.moxide.toml' },\\n+  filetypes = { 'markdown' },\\n+  cmd = { 'markdown-oxide' },\\n+  on_attach = function(client, bufnr)\\n+    for _, cmd in ipairs({ 'today', 'tomorrow', 'yesterday' }) do\\n+      vim.api.nvim_buf_create_user_command(bufnr, 'Lsp' .. ('%s'):format(cmd:gsub('^%l', string.upper)), function()\\n+        command_factory(client, bufnr, cmd)\\n+      end, {\\n+        desc = ('Open %s daily note'):format(cmd),\\n+      })\\n+    end\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/markdown_oxide.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/markdown_oxide.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/marko-js.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/marko-js/language-server\\n+---\\n+--- Using the Language Server Protocol to improve Marko's developer experience.\\n+---\\n+--- Can be installed via npm:\\n+--- ```\\n+--- npm i -g @marko/language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'marko-language-server', '--stdio' },\\n+  filetypes = { 'marko' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/marko-js.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/marko-js.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/marksman.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- https://github.com/artempyanykh/marksman\\n+---\\n+--- Marksman is a Markdown LSP server providing completion, cross-references, diagnostics, and more.\\n+---\\n+--- Marksman works on MacOS, Linux, and Windows and is distributed as a self-contained binary for each OS.\\n+---\\n+--- Pre-built binaries can be downloaded from https://github.com/artempyanykh/marksman/releases\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'marksman', 'server' },\\n+  filetypes = { 'markdown', 'markdown.mdx' },\\n+  root_markers = { '.marksman.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/marksman.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/marksman.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/matlab_ls.lua\\n@@ -0,0 +1,34 @@\\n+---@brief\\n+---\\n+--- https://github.com/mathworks/MATLAB-language-server\\n+---\\n+--- MATLAB® language server implements the Microsoft® Language Server Protocol for the MATLAB language.\\n+---\\n+--- Make sure to set `MATLAB.installPath` to your MATLAB path, e.g.:\\n+--- ```lua\\n+--- settings = {\\n+---   MATLAB = {\\n+---     ...\\n+---     installPath = '/usr/local/MATLAB/R2023a',\\n+---     ...\\n+---   },\\n+--- },\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'matlab-language-server', '--stdio' },\\n+  filetypes = { 'matlab' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local root_dir = vim.fs.root(bufnr, '.git')\\n+    on_dir(root_dir or vim.fn.getcwd())\\n+  end,\\n+  settings = {\\n+    MATLAB = {\\n+      indexWorkspace = true,\\n+      installPath = '', -- NOTE: Set this to your MATLAB installation path.\\n+      matlabConnectionTiming = 'onStart',\\n+      telemetry = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/matlab_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/matlab_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/mdx_analyzer.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+--- https://github.com/mdx-js/mdx-analyzer\\n+---\\n+--- `mdx-analyzer`, a language server for MDX\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'mdx-language-server', '--stdio' },\\n+  filetypes = { 'mdx' },\\n+  root_markers = { 'package.json' },\\n+  settings = {},\\n+  init_options = {\\n+    typescript = {},\\n+  },\\n+  before_init = function(_, config)\\n+    if config.init_options and config.init_options.typescript and not config.init_options.typescript.tsdk then\\n+      config.init_options.typescript.tsdk = util.get_typescript_server_path(config.root_dir)\\n+    end\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/mdx_analyzer.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/mdx_analyzer.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/mesonlsp.lua\\n@@ -0,0 +1,38 @@\\n+---@brief\\n+---\\n+--- https://github.com/JCWasmx86/mesonlsp\\n+---\\n+--- An unofficial, unendorsed language server for meson written in C++\\n+\\n+---Checks if a given path contains a valid Meson project root file\\n+---Looks for 'meson.build' file which contains 'project()' function\\n+local meson_matcher = function(_, path)\\n+  local pattern = 'meson.build'\\n+  local f = vim.fn.glob(table.concat({ path, pattern }, '/'))\\n+  if f == '' then\\n+    return false\\n+  end\\n+  for line in io.lines(f) do\\n+    -- skip meson comments\\n+    if not line:match '^%s*#.*' then\\n+      local str = line:gsub('%s+', '')\\n+      if str ~= '' then\\n+        if str:match '^project%(' then\\n+          return true\\n+        else\\n+          break\\n+        end\\n+      end\\n+    end\\n+  end\\n+  return false\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'mesonlsp', '--lsp' },\\n+  filetypes = { 'meson' },\\n+  root_dir = function(bufnr, on_dir)\\n+    on_dir(vim.fs.root(bufnr, meson_matcher) or vim.fs.root(bufnr, '.git'))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/mesonlsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/mesonlsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/metals.lua\\n@@ -0,0 +1,32 @@\\n+---@brief\\n+---\\n+--- https://scalameta.org/metals/\\n+---\\n+--- Scala language server with rich IDE features.\\n+---\\n+--- See full instructions in the Metals documentation:\\n+---\\n+--- https://scalameta.org/metals/docs/editors/vim#using-an-alternative-lsp-client\\n+---\\n+--- Note: that if you're using [nvim-metals](https://github.com/scalameta/nvim-metals), that plugin fully handles the setup and installation of Metals, and you shouldn't set up Metals both with it and `lspconfig`.\\n+---\\n+--- To install Metals, make sure to have [coursier](https://get-coursier.io/docs/cli-installation) installed, and once you do you can install the latest Metals with `cs install metals`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'metals' },\\n+  filetypes = { 'scala' },\\n+  root_markers = { 'build.sbt', 'build.sc', 'build.gradle', 'pom.xml' },\\n+  init_options = {\\n+    statusBarProvider = 'show-message',\\n+    isHttpEnabled = true,\\n+    compilerOptions = {\\n+      snippetAutoIndent = false,\\n+    },\\n+  },\\n+  capabilities = {\\n+    workspace = {\\n+      configuration = false,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/metals.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/metals.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/millet.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://github.com/azdavis/millet\\n+---\\n+--- Millet, a language server for Standard ML\\n+---\\n+--- To use with nvim:\\n+---\\n+--- 1. Install a Rust toolchain: https://rustup.rs\\n+--- 2. Clone the repo\\n+--- 3. Run `cargo build --release --bin millet-ls`\\n+--- 4. Move `target/release/millet-ls` to somewhere on your $PATH as `millet`\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'millet' },\\n+  filetypes = { 'sml' },\\n+  root_markers = { 'millet.toml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/millet.lua\",\"old_path\":\"files/nvim-lspconfig/ls