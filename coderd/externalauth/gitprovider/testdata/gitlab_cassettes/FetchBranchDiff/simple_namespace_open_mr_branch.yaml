ua\\\\n\\\"\\n+\\tstylua --check .\\n+\\n+.PHONY: test lint\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/Makefile\",\"old_path\":\"files/nvim-lspconfig/Makefile\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/README.md\\n@@ -0,0 +1,183 @@\\n+# nvim-lspconfig\\n+\\n+nvim-lspconfig is a \\\"data only\\\" repo, providing basic, default [Nvim LSP client](https://neovim.io/doc/user/lsp.html)\\n+configurations for various LSP servers. View [all configs](doc/configs.md) or `:help lspconfig-all` from Nvim.\\n+\\n+## Important ⚠️\\n+\\n+* These configs are **best-effort and supported by the community (you).** See [contributions](#contributions).\\n+* The configs live in [`lsp/`](./lsp/).\\n+    * Upgrade to Nvim 0.11+ and use `vim.lsp.enable('…')` (not `require'lspconfig'.….setup{}`) to enable a config.\\n+* The configs in `lua/lspconfig/` are *deprecated* and will be removed.\\n+    * Upgrade to Nvim 0.11+ and use `vim.lsp.enable('…')` (not `require'lspconfig'.….setup{}`) to enable a config.\\n+* Ask questions on [GitHub Discussions](https://github.com/neovim/neovim/discussions), not the issue tracker.\\n+* If you found a bug in Nvim LSP (`:help lsp`), [report it to Neovim core](https://github.com/neovim/neovim/issues/new?assignees=\\u0026labels=bug%2Clsp\\u0026template=lsp_bug_report.yml).\\n+    * **Do not** report it here. Only configuration data lives here.\\n+* This repo only provides self-contained *configurations*. The `require'lspconfig'` \\\"framework\\\" is deprecated and will be removed.\\n+    * The \\\"framework\\\" parts (*not* the configs) of nvim-lspconfig were upstreamed to Nvim core (`vim.lsp.config`).\\n+\\n+## Install\\n+\\n+[![LuaRocks](https://img.shields.io/luarocks/v/neovim/nvim-lspconfig?logo=lua\\u0026color=purple)](https://luarocks.org/modules/neovim/nvim-lspconfig)\\n+\\n+* Requires Nvim 0.11.3+.\\n+    * Support for Nvim 0.10 will be removed. Upgrade Nvim and nvim-lspconfig before reporting an issue.\\n+* Install nvim-lspconfig using Vim's \\\"packages\\\" feature:\\n+  ```\\n+  git clone https://github.com/neovim/nvim-lspconfig ~/.config/nvim/pack/nvim/start/nvim-lspconfig\\n+  ```\\n+* Or if you have Nvim 0.12 (nightly), you can use the builtin `vim.pack` plugin manager:\\n+  ```lua\\n+  vim.pack.add{\\n+    { src = 'https://github.com/neovim/nvim-lspconfig' },\\n+  }\\n+  ```\\n+* Or use a 3rd-party plugin manager.\\n+\\n+## Quickstart\\n+\\n+1. Install a language server, e.g. [pyright](doc/configs.md#pyright)\\n+   ```bash\\n+   npm i -g pyright\\n+   ```\\n+2. Enable its config in your init.lua ([:help lsp-quickstart](https://neovim.io/doc/user/lsp.html#lsp-quickstart)).\\n+   ```lua\\n+   vim.lsp.enable('pyright')\\n+   ```\\n+3. Ensure your project/workspace contains a root marker as specified in `:help lspconfig-all`.\\n+4. Open a code file in Nvim. LSP will attach and provide diagnostics.\\n+   ```\\n+   nvim main.py\\n+   ```\\n+5. Run `:checkhealth vim.lsp` to see the status or to troubleshoot.\\n+\\n+See `:help lspconfig-all` for the full list of server-specific details. For\\n+servers not on your `$PATH` (e.g., `jdtls`, `elixirls`), you must manually set\\n+the `cmd` parameter:\\n+\\n+```lua\\n+vim.lsp.config('jdtls', {\\n+  cmd = { '/path/to/jdtls' },\\n+})\\n+```\\n+\\n+## Configuration\\n+\\n+Nvim sets default options and mappings when LSP is active in a buffer:\\n+* [:help lsp-defaults](https://neovim.io/doc/user/lsp.html#lsp-defaults)\\n+* [:help diagnostic-defaults](https://neovim.io/doc/user/diagnostic.html#diagnostic-defaults)\\n+\\n+To customize, see:\\n+* [:help lsp-attach](https://neovim.io/doc/user/lsp.html#lsp-attach)\\n+* [:help lsp-buf](https://neovim.io/doc/user/lsp.html#lsp-buf)\\n+\\n+Extra settings can be specified for each LSP server. With Nvim 0.11+ you can\\n+[extend a config](https://neovim.io/doc/user/lsp.html#lsp-config) by calling\\n+`vim.lsp.config('…', {…})`. (You can also copy any config directly from\\n+[`lsp/`](./lsp/) and put it in a local `lsp/` directory in your 'runtimepath').\\n+\\n+```lua\\n+vim.lsp.config('rust_analyzer', {\\n+  -- Server-specific settings. See `:help lsp-quickstart`\\n+  settings = {\\n+    ['rust-analyzer'] = {},\\n+  },\\n+})\\n+```\\n+\\n+## Create a new config\\n+\\n+To create a new config you can either (1) use `vim.lsp.config` or (2) create\\n+a file `lsp/\\u003cconfig-name\\u003e.lua` somewhere on your 'runtimepath'.\\n+\\n+### Example: define a new config as code\\n+\\n+1. Run `:lua vim.lsp.config('foo', {cmd={'true'}})`\\n+2. Run `:lua vim.lsp.enable('foo')`\\n+3. Run `:checkhealth vim.lsp`, the new config is listed under \\\"Enabled Configurations\\\". \U0001F60E\\n+\\n+### Example: define a new config as a file\\n+\\n+1. Create a file `lsp/foo.lua` somewhere on your 'runtimepath'.\\n+   ```\\n+   :exe 'edit' stdpath('config') .. '/lsp/foo.lua'\\n+   ```\\n+2. Add this code to the file (or copy any of the examples from the [lsp/ directory](./lsp/) in this repo):\\n+   ```\\n+   return {\\n+     cmd = { 'true' },\\n+   }\\n+   ```\\n+3. Save the file (with `++p` to ensure its parent directory is created).\\n+   ```\\n+   :write ++p\\n+   ```\\n+4. Enable the config.\\n+   ```\\n+   :lua vim.lsp.enable('foo')\\n+   ```\\n+5. Run `:checkhealth vim.lsp`, the new config is listed under \\\"Enabled Configurations\\\". \U0001F308\\n+\\n+## Troubleshooting\\n+\\n+Start with `:checkhealth vim.lsp` to troubleshoot. The most common reasons a language server does not start or attach are:\\n+\\n+1. Language server is not installed. nvim-lspconfig does not install language servers for you. You should be able to run the `cmd` defined in the config from the command line and see that the language server starts. If the `cmd` is a name instead of an absolute path, ensure it is on your `$PATH`.\\n+2. Missing filetype plugins. Some languages are not detected by Nvim because they have not yet been added to the filetype detection system. Ensure `:set filetype?` shows the filetype and not an empty value.\\n+3. Not triggering root detection. Some language servers require a \\\"workspace\\\", which is found by looking for an ancestor directory that contains a \\\"root marker\\\". The most common root marker is `.git/`, but each config defines other \\\"root marker\\\" names. Root markers/directories are listed in `:help lspconfig-all`.\\n+\\n+   You can also explicitly set a root instead of relying on automatic detection by enabling `'exrc'` and adding an `.nvim.lua` at the desired root dir with the following code:\\n+   ```lua\\n+   vim.lsp.config('\\u003cclient name\\u003e', {\\n+     root_dir = vim.fn.fnamemodify(debug.getinfo(1, 'S').source:sub(2), ':p:h'),\\n+   })\\n+   ```\\n+   Note that prior to nvim 0.12 `exrc` file is executed only if it's inside of a cwd where you start `nvim`.\\n+\\n+## Bug reports\\n+\\n+If you found a bug with LSP functionality, [report it to Neovim core](https://github.com/neovim/neovim/issues/new?assignees=\\u0026labels=bug%2Clsp\\u0026template=lsp_bug_report.yml).\\n+\\n+Before reporting a bug, check your logs and the output of `:checkhealth vim.lsp`. Add this to your init.lua to enable verbose logging:\\n+\\n+```lua\\n+vim.lsp.set_log_level(\\\"debug\\\")\\n+```\\n+\\n+Attempt to run the language server, then run `:LspLog` to open the log.\\n+Most of the time, the reason for failure is present in the logs.\\n+\\n+## Commands\\n+\\n+* `:LspInfo` (alias to `:checkhealth vim.lsp`) shows the status of active and configured language servers.\\n+* `:LspStart \\u003cconfig_name\\u003e` Start the requested server name. Will only successfully start if the command detects a root directory matching the current config.\\n+* `:LspStop [\\u003cclient_id_or_name\\u003e]` Stops the given server. Defaults to stopping all servers active on the current buffer. To force stop add `++force`\\n+* `:LspRestart [\\u003cclient_id_or_name\\u003e]` Restarts the given client, and attempts to reattach to all previously attached buffers. Defaults to restarting all active servers.\\n+\\n+## Contributions\\n+\\n+If a language server is missing from [configs.md](doc/configs.md), contributing\\n+a new configuration for it helps others, especially if the server requires special setup. Follow these steps:\\n+\\n+1. Read [CONTRIBUTING.md](CONTRIBUTING.md).\\n+2. Create a new file at `lsp/\\u003cserver_name\\u003e.lua`.\\n+    - Copy an [existing config](https://github.com/neovim/nvim-lspconfig/tree/master/lsp)\\n+      to get started. Most configs are simple. For an extensive example see\\n+      [texlab.lua](https://github.com/neovim/nvim-lspconfig/blob/master/lsp/texlab.lua).\\n+3. Ask questions on [GitHub Discussions](https://github.com/neovim/neovim/discussions) or in the [Neovim Matrix room](https://app.element.io/#/room/#neovim:matrix.org).\\n+\\n+## Release process\\n+\\n+To publish a release:\\n+\\n+- Create and push a new [tag](https://github.com/neovim/nvim-lspconfig/tags).\\n+- After pushing the tag, a [GitHub action](./.github/workflows/release.yml)\\n+  will automatically package the plugin and publish the release to LuaRocks.\\n+\\n+## License\\n+\\n+Copyright Neovim contributors. All rights reserved.\\n+\\n+nvim-lspconfig is licensed under the terms of the Apache 2.0 license.\\n+\\n+See [LICENSE.md](./LICENSE.md)\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/README.md\",\"old_path\":\"files/nvim-lspconfig/README.md\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"\",\"collapsed\":true,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/doc/configs.md\",\"old_path\":\"files/nvim-lspconfig/doc/configs.md\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"\",\"collapsed\":true,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/doc/configs.txt\",\"old_path\":\"files/nvim-lspconfig/doc/configs.txt\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/doc/lspconfig.txt\\n@@ -0,0 +1,176 @@\\n+*lspconfig.txt*         For Nvim version 0.10+\\n+\\n+nvim-lspconfig provides user-contributed configs for the Nvim |lsp| client.\\n+\\n+                                      Type |gO| to see the table of contents.\\n+\\n+==============================================================================\\n+INTRODUCTION                                                         *lspconfig*\\n+\\n+nvim-lspconfig is a collection of community-contributed configurations for the\\n+Nvim LSP client. See |lspconfig-all| for the complete list of provided\\n+configurations.\\n+\\n+Note: nvim-lspconfig is just a collection of configs. It has no API or\\n+\\\"framework\\\". It is not required for Nvim |LSP| support. See |lsp-quickstart|\\n+to setup LSP without nvim-lspconfig.\\n+\\n+==============================================================================\\n+QUICKSTART                                                *lspconfig-quickstart*\\n+\\n+1. Install a language server, e.g. pyright. \\u003ebash\\n+   npm i -g pyright\\n+2. Add the language server setup to your init.lua. \\u003elua\\n+   vim.lsp.enable('pyright')\\n+3. Ensure your workspace contains a root marker as specified in\\n+   |lspconfig-all|.\\n+4. Open a code file in Nvim. LSP will attach and provide diagnostics. \\u003ebash\\n+   nvim main.py\\n+5. Run `:checkhealth vim.lsp` to see the status or troubleshoot.\\n+\\n+See also |lsp-quickstart|.\\n+\\n+==============================================================================\\n+USAGE                                                        *lspconfig-usage*\\n+\\n+Each config provides defaults for |vim.lsp.config()| which you can use as-is\\n+(by calling `vim.lsp.enable(…)`) or override (by calling |vim.lsp.config()|\\n+before enable()). This \\\"composability\\\" is a central feature of vim.lsp.config,\\n+which allows nvim-lspconfig to just provide the config \\\"defaults\\\".\\n+\\n+To activate a config, call |vim.lsp.enable()|. Each config in |lspconfig-all|\\n+is available as `vim.lsp.config('\\u003cname\\u003e')` and `vim.lsp.enable('\\u003cname\\u003e')`. For\\n+example to activate the \\\"clangd\\\" config: \\u003elua\\n+\\n+    -- Optionally override parts of the default config...\\n+    vim.lsp.config('clangd', {\\n+      …\\n+    })\\n+    -- Enable filetype-based activation of the config.\\n+    vim.lsp.enable('clangd')\\n+\\u003c\\n+                                                          *lspconfig-resolved*\\n+You can call the \\\"index\\\" form of vim.lsp.config to get the resolved config\\n+without activating it: \\u003elua\\n+\\n+    vim.print(vim.lsp.config['clangd'])\\n+\\u003c\\n+                                                 *lspconfig-vs-vim.lsp.config*\\n+Note these differences of |vim.lsp.config()| compared to the legacy\\n+nvim-lspconfig interface:\\n+\\n+- `single_file_support` is assumed by default. Can be disabled by specifying\\n+  `workspace_required=false` (see |vim.lsp.ClientConfig|).\\n+- `on_new_config` is currently missing, see https://github.com/neovim/neovim/issues/32287\\n+  - However, defining `root_dir` as a function is very flexible and may fit\\n+    your use-case instead. https://github.com/neovim/neovim/issues/32037#issuecomment-2825599872\\n+\\n+==============================================================================\\n+COMMANDS                                                    *lspconfig-commands*\\n+\\n+Any server-specific commands provided by a config are buffer-local and\\n+prefixed with \\\"Lsp\\\". Thus you can see available commands (from a LSP-enabled\\n+buffer) by typing: \\u003evim\\n+\\n+    :Lsp\\u003ctab\\u003e\\n+\\n+The following _global_ commands are provided by nvim-lspconfig:\\n+\\n+:LspInfo                                                            *:LspInfo*\\n+Alias to `:checkhealth vim.lsp`. Shows the status of active LSP clients and\\n+servers.\\n+\\n+:LspStart [config_name]                                            *:LspStart*\\n+Launches the requested (configured) client, but only if it successfully\\n+resolves a root directory. Note: Defaults to all configured servers matching\\n+the current buffer filetype.\\n+\\n+:LspStop [client_id] or [config_name]                            *:LspStop*\\n+Stops the server with the given client-id or config name. Defaults to\\n+stopping all servers active on the current buffer. To force stop language\\n+servers: \\u003evim\\n+    :LspStop ++force\\n+\\n+:LspRestart [client_id] or [config_name]                         *:LspRestart*\\n+Restarts the client with the given client-id or config name, and attempts\\n+to reattach to all previously attached buffers. Defaults to restarting all\\n+active servers.\\n+\\n+==============================================================================\\n+SERVER CONFIGS                                        *lspconfig-configurations*\\n+\\n+See |lspconfig-all| for the list of provided LSP configurations.\\n+\\n+If a server is missing, you can define one easily via |vim.lsp.config()|\\n+(requires Nvim 0.11+), see |lsp-config|.\\n+\\n+------------------------------------------------------------------------------\\n+NEW CONFIGS                                           *lspconfig-new*\\n+\\n+To create a new config, see |lsp-config| (requires Nvim 0.11+).\\n+To contribute a config to nvim-lspconfig, see ../CONTRIBUTING.md.\\n+\\n+==============================================================================\\n+COMPLETION SUPPORT                                        *lspconfig-completion*\\n+\\n+See |lsp-completion|.\\n+\\n+==============================================================================\\n+DEBUGGING AND TROUBLESHOOTING                              *lspconfig-debugging*\\n+\\n+See |lsp-log| to enable verbose logs.\\n+\\n+While using language servers should be easy, debugging issues can be\\n+challenging. First, it is important to identify the source of the issue, which\\n+is typically (in rough order):\\n+\\n+- the language server itself\\n+- a plugin\\n+- overrides in a user configuration\\n+- the built-in client in Nvim core\\n+- nvim-lspconfig\\n+\\n+The first step in debugging is to test with a minimal configuration:\\n+https://github.com/neovim/neovim/issues/new?assignees=\\u0026labels=bug%2Clsp\\u0026template=lsp_bug_report.yml\\n+Historically, many problems are due to plugins or misconfiguration.\\n+\\n+Should that fail, identifying which component is the culprit is challenging.\\n+The following are the only categories of bugs that pertain to nvim-lspconfig.\\n+\\n+- The root directory inferred for your project is wrong, or it should be\\n+  detected but is not due to a bug in the nvim-lspconfig path utilities.\\n+- The server is launching, but you believe that the default settings,\\n+  initialization options, or command arguments are suboptimal and should be\\n+  replaced based on your understanding of the server documentation.\\n+\\n+All bugs Nvim's built-in client should be reported to the Nvim core issue\\n+tracker. All bugs pertaining to plugins should be reported to the respective\\n+plugin. All missing features in a language server should be reported to the\\n+upstream language server issue tracker.\\n+\\n+For debugging nvim-lspconfig issues, the most common hurdles users face are:\\n+\\n+  - The language server is not installed or is otherwise not executable.\\n+    nvim-lspconfig does not install language servers for you. Ensure the `cmd`\\n+    defined in |lspconfig-all| is executable from the command line. If the\\n+    absolute path to the binary is not supplied in `cmd`, ensure it is on your\\n+    PATH.\\n+  - Missing filetype plugins. Certain languages are not detecting by\\n+    Vim/Nvim because they have not yet been added to the filetype detection\\n+    system. Ensure `:set ft?` shows the filetype and not an empty value.\\n+  - Not triggering root detection. nvim-lspconfig is built around the concept\\n+    of projects.\\n+  - Not triggering root detection. Some language servers will only start\\n+    if it is opened in a directory, or child directory, containing a file\\n+    which signals the *root* of the project. Most of the time, this is\\n+    a `.git` folder, but each server defines the root config in the lua file.\\n+    See |lspconfig-all| or the source code for the list of root directories.\\n+  - Misconfiguration. Often users will override `cmd`, `on_init`, or\\n+    `handlers`. Ensure that you debug by using a stock configuration to ensure\\n+    your customizations are not introducing issues.\\n+\\n+|:LspInfo| provides an overview which can be useful for debugging.\\n+\\n+==============================================================================\\n+\\n+vim:tw=78:ts=8:ft=help:norl:\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/doc/lspconfig.txt\",\"old_path\":\"files/nvim-lspconfig/doc/lspconfig.txt\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/doc/server_configurations.md\\n@@ -0,0 +1 @@\\n+# This file was renamed to [configs.md](./configs.md).\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/doc/server_configurations.md\",\"old_path\":\"files/nvim-lspconfig/doc/server_configurations.md\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/doc/server_configurations.txt\\n@@ -0,0 +1 @@\\n+This file was renamed to \\\"configs.txt\\\".\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/doc/server_configurations.txt\",\"old_path\":\"files/nvim-lspconfig/doc/server_configurations.txt\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/flake.lock\\n@@ -0,0 +1,42 @@\\n+{\\n+  \\\"nodes\\\": {\\n+    \\\"nixpkgs\\\": {\\n+      \\\"locked\\\": {\\n+        \\\"lastModified\\\": 1699906975,\\n+        \\\"narHash\\\": \\\"sha256-tvLhyy1iQj3vdW8tYt2uPNoTWt6FB87tG2HaaErk6tk=\\\",\\n+        \\\"owner\\\": \\\"NixOS\\\",\\n+        \\\"repo\\\": \\\"nixpkgs\\\",\\n+        \\\"rev\\\": \\\"5c6e85ee472d37c904dd43f8f76b680602b9128f\\\",\\n+        \\\"type\\\": \\\"github\\\"\\n+      },\\n+      \\\"original\\\": {\\n+        \\\"owner\\\": \\\"NixOS\\\",\\n+        \\\"repo\\\": \\\"nixpkgs\\\",\\n+        \\\"type\\\": \\\"github\\\"\\n+      }\\n+    },\\n+    \\\"root\\\": {\\n+      \\\"inputs\\\": {\\n+        \\\"nixpkgs\\\": \\\"nixpkgs\\\",\\n+        \\\"systems\\\": \\\"systems\\\"\\n+      }\\n+    },\\n+    \\\"systems\\\": {\\n+      \\\"locked\\\": {\\n+        \\\"lastModified\\\": 1681028828,\\n+        \\\"narHash\\\": \\\"sha256-Vy1rq5AaRuLzOxct8nz4T6wlgyUR7zLU309k9mBC768=\\\",\\n+        \\\"owner\\\": \\\"nix-systems\\\",\\n+        \\\"repo\\\": \\\"default\\\",\\n+        \\\"rev\\\": \\\"da67096a3b9bf56a91d16901293e51ba5b49a27e\\\",\\n+        \\\"type\\\": \\\"github\\\"\\n+      },\\n+      \\\"original\\\": {\\n+        \\\"owner\\\": \\\"nix-systems\\\",\\n+        \\\"repo\\\": \\\"default\\\",\\n+        \\\"type\\\": \\\"github\\\"\\n+      }\\n+    }\\n+  },\\n+  \\\"root\\\": \\\"root\\\",\\n+  \\\"version\\\": 7\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/flake.lock\",\"old_path\":\"files/nvim-lspconfig/flake.lock\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/flake.nix\\n@@ -0,0 +1,23 @@\\n+{\\n+  description = \\\"Quickstart configurations for the Nvim LSP client\\\";\\n+\\n+  inputs.nixpkgs.url = \\\"github:NixOS/nixpkgs\\\";\\n+  inputs.systems.url = \\\"github:nix-systems/default\\\";\\n+\\n+  outputs = { self, nixpkgs, systems }: let\\n+    supportedSystems = nixpkgs.lib.genAttrs (import systems);\\n+    forEachSystem = function: supportedSystems (system:\\n+        function nixpkgs.legacyPackages.${system});\\n+  in {\\n+   devShells = forEachSystem (pkgs: {\\n+      default = pkgs.mkShell {\\n+        packages = [\\n+          pkgs.stylua\\n+          pkgs.luaPackages.luacheck\\n+          pkgs.luajitPackages.vusted\\n+          pkgs.selene\\n+        ];\\n+      };\\n+    });\\n+  };\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/flake.nix\",\"old_path\":\"files/nvim-lspconfig/flake.nix\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ada_ls.lua\\n@@ -0,0 +1,31 @@\\n+---@brief\\n+---\\n+--- https://github.com/AdaCore/ada_language_server\\n+---\\n+--- Installation instructions can be found [here](https://github.com/AdaCore/ada_language_server#Install).\\n+---\\n+--- Workspace-specific [settings](https://github.com/AdaCore/ada_language_server/blob/master/doc/settings.md) such as `projectFile` can be provided in a `.als.json` file at the root of the workspace.\\n+--- Alternatively, configuration may be passed as a \\\"settings\\\" object to `vim.lsp.config('ada_ls', {})`:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('ada_ls', {\\n+---     settings = {\\n+---       ada = {\\n+---         projectFile = \\\"project.gpr\\\";\\n+---         scenarioVariables = { ... };\\n+---       }\\n+---     }\\n+--- })\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ada_language_server' },\\n+  filetypes = { 'ada' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('Makefile', '.git', 'alire.toml', '*.gpr', '*.adc')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ada_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ada_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/agda_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/agda/agda-language-server\\n+---\\n+--- Language Server for Agda.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'als' },\\n+  filetypes = { 'agda' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('.git', '*.agda-lib')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/agda_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/agda_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/aiken.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/aiken-lang/aiken\\n+---\\n+--- A language server for Aiken Programming Language.\\n+--- [Installation](https://aiken-lang.org/installation-instructions)\\n+---\\n+--- It can be i\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'aiken', 'lsp' },\\n+  filetypes = { 'aiken' },\\n+  root_markers = { 'aiken.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/aiken.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/aiken.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/air.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/posit-dev/air\\n+---\\n+--- Air is an R formatter and language server, written in Rust.\\n+---\\n+--- Refer to the [documentation](https://posit-dev.github.io/air/editors.html) for more details.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'air', 'language-server' },\\n+  filetypes = { 'r' },\\n+  root_markers = { 'air.toml', '.air.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/air.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/air.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/alloy_ls.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/AlloyTools/org.alloytools.alloy\\n+---\\n+--- Alloy is a formal specification language for describing structures and a tool for exploring them.\\n+---\\n+--- You may also need to configure the filetype for Alloy (*.als) files:\\n+---\\n+--- ```\\n+--- autocmd BufNewFile,BufRead *.als set filetype=alloy\\n+--- ```\\n+---\\n+--- or\\n+---\\n+--- ```lua\\n+--- vim.filetype.add({\\n+---   pattern = {\\n+---     ['.*/*.als'] = 'alloy',\\n+---   },\\n+--- })\\n+--- ```\\n+---\\n+--- Alternatively, you may use a syntax plugin like https://github.com/runoshun/vim-alloy.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'alloy', 'lsp' },\\n+  filetypes = { 'alloy' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/alloy_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/alloy_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/anakin_language_server.lua\\n@@ -0,0 +1,71 @@\\n+---@brief\\n+---\\n+--- https://pypi.org/project/anakin-language-server/\\n+---\\n+--- `anakin-language-server` is yet another Jedi Python language server.\\n+---\\n+--- Available options:\\n+---\\n+--- * Initialization: https://github.com/muffinmad/anakin-language-server#initialization-option\\n+--- * Configuration: https://github.com/muffinmad/anakin-language-server#configuration-options\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'anakinls' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    '.git',\\n+  },\\n+  settings = {\\n+    anakinls = {\\n+      pyflakes_errors = {\\n+        -- Full list: https://github.com/PyCQA/pyflakes/blob/master/pyflakes/messages.py\\n+\\n+        'ImportStarNotPermitted',\\n+\\n+        'UndefinedExport',\\n+        'UndefinedLocal',\\n+        'UndefinedName',\\n+\\n+        'DuplicateArgument',\\n+        'MultiValueRepeatedKeyLiteral',\\n+        'MultiValueRepeatedKeyVariable',\\n+\\n+        'FutureFeatureNotDefined',\\n+        'LateFutureImport',\\n+\\n+        'ReturnOutsideFunction',\\n+        'YieldOutsideFunction',\\n+        'ContinueOutsideLoop',\\n+        'BreakOutsideLoop',\\n+\\n+        'TwoStarredExpressions',\\n+        'TooManyExpressionsInStarredAssignment',\\n+\\n+        'ForwardAnnotationSyntaxError',\\n+        'RaiseNotImplemented',\\n+\\n+        'StringDotFormatExtraPositionalArguments',\\n+        'StringDotFormatExtraNamedArguments',\\n+        'StringDotFormatMissingArgument',\\n+        'StringDotFormatMixingAutomatic',\\n+        'StringDotFormatInvalidFormat',\\n+\\n+        'PercentFormatInvalidFormat',\\n+        'PercentFormatMixedPositionalAndNamed',\\n+        'PercentFormatUnsupportedFormat',\\n+        'PercentFormatPositionalCountMismatch',\\n+        'PercentFormatExtraNamedArguments',\\n+        'PercentFormatMissingArgument',\\n+        'PercentFormatExpectedMapping',\\n+        'PercentFormatExpectedSequence',\\n+        'PercentFormatStarRequiresSequence',\\n+      },\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/anakin_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/anakin_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/angularls.lua\\n@@ -0,0 +1,85 @@\\n+---@brief\\n+---\\n+--- https://github.com/angular/vscode-ng-language-service\\n+--- `angular-language-server` can be installed via npm `npm install -g @angular/language-server`.\\n+---\\n+--- ```lua\\n+--- local project_library_path = \\\"/path/to/project/lib\\\"\\n+--- local cmd = {\\\"ngserver\\\", \\\"--stdio\\\", \\\"--tsProbeLocations\\\", project_library_path , \\\"--ngProbeLocations\\\", project_library_path}\\n+---\\n+--- vim.lsp.config('angularls', {\\n+---   cmd = cmd,\\n+--- })\\n+--- ```\\n+\\n+-- Angular requires a node_modules directory to probe for @angular/language-service and typescript\\n+-- in order to use your projects configured versions.\\n+local root_dir = vim.fn.getcwd()\\n+local node_modules_dir = vim.fs.find('node_modules', { path = root_dir, upward = true })[1]\\n+local project_root = node_modules_dir and vim.fs.dirname(node_modules_dir) or '?'\\n+\\n+local function get_probe_dir()\\n+  return project_root and (project_root .. '/node_modules') or ''\\n+end\\n+\\n+local function get_angular_core_version()\\n+  if not project_root then\\n+    return ''\\n+  end\\n+\\n+  local package_json = project_root .. '/package.json'\\n+  if not vim.uv.fs_stat(package_json) then\\n+    return ''\\n+  end\\n+\\n+  local contents = io.open(package_json):read '*a'\\n+  local json = vim.json.decode(contents)\\n+  if not json.dependencies then\\n+    return ''\\n+  end\\n+\\n+  local angular_core_version = json.dependencies['@angular/core']\\n+\\n+  angular_core_version = angular_core_version and angular_core_version:match('%d+%.%d+%.%d+')\\n+\\n+  return angular_core_version\\n+end\\n+\\n+local default_probe_dir = get_probe_dir()\\n+local default_angular_core_version = get_angular_core_version()\\n+\\n+-- structure should be like\\n+-- - $EXTENSION_PATH\\n+--   - @angular\\n+--     - language-server\\n+--       - bin\\n+--         - ngserver\\n+--   - typescript\\n+local ngserver_exe = vim.fn.exepath('ngserver')\\n+local ngserver_path = #(ngserver_exe or '') \\u003e 0 and vim.fs.dirname(vim.uv.fs_realpath(ngserver_exe)) or '?'\\n+local extension_path = vim.fs.normalize(vim.fs.joinpath(ngserver_path, '../../../'))\\n+\\n+-- angularls will get module by `require.resolve(PROBE_PATH, MODULE_NAME)` of nodejs\\n+local ts_probe_dirs = vim.iter({ extension_path, default_probe_dir }):join(',')\\n+local ng_probe_dirs = vim\\n+  .iter({ extension_path, default_probe_dir })\\n+  :map(function(p)\\n+    return vim.fs.joinpath(p, '/@angular/language-server/node_modules')\\n+  end)\\n+  :join(',')\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'ngserver',\\n+    '--stdio',\\n+    '--tsProbeLocations',\\n+    ts_probe_dirs,\\n+    '--ngProbeLocations',\\n+    ng_probe_dirs,\\n+    '--angularCoreVersion',\\n+    default_angular_core_version,\\n+  },\\n+  filetypes = { 'typescript', 'html', 'typescriptreact', 'typescript.tsx', 'htmlangular' },\\n+  root_markers = { 'angular.json', 'nx.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/angularls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/angularls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ansiblels.lua\\n@@ -0,0 +1,38 @@\\n+---@brief\\n+---\\n+--- https://github.com/ansible/vscode-ansible\\n+---\\n+--- Language server for the ansible configuration management tool.\\n+---\\n+--- `ansible-language-server` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g @ansible/ansible-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ansible-language-server', '--stdio' },\\n+  settings = {\\n+    ansible = {\\n+      python = {\\n+        interpreterPath = 'python',\\n+      },\\n+      ansible = {\\n+        path = 'ansible',\\n+      },\\n+      executionEnvironment = {\\n+        enabled = false,\\n+      },\\n+      validation = {\\n+        enabled = true,\\n+        lint = {\\n+          enabled = true,\\n+          path = 'ansible-lint',\\n+        },\\n+      },\\n+    },\\n+  },\\n+  filetypes = { 'yaml.ansible' },\\n+  root_markers = { 'ansible.cfg', '.ansible-lint' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ansiblels.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ansiblels.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/antlersls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://www.npmjs.com/package/antlers-language-server\\n+---\\n+--- `antlersls` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g antlers-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'antlersls', '--stdio' },\\n+  filetypes = { 'html', 'antlers' },\\n+  root_markers = { 'composer.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/antlersls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/antlersls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/arduino_language_server.lua\\n@@ -0,0 +1,91 @@\\n+---@brief\\n+---\\n+--- https://github.com/arduino/arduino-language-server\\n+---\\n+--- Language server for Arduino\\n+---\\n+--- The `arduino-language-server` can be installed by running:\\n+---\\n+--- ```\\n+--- go install github.com/arduino/arduino-language-server@latest\\n+--- ```\\n+---\\n+--- The `arduino-cli` tool must also be installed. Follow [these\\n+--- installation instructions](https://arduino.github.io/arduino-cli/latest/installation/) for\\n+--- your platform.\\n+---\\n+--- After installing `arduino-cli`, follow [these\\n+--- instructions](https://arduino.github.io/arduino-cli/latest/getting-started/#create-a-configuration-file)\\n+--- for generating a configuration file if you haven't done so already, and make\\n+--- sure you [install any relevant platforms\\n+--- libraries](https://arduino.github.io/arduino-cli/latest/getting-started/#install-the-core-for-your-board).\\n+---\\n+--- The language server also requires `clangd` to be installed. Follow [these\\n+--- installation instructions](https://clangd.llvm.org/installation) for your\\n+--- platform.\\n+---\\n+--- If you don't have a sketch yet create one.\\n+---\\n+--- ```sh\\n+--- $ arduino-cli sketch new test\\n+--- $ cd test\\n+--- ```\\n+---\\n+--- You will need a `sketch.yaml` file in order for the language server to understand your project. It will also save you passing options to `arduino-cli` each time you compile or upload a file. You can generate the file by using the following commands.\\n+---\\n+---\\n+--- First gather some information about your board. Make sure your board is connected and run the following:\\n+---\\n+--- ```sh\\n+--- $ arduino-cli board list\\n+--- Port         Protocol Type              Board Name  FQBN            Core\\n+--- /dev/ttyACM0 serial   Serial Port (USB) Arduino Uno arduino:avr:uno arduino:avr\\n+--- ```\\n+---\\n+--- Then generate the file:\\n+---\\n+--- ```sh\\n+--- arduino-cli board attach -p /dev/ttyACM0 -b arduino:avr:uno test.ino\\n+--- ```\\n+---\\n+--- The resulting file should look like this:\\n+---\\n+--- ```yaml\\n+--- default_fqbn: arduino:avr:uno\\n+--- default_port: /dev/ttyACM0\\n+--- ```\\n+---\\n+--- Your folder structure should look like this:\\n+---\\n+--- ```\\n+--- .\\n+--- ├── test.ino\\n+--- └── sketch.yaml\\n+--- ```\\n+---\\n+--- For further instructions about configuration options, run `arduino-language-server --help`.\\n+---\\n+--- Note that an upstream bug makes keywords in some cases become undefined by the language server.\\n+--- Ref: https://github.com/arduino/arduino-ide/issues/159\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'arduino' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.ino')(fname))\\n+  end,\\n+  cmd = {\\n+    'arduino-language-server',\\n+  },\\n+  capabilities = {\\n+    textDocument = {\\n+      semanticTokens = vim.NIL,\\n+    },\\n+    workspace = {\\n+      semanticTokens = vim.NIL,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/arduino_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/arduino_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/asm_lsp.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/bergercookie/asm-lsp\\n+---\\n+--- Language Server for NASM/GAS/GO Assembly\\n+---\\n+--- `asm-lsp` can be installed via cargo:\\n+--- cargo install asm-lsp\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'asm-lsp' },\\n+  filetypes = { 'asm', 'vmasm' },\\n+  root_markers = { '.asm-lsp.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/asm_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/asm_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ast_grep.lua\\n@@ -0,0 +1,39 @@\\n+---@brief\\n+---\\n+--- https://ast-grep.github.io/\\n+---\\n+--- ast-grep(sg) is a fast and polyglot tool for code structural search, lint, rewriting at large scale.\\n+--- ast-grep LSP only works in projects that have `sgconfig.y[a]ml` in their root directories.\\n+--- ```sh\\n+--- npm install [-g] @ast-grep/cli\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ast-grep', 'lsp' },\\n+  workspace_required = true,\\n+  reuse_client = function(client, config)\\n+    config.cmd_cwd = config.root_dir\\n+    return client.config.cmd_cwd == config.cmd_cwd\\n+  end,\\n+  filetypes = { -- https://ast-grep.github.io/reference/languages.html\\n+    'c',\\n+    'cpp',\\n+    'rust',\\n+    'go',\\n+    'java',\\n+    'python',\\n+    'javascript',\\n+    'javascriptreact',\\n+    'javascript.jsx',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'typescript.tsx',\\n+    'html',\\n+    'css',\\n+    'kotlin',\\n+    'dart',\\n+    'lua',\\n+  },\\n+  root_markers = { 'sgconfig.yaml', 'sgconfig.yml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ast_grep.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ast_grep.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/astro.lua\\n@@ -0,0 +1,25 @@\\n+---@brief\\n+---\\n+--- https://github.com/withastro/language-tools/tree/main/packages/language-server\\n+---\\n+--- `astro-ls` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g @astrojs/language-server\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'astro-ls', '--stdio' },\\n+  filetypes = { 'astro' },\\n+  root_markers = { 'package.json', 'tsconfig.json', 'jsconfig.json', '.git' },\\n+  init_options = {\\n+    typescript = {},\\n+  },\\n+  before_init = function(_, config)\\n+    if config.init_options and config.init_options.typescript and not config.init_options.typescript.tsdk then\\n+      config.init_options.typescript.tsdk = util.get_typescript_server_path(config.root_dir)\\n+    end\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/astro.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/astro.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/atlas.lua\\n@@ -0,0 +1,66 @@\\n+---@brief\\n+---\\n+--- https://github.com/ariga/atlas\\n+---\\n+--- Language server for Atlas config and schema files.\\n+---\\n+--- You may also need to configure the filetype for *.hcl files:\\n+---\\n+--- ```vim\\n+--- autocmd BufNewFile,BufRead atlas.hcl set filetype=atlas-config\\n+--- autocmd BufNewFile,BufRead *.my.hcl set filetype=atlas-schema-mysql\\n+--- autocmd BufNewFile,BufRead *.pg.hcl set filetype=atlas-schema-postgresql\\n+--- autocmd BufNewFile,BufRead *.lt.hcl set filetype=atlas-schema-sqlite\\n+--- autocmd BufNewFile,BufRead *.ch.hcl set filetype=atlas-schema-clickhouse\\n+--- autocmd BufNewFile,BufRead *.ms.hcl set filetype=atlas-schema-mssql\\n+--- autocmd BufNewFile,BufRead *.rs.hcl set filetype=atlas-schema-redshift\\n+--- autocmd BufNewFile,BufRead *.test.hcl set filetype=atlas-test\\n+--- autocmd BufNewFile,BufRead *.plan.hcl set filetype=atlas-plan\\n+--- autocmd BufNewFile,BufRead *.rule.hcl set filetype=atlas-rule\\n+--- ```\\n+---\\n+--- or\\n+---\\n+--- ```lua\\n+--- vim.filetype.add({\\n+---   filename = {\\n+---     ['atlas.hcl'] = 'atlas-config',\\n+---   },\\n+---   pattern = {\\n+---     ['.*/*.my.hcl'] = 'atlas-schema-mysql',\\n+---     ['.*/*.pg.hcl'] = 'atlas-schema-postgresql',\\n+---     ['.*/*.lt.hcl'] = 'atlas-schema-sqlite',\\n+---     ['.*/*.ch.hcl'] = 'atlas-schema-clickhouse',\\n+---     ['.*/*.ms.hcl'] = 'atlas-schema-mssql',\\n+---     ['.*/*.rs.hcl'] = 'atlas-schema-redshift',\\n+---     ['.*/*.test.hcl'] = 'atlas-test',\\n+---     ['.*/*.plan.hcl'] = 'atlas-plan',\\n+---     ['.*/*.rule.hcl'] = 'atlas-rule',\\n+---   },\\n+--- })\\n+--- ```\\n+---\\n+--- Optionally, tell treesitter to treat Atlas filetypes as HCL for better syntax highlighting:\\n+---\\n+--- ```lua\\n+--- vim.treesitter.language.register('hcl', 'atlas-config')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-mysql')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-postgresql')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-sqlite')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-clickhouse')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-mssql')\\n+--- vim.treesitter.language.register('hcl', 'atlas-schema-redshift')\\n+--- vim.treesitter.language.register('hcl', 'atlas-test')\\n+--- vim.treesitter.language.register('hcl', 'atlas-plan')\\n+--- vim.treesitter.language.register('hcl', 'atlas-rule')\\n+--- ```\\n+---\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'atlas', 'tool', 'lsp', '--stdio' },\\n+  filetypes = {\\n+    'atlas-*',\\n+  },\\n+  root_markers = { 'atlas.hcl' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/atlas.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/atlas.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/atopile.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://atopile.io/\\n+---\\n+--- A language server for atopile Programming Language.\\n+---\\n+--- It comes with the atopile compiler, for installation see: [Installing atopile](https://docs.atopile.io/atopile/guides/install)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ato', 'lsp', 'start' },\\n+  filetypes = { 'ato' },\\n+  root_markers = { 'ato.yaml', '.ato', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/atopile.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/atopile.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/autohotkey_lsp.lua\\n@@ -0,0 +1,51 @@\\n+---@brief\\n+---\\n+--- https://github.com/thqby/vscode-autohotkey2-lsp\\n+---\\n+--- AutoHotkey v2.0 LSP implementation\\n+---\\n+--- NOTE: AutoHotkey is Windows-only.\\n+\\n+local function get_autohotkey_path()\\n+  local path = vim.fn.exepath('autohotkey.exe')\\n+  return #path \\u003e 0 and path or ''\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'autohotkey_lsp', '--stdio' },\\n+  filetypes = { 'autohotkey' },\\n+  root_markers = { 'package.json' },\\n+  flags = { debounce_text_changes = 500 },\\n+  --capabilities = capabilities,\\n+  --on_attach = custom_attach,\\n+  init_options = {\\n+    locale = 'en-us',\\n+    InterpreterPath = get_autohotkey_path(),\\n+    AutoLibInclude = 'All',\\n+    CommentTags = '^;;\\\\\\\\s*(?\\u003ctag\\u003e.+)',\\n+    CompleteFunctionParens = false,\\n+    SymbolFoldinFromOpenBrace = false,\\n+    Diagnostics = {\\n+      ClassStaticMemberCheck = true,\\n+      ParamsCheck = true,\\n+    },\\n+    ActionWhenV1IsDetected = 'Continue',\\n+    FormatOptions = {\\n+      array_style = 'expand',\\n+      break_chained_methods = false,\\n+      ignore_comment = false,\\n+      indent_string = '\\\\t',\\n+      max_preserve_newlines = 2,\\n+      brace_style = 'One True Brace',\\n+      object_style = 'none',\\n+      preserve_newlines = true,\\n+      space_after_double_colon = true,\\n+      space_before_conditional = true,\\n+      space_in_empty_paren = false,\\n+      space_in_other = true,\\n+      space_in_paren = false,\\n+      wrap_line_length = 0,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/autohotkey_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/autohotkey_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/autotools_ls.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/Freed-Wu/autotools-language-server\\n+---\\n+--- `autotools-language-server` can be installed via `pip`:\\n+--- ```sh\\n+--- pip install autotools-language-server\\n+--- ```\\n+---\\n+--- Language server for autoconf, automake and make using tree sitter in python.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+local root_files = { 'configure.ac', 'Makefile', 'Makefile.am', '*.mk' }\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'autotools-language-server' },\\n+  filetypes = { 'config', 'automake', 'make' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern(unpack(root_files))(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/autotools_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/autotools_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/awk_ls.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/Beaglefoot/awk-language-server/\\n+---\\n+--- `awk-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g awk-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'awk-language-server' },\\n+  filetypes = { 'awk' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/awk_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/awk_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/azure_pipelines_ls.lua\\n@@ -0,0 +1,39 @@\\n+---@brief\\n+---\\n+--- https://github.com/microsoft/azure-pipelines-language-server\\n+---\\n+--- An Azure Pipelines language server\\n+---\\n+--- `azure-pipelines-ls` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g azure-pipelines-language-server\\n+--- ```\\n+---\\n+--- By default `azure-pipelines-ls` will only work in files named `azure-pipelines.yml`, this can be changed by providing additional settings like so:\\n+--- ```lua\\n+--- vim.lsp.config('azure_pipelines_ls', {\\n+---   ... -- other configuration\\n+---   settings = {\\n+---       yaml = {\\n+---           schemas = {\\n+---               [\\\"https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json\\\"] = {\\n+---                   \\\"/azure-pipeline*.y*l\\\",\\n+---                   \\\"/*.azure*\\\",\\n+---                   \\\"Azure-Pipelines/**/*.y*l\\\",\\n+---                   \\\"Pipelines/*.y*l\\\",\\n+---               },\\n+---           },\\n+---       },\\n+---   },\\n+--- })\\n+--- ```\\n+--- The Azure Pipelines LSP is a fork of `yaml-language-server` and as such the same settings can be passed to it as `yaml-language-server`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'azure-pipelines-language-server', '--stdio' },\\n+  filetypes = { 'yaml' },\\n+  root_markers = { 'azure-pipelines.yml' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/azure_pipelines_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/azure_pipelines_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bacon_ls.lua\\n@@ -0,0 +1,47 @@\\n+---@brief\\n+---\\n+--- https://github.com/crisidev/bacon-ls\\n+---\\n+--- A Language Server Protocol wrapper for [bacon](https://dystroy.org/bacon/).\\n+--- It offers textDocument/diagnostic and workspace/diagnostic capabilities for Rust\\n+--- workspaces using the Bacon export locations file.\\n+---\\n+--- It requires `bacon` and `bacon-ls` to be installed on the system using\\n+--- [mason.nvim](https://github.com/williamboman/mason.nvim) or manually\\n+---\\n+--- ```sh\\n+--- $ cargo install --locked bacon bacon-ls\\n+--- ```\\n+---\\n+--- Settings can be changed using the `init_options` dictionary:util\\n+---\\n+--- ```lua\\n+--- init_options = {\\n+---     -- Bacon export filename (default: .bacon-locations).\\n+---     locationsFile = \\\".bacon-locations\\\",\\n+---     -- Try to update diagnostics every time the file is saved (default: true).\\n+---     updateOnSave = true,\\n+---     --  How many milliseconds to wait before updating diagnostics after a save (default: 1000).\\n+---     updateOnSaveWaitMillis = 1000,\\n+---     -- Try to update diagnostics every time the file changes (default: true).\\n+---     updateOnChange = true,\\n+---     -- Try to validate that bacon preferences are setup correctly to work with bacon-ls (default: true).\\n+---     validateBaconPreferences = true,\\n+---     -- f no bacon preferences file is found, create a new preferences file with the bacon-ls job definition (default: true).\\n+---     createBaconPreferencesFile = true,\\n+---     -- Run bacon in background for the bacon-ls job (default: true)\\n+---     runBaconInBackground = true,\\n+---     -- Command line arguments to pass to bacon running in background (default \\\"--headless -j bacon-ls\\\")\\n+---     runBaconInBackgroundCommandArguments = \\\"--headless -j bacon-ls\\\",\\n+---     -- How many milliseconds to wait between background diagnostics check to synchronize all open files (default: 2000).\\n+---     synchronizeAllOpenFilesWaitMillis = 2000,\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bacon-ls' },\\n+  filetypes = { 'rust' },\\n+  root_markers = { '.bacon-locations', 'Cargo.toml' },\\n+  init_options = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bacon_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bacon_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ballerina.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- Ballerina language server\\n+---\\n+--- The Ballerina language's CLI tool comes with its own language server implementation.\\n+--- The `bal` command line tool must be installed and available in your system's PATH.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bal', 'start-language-server' },\\n+  filetypes = { 'ballerina' },\\n+  root_markers = { 'Ballerina.toml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ballerina.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ballerina.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/basedpyright.lua\\n@@ -0,0 +1,66 @@\\n+---@brief\\n+---\\n+--- https://detachhead.github.io/basedpyright\\n+---\\n+--- `basedpyright`, a static type checker and language server for python\\n+\\n+local function set_python_path(command)\\n+  local path = command.args\\n+  local clients = vim.lsp.get_clients {\\n+    bufnr = vim.api.nvim_get_current_buf(),\\n+    name = 'basedpyright',\\n+  }\\n+  for _, client in ipairs(clients) do\\n+    if client.settings then\\n+      client.settings.python = vim.tbl_deep_extend('force', client.settings.python or {}, { pythonPath = path })\\n+    else\\n+      client.config.settings = vim.tbl_deep_extend('force', client.config.settings, { python = { pythonPath = path } })\\n+    end\\n+    client:notify('workspace/didChangeConfiguration', { settings = nil })\\n+  end\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'basedpyright-langserver', '--stdio' },\\n+  filetypes = { 'python' },\\n+  root_markers = {\\n+    'pyproject.toml',\\n+    'setup.py',\\n+    'setup.cfg',\\n+    'requirements.txt',\\n+    'Pipfile',\\n+    'pyrightconfig.json',\\n+    '.git',\\n+  },\\n+  settings = {\\n+    basedpyright = {\\n+      analysis = {\\n+        autoSearchPaths = true,\\n+        useLibraryCodeForTypes = true,\\n+        diagnosticMode = 'openFilesOnly',\\n+      },\\n+    },\\n+  },\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspPyrightOrganizeImports', function()\\n+      local params = {\\n+        command = 'basedpyright.organizeimports',\\n+        arguments = { vim.uri_from_bufnr(bufnr) },\\n+      }\\n+\\n+      -- Using client.request() directly because \\\"basedpyright.organizeimports\\\" is private\\n+      -- (not advertised via capabilities), which client:exec_cmd() refuses to call.\\n+      -- https://github.com/neovim/neovim/blob/c333d64663d3b6e0dd9aa440e433d346af4a3d81/runtime/lua/vim/lsp/client.lua#L1024-L1030\\n+      client.request('workspace/executeCommand', params, nil, bufnr)\\n+    end, {\\n+      desc = 'Organize Imports',\\n+    })\\n+\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspPyrightSetPythonPath', set_python_path, {\\n+      desc = 'Reconfigure basedpyright with the provided python path',\\n+      nargs = 1,\\n+      complete = 'file',\\n+    })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/basedpyright.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/basedpyright.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bashls.lua\\n@@ -0,0 +1,29 @@\\n+---@brief\\n+---\\n+--- https://github.com/bash-lsp/bash-language-server\\n+---\\n+--- `bash-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm i -g bash-language-server\\n+--- ```\\n+---\\n+--- Language server for bash, written using tree sitter in typescript.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bash-language-server', 'start' },\\n+  settings = {\\n+    bashIde = {\\n+      -- Glob pattern for finding and parsing shell script files in the workspace.\\n+      -- Used by the background analysis features across files.\\n+\\n+      -- Prevent recursive scanning which will cause issues when opening a file\\n+      -- directly in the home directory (e.g. ~/foo.sh).\\n+      --\\n+      -- Default upstream pattern is \\\"**/*@(.sh|.inc|.bash|.command)\\\".\\n+      globPattern = vim.env.GLOB_PATTERN or '*@(.sh|.inc|.bash|.command)',\\n+    },\\n+  },\\n+  filetypes = { 'bash', 'sh' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bashls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bashls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/basics_ls.lua\\n@@ -0,0 +1,27 @@\\n+---@brief\\n+---\\n+--- https://github.com/antonk52/basics-language-server/\\n+---\\n+--- Buffer, path, and snippet completion\\n+---\\n+--- ```sh\\n+--- npm install -g basics-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'basics-language-server' },\\n+  settings = {\\n+    buffer = {\\n+      enable = true,\\n+      minCompletionLength = 4,\\n+    },\\n+    path = {\\n+      enable = true,\\n+    },\\n+    snippet = {\\n+      enable = false,\\n+      sources = {},\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/basics_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/basics_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bazelrc_lsp.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- https://github.com/salesforce-misc/bazelrc-lsp\\n+---\\n+--- `bazelrc-lsp` is a LSP for `.bazelrc` configuration files.\\n+---\\n+--- The `.bazelrc` file type is not detected automatically, you can register it manually (see below) or override the filetypes:\\n+---\\n+--- ```lua\\n+--- vim.filetype.add {\\n+---   pattern = {\\n+---     ['.*.bazelrc'] = 'bazelrc',\\n+---   },\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bazelrc-lsp', 'lsp' },\\n+  filetypes = { 'bazelrc' },\\n+  root_markers = { 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bazelrc_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bazelrc_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/beancount.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/polarmutex/beancount-language-server#installation\\n+---\\n+--- See https://github.com/polarmutex/beancount-language-server#configuration for configuration options\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'beancount-language-server', '--stdio' },\\n+  filetypes = { 'beancount', 'bean' },\\n+  root_markers = { '.git' },\\n+  init_options = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/beancount.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/beancount.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bicep.lua\\n@@ -0,0 +1,40 @@\\n+---@brief\\n+---\\n+--- https://github.com/azure/bicep\\n+--- Bicep language server\\n+---\\n+--- Bicep language server can be installed by downloading and extracting a release of bicep-langserver.zip from [Bicep GitHub releases](https://github.com/Azure/bicep/releases).\\n+---\\n+--- Bicep language server requires the [dotnet-sdk](https://dotnet.microsoft.com/download) to be installed.\\n+---\\n+--- Neovim does not have built-in support for the bicep filetype which is required for lspconfig to automatically launch the language server.\\n+---\\n+--- Filetype detection can be added via an autocmd:\\n+--- ```lua\\n+--- vim.cmd [[ autocmd BufNewFile,BufRead *.bicep set filetype=bicep ]]\\n+--- ```\\n+---\\n+--- **By default, bicep language server does not have a `cmd` set.** This is because nvim-lspconfig does not make assumptions about your path. You must add the following to your init.vim or init.lua to set `cmd` to the absolute path ($HOME and ~ are not expanded) of the unzipped run script or binary.\\n+---\\n+--- ```lua\\n+--- local bicep_lsp_bin = \\\"/path/to/bicep-langserver/Bicep.LangServer.dll\\\"\\n+--- vim.lsp.config('bicep', {\\n+---     cmd = { \\\"dotnet\\\", bicep_lsp_bin };\\n+---     ...\\n+--- })\\n+--- ```\\n+---\\n+--- To download the latest release and place in /usr/local/bin/bicep-langserver:\\n+--- ```bash\\n+--- (cd $(mktemp -d) \\\\\\n+---     \\u0026\\u0026 curl -fLO https://github.com/Azure/bicep/releases/latest/download/bicep-langserver.zip \\\\\\n+---     \\u0026\\u0026 rm -rf /usr/local/bin/bicep-langserver \\\\\\n+---     \\u0026\\u0026 unzip -d /usr/local/bin/bicep-langserver bicep-langserver.zip)\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'bicep', 'bicep-params' },\\n+  root_markers = { '.git' },\\n+  init_options = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bicep.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bicep.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/biome.lua\\n@@ -0,0 +1,72 @@\\n+---@brief\\n+--- https://biomejs.dev\\n+---\\n+--- Toolchain of the web. [Successor of Rome](https://biomejs.dev/blog/annoucing-biome).\\n+---\\n+--- ```sh\\n+--- npm install [-g] @biomejs/biome\\n+--- ```\\n+---\\n+--- ### Monorepo support\\n+---\\n+--- `biome` supports monorepos by default. It will automatically find the `biome.json` corresponding to the package you are working on, as described in the [documentation](https://biomejs.dev/guides/big-projects/#monorepo). This works without the need of spawning multiple instances of `biome`, saving memory.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = function(dispatchers, config)\\n+    local cmd = 'biome'\\n+    local local_cmd = (config or {}).root_dir and config.root_dir .. '/node_modules/.bin/biome'\\n+    if local_cmd and vim.fn.executable(local_cmd) == 1 then\\n+      cmd = local_cmd\\n+    end\\n+    return vim.lsp.rpc.start({ cmd, 'lsp-proxy' }, dispatchers)\\n+  end,\\n+  filetypes = {\\n+    'astro',\\n+    'css',\\n+    'graphql',\\n+    'html',\\n+    'javascript',\\n+    'javascriptreact',\\n+    'json',\\n+    'jsonc',\\n+    'svelte',\\n+    'typescript',\\n+    'typescript.tsx',\\n+    'typescriptreact',\\n+    'vue',\\n+  },\\n+  workspace_required = true,\\n+  root_dir = function(bufnr, on_dir)\\n+    -- The project root is where the LSP can be started from\\n+    -- As stated in the documentation above, this LSP supports monorepos and simple projects.\\n+    -- We select then from the project root, which is identified by the presence of a package\\n+    -- manager lock file.\\n+    local root_markers = { 'package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'bun.lockb', 'bun.lock' }\\n+    -- Give the root markers equal priority by wrapping them in a table\\n+    root_markers = vim.fn.has('nvim-0.11.3') == 1 and { root_markers, { '.git' } }\\n+      or vim.list_extend(root_markers, { '.git' })\\n+    -- We fallback to the current working directory if no project root is found\\n+    local project_root = vim.fs.root(bufnr, root_markers) or vim.fn.getcwd()\\n+\\n+    -- We know that the buffer is using Biome if it has a config file\\n+    -- in its directory tree.\\n+    local filename = vim.api.nvim_buf_get_name(bufnr)\\n+    local biome_config_files = { 'biome.json', 'biome.jsonc' }\\n+    biome_config_files = util.insert_package_json(biome_config_files, 'biome', filename)\\n+    local is_buffer_using_biome = vim.fs.find(biome_config_files, {\\n+      path = filename,\\n+      type = 'file',\\n+      limit = 1,\\n+      upward = true,\\n+      stop = vim.fs.dirname(project_root),\\n+    })[1]\\n+    if not is_buffer_using_biome then\\n+      return\\n+    end\\n+\\n+    on_dir(project_root)\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/biome.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/biome.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bitbake_language_server.lua\\n@@ -0,0 +1,10 @@\\n+---@brief\\n+---\\n+--- \U0001F6E0️ bitbake language server\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bitbake-language-server' },\\n+  filetypes = { 'bitbake' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bitbake_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bitbake_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/blueprint_ls.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- https://gitlab.gnome.org/jwestman/blueprint-compiler\\n+---\\n+--- `blueprint-compiler` can be installed via your system package manager.\\n+---\\n+--- Language server for the blueprint markup language, written in python and part\\n+--- of the blueprint-compiler.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'blueprint-compiler', 'lsp' },\\n+  cmd_env = {\\n+    -- Prevent recursive scanning which will cause issues when opening a file\\n+    -- directly in the home directory (e.g. ~/foo.sh).\\n+    --\\n+    -- Default upstream pattern is \\\"**/*@(.sh|.inc|.bash|.command)\\\".\\n+    GLOB_PATTERN = vim.env.GLOB_PATTERN or '*@(.blp)',\\n+  },\\n+  filetypes = { 'blueprint' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/blueprint_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/blueprint_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bqls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/kitagry/bqls\\n+---\\n+--- The `bqls` BigQuery language server can be installed by running:\\n+---\\n+--- ```sh\\n+--- $ go install github.com/kitagry/bqls@latest\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bqls' },\\n+  filetypes = { 'sql' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bqls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bqls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bright_script.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/RokuCommunity/brighterscript\\n+---\\n+--- `brightscript` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g brighterscript\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bsc', '--lsp', '--stdio' },\\n+  filetypes = { 'brs' },\\n+  root_markers = { 'makefile', 'Makefile', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bright_script.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bright_script.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bsl_ls.lua\\n@@ -0,0 +1,11 @@\\n+---@brief\\n+---\\n+--- https://github.com/1c-syntax/bsl-language-server\\n+---\\n+--- Language Server Protocol implementation for 1C (BSL) - 1C:Enterprise 8 and OneScript languages.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'bsl', 'os' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bsl_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bsl_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/buck2.lua\\n@@ -0,0 +1,18 @@\\n+---@brief\\n+---\\n+--- https://github.com/facebook/buck2\\n+---\\n+--- Build system, successor to Buck\\n+---\\n+--- To better detect Buck2 project files, the following can be added:\\n+---\\n+--- ```\\n+--- vim.cmd [[ autocmd BufRead,BufNewFile *.bxl,BUCK,TARGETS set filetype=bzl ]]\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'buck2', 'lsp' },\\n+  filetypes = { 'bzl' },\\n+  root_markers = { '.buckconfig' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/buck2.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/buck2.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/buddy_ls.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/buddy-compiler/buddy-mlir#buddy-lsp-server\\n+--- The Language Server for the buddy-mlir, a drop-in replacement for mlir-lsp-server,\\n+--- supporting new dialects defined in buddy-mlir.\\n+--- `buddy-lsp-server` can be installed at the buddy-mlir repository (buddy-compiler/buddy-mlir)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'buddy-lsp-server' },\\n+  filetypes = { 'mlir' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/buddy_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/buddy_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/buf_ls.lua\\n@@ -0,0 +1,13 @@\\n+--- @brief\\n+--- https://github.com/bufbuild/buf\\n+---\\n+--- buf beta lsp included in the cli itself\\n+---\\n+--- buf beta lsp is a Protobuf language server compatible with Buf modules and workspaces\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'buf', 'beta', 'lsp', '--timeout=0', '--log-format=text' },\\n+  filetypes = { 'proto' },\\n+  root_markers = { 'buf.yaml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/buf_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/buf_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bufls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/bufbuild/buf-language-server\\n+---\\n+--- `buf-language-server` can be installed via `go install`:\\n+--- ```sh\\n+--- go install github.com/bufbuild/buf-language-server/cmd/bufls@latest\\n+--- ```\\n+---\\n+--- bufls is a Protobuf language server compatible with Buf modules and workspaces\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bufls', 'serve' },\\n+  filetypes = { 'proto' },\\n+  root_markers = { 'buf.work.yaml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bufls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bufls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/bzl.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://bzl.io/\\n+---\\n+--- https://docs.stack.build/docs/cli/installation\\n+---\\n+--- https://docs.stack.build/docs/vscode/starlark-language-server\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'bzl', 'lsp', 'serve' },\\n+  filetypes = { 'bzl' },\\n+  -- https://docs.bazel.build/versions/5.4.1/build-ref.html#workspace\\n+  root_markers = { 'WORKSPACE', 'WORKSPACE.bazel' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/bzl.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/bzl.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/c3_lsp.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/pherrymason/c3-lsp\\n+---\\n+--- Language Server for c3.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'c3lsp' },\\n+  root_markers = { 'project.json', 'manifest.json', '.git' },\\n+  filetypes = { 'c3', 'c3i' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/c3_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/c3_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cairo_ls.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- [Cairo Language Server](https://github.com/starkware-libs/cairo/tree/main/crates/cairo-lang-language-server)\\n+---\\n+--- First, install Cairo following [this tutorial](https://book.cairo-lang.org/ch01-01-installation.html)\\n+---\\n+--- Then enable Cairo Language Server in your Lua configuration.\\n+--- ```lua\\n+--- vim.lsp.enable('cairo_ls')\\n+--- ```\\n+---\\n+--- *cairo-language-server is still under active development, some features might not work yet !*\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  init_options = { hostInfo = 'neovim' },\\n+  cmd = { 'scarb', 'cairo-language-server', '/C', '--node-ipc' },\\n+  filetypes = { 'cairo' },\\n+  root_markers = { 'Scarb.toml', 'cairo_project.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cairo_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cairo_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ccls.lua\\n@@ -0,0 +1,53 @@\\n+---@brief\\n+---\\n+--- https://github.com/MaskRay/ccls/wiki\\n+---\\n+--- ccls relies on a [JSON compilation database](https://clang.llvm.org/docs/JSONCompilationDatabase.html) specified\\n+--- as compile_commands.json or, for simpler projects, a .ccls.\\n+--- For details on how to automatically generate one using CMake look [here](https://cmake.org/cmake/help/latest/variable/CMAKE_EXPORT_COMPILE_COMMANDS.html). Alternatively, you can use [Bear](https://github.com/rizsotto/Bear).\\n+---\\n+--- Customization options are passed to ccls at initialization time via init_options, a list of available options can be found [here](https://github.com/MaskRay/ccls/wiki/Customization#initialization-options). For example:\\n+---\\n+--- ```lua\\n+--- vim.lsp.config(\\\"ccls\\\", {\\n+---   init_options = {\\n+---     compilationDatabaseDirectory = \\\"build\\\";\\n+---     index = {\\n+---       threads = 0;\\n+---     };\\n+---     clang = {\\n+---       excludeArgs = { \\\"-frounding-math\\\"} ;\\n+---     };\\n+---   }\\n+--- })\\n+--- ```\\n+\\n+local function switch_source_header(client, bufnr)\\n+  local method_name = 'textDocument/switchSourceHeader'\\n+  local params = vim.lsp.util.make_text_document_params(bufnr)\\n+  client:request(method_name, params, function(err, result)\\n+    if err then\\n+      error(tostring(err))\\n+    end\\n+    if not result then\\n+      vim.notify('corresponding file cannot be determined')\\n+      return\\n+    end\\n+    vim.cmd.edit(vim.uri_to_fname(result))\\n+  end, bufnr)\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ccls' },\\n+  filetypes = { 'c', 'cpp', 'objc', 'objcpp', 'cuda' },\\n+  root_markers = { 'compile_commands.json', '.ccls', '.git' },\\n+  offset_encoding = 'utf-32',\\n+  -- ccls does not support sending a null root directory\\n+  workspace_required = true,\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspCclsSwitchSourceHeader', function()\\n+      switch_source_header(client, bufnr)\\n+    end, { desc = 'Switch between source/header' })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ccls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ccls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cds_lsp.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://cap.cloud.sap/docs/\\n+---\\n+--- `cds-lsp` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm i -g @sap/cds-lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cds-lsp', '--stdio' },\\n+  filetypes = { 'cds' },\\n+  -- init_options = { provideFormatter = true }, -- needed to enable formatting capabilities\\n+  root_markers = { 'package.json', 'db', 'srv' },\\n+  settings = {\\n+    cds = { validate = true },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cds_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cds_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cir_lsp_server.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://llvm.github.io/clangir\\n+---\\n+--- The Language Server for the LLVM ClangIR language\\n+---\\n+--- `cir-lsp-server` can be installed at the llvm-project repository (https://github.com/llvm/llvm-project)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cir-lsp-server' },\\n+  filetypes = { 'cir' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cir_lsp_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cir_lsp_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/circom-lsp.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- [Circom Language Server](https://github.com/rubydusa/circom-lsp)\\n+---\\n+--- `circom-lsp`, the language server for the Circom language.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'circom-lsp' },\\n+  filetypes = { 'circom' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/circom-lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/circom-lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/clangd.lua\\n@@ -0,0 +1,100 @@\\n+---@brief\\n+---\\n+--- https://clangd.llvm.org/installation.html\\n+---\\n+--- - **NOTE:** Clang \\u003e= 11 is recommended! See [#23](https://github.com/neovim/nvim-lspconfig/issues/23).\\n+--- - If `compile_commands.json` lives in a build directory, you should\\n+---   symlink it to the root of your source tree.\\n+---   ```\\n+---   ln -s /path/to/myproject/build/compile_commands.json /path/to/myproject/\\n+---   ```\\n+--- - clangd relies on a [JSON compilation database](https://clang.llvm.org/docs/JSONCompilationDatabase.html)\\n+---   specified as compile_commands.json, see https://clangd.llvm.org/installation#compile_commandsjson\\n+\\n+-- https://clangd.llvm.org/extensions.html#switch-between-sourceheader\\n+local function switch_source_header(bufnr, client)\\n+  local method_name = 'textDocument/switchSourceHeader'\\n+  ---@diagnostic disable-next-line:param-type-mismatch\\n+  if not client or not client:supports_method(method_name) then\\n+    return vim.notify(('method %s is not supported by any servers active on the current buffer'):format(method_name))\\n+  end\\n+  local params = vim.lsp.util.make_text_document_params(bufnr)\\n+  ---@diagnostic disable-next-line:param-type-mismatch\\n+  client:request(method_name, params, function(err, result)\\n+    if err then\\n+      error(tostring(err))\\n+    end\\n+    if not result then\\n+      vim.notify('corresponding file cannot be determined')\\n+      return\\n+    end\\n+    vim.cmd.edit(vim.uri_to_fname(result))\\n+  end, bufnr)\\n+end\\n+\\n+local function symbol_info(bufnr, client)\\n+  local method_name = 'textDocument/symbolInfo'\\n+  ---@diagnostic disable-next-line:param-type-mismatch\\n+  if not client or not client:supports_method(method_name) then\\n+    return vim.notify('Clangd client not found', vim.log.levels.ERROR)\\n+  end\\n+  local win = vim.api.nvim_get_current_win()\\n+  local params = vim.lsp.util.make_position_params(win, client.offset_encoding)\\n+  ---@diagnostic disable-next-line:param-type-mismatch\\n+  client:request(method_name, params, function(err, res)\\n+    if err or #res == 0 then\\n+      -- Clangd always returns an error, there is no reason to parse it\\n+      return\\n+    end\\n+    local container = string.format('container: %s', res[1].containerName) ---@type string\\n+    local name = string.format('name: %s', res[1].name) ---@type string\\n+    vim.lsp.util.open_floating_preview({ name, container }, '', {\\n+      height = 2,\\n+      width = math.max(string.len(name), string.len(container)),\\n+      focusable = false,\\n+      focus = false,\\n+      title = 'Symbol Info',\\n+    })\\n+  end, bufnr)\\n+end\\n+\\n+---@class ClangdInitializeResult: lsp.InitializeResult\\n+---@field offsetEncoding? string\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'clangd' },\\n+  filetypes = { 'c', 'cpp', 'objc', 'objcpp', 'cuda' },\\n+  root_markers = {\\n+    '.clangd',\\n+    '.clang-tidy',\\n+    '.clang-format',\\n+    'compile_commands.json',\\n+    'compile_flags.txt',\\n+    'configure.ac', -- AutoTools\\n+    '.git',\\n+  },\\n+  capabilities = {\\n+    textDocument = {\\n+      completion = {\\n+        editsNearCursor = true,\\n+      },\\n+    },\\n+    offsetEncoding = { 'utf-8', 'utf-16' },\\n+  },\\n+  ---@param init_result ClangdInitializeResult\\n+  on_init = function(client, init_result)\\n+    if init_result.offsetEncoding then\\n+      client.offset_encoding = init_result.offsetEncoding\\n+    end\\n+  end,\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspClangdSwitchSourceHeader', function()\\n+      switch_source_header(bufnr, client)\\n+    end, { desc = 'Switch between source/header' })\\n+\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspClangdShowSymbolInfo', function()\\n+      symbol_info(bufnr, client)\\n+    end, { desc = 'Show symbol info' })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/clangd.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/clangd.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/clarinet.lua\\n@@ -0,0 +1,11 @@\\n+---@brief\\n+--- https://github.com/hirosystems/clarinet\\n+---\\n+--- Clarinet is the fastest way to build, test, and deploy smart contracts on the Stacks blockchain.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'clarinet', 'lsp' },\\n+  filetypes = { 'clar', 'clarity' },\\n+  root_markers = { 'Clarinet.toml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/clarinet.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/clarinet.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/clojure_lsp.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/clojure-lsp/clojure-lsp\\n+---\\n+--- Clojure Language Server\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'clojure-lsp' },\\n+  filetypes = { 'clojure', 'edn' },\\n+  root_markers = { 'project.clj', 'deps.edn', 'build.boot', 'shadow-cljs.edn', '.git', 'bb.edn' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/clojure_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/clojure_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cmake.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/regen100/cmake-language-server\\n+---\\n+--- CMake LSP Implementation\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cmake-language-server' },\\n+  filetypes = { 'cmake' },\\n+  root_markers = { 'CMakePresets.json', 'CTestConfig.cmake', '.git', 'build', 'cmake' },\\n+  init_options = {\\n+    buildDirectory = 'build',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cmake.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cmake.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cobol_ls.lua\\n@@ -0,0 +1,10 @@\\n+---@brief\\n+---\\n+--- Cobol language support\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cobol-language-support' },\\n+  filetypes = { 'cobol' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cobol_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cobol_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/codebook.lua\\n@@ -0,0 +1,37 @@\\n+---@brief\\n+---\\n+--- https://github.com/blopker/codebook\\n+---\\n+---  An unholy spell checker for code.\\n+---\\n+--- `codebook-lsp` can be installed by following the instructions [here](https://github.com/blopker/codebook/blob/main/README.md#installation).\\n+---\\n+--- The default `cmd` assumes that the `codebook-lsp` binary can be found in `$PATH`.\\n+---\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'codebook-lsp', 'serve' },\\n+  filetypes = {\\n+    'c',\\n+    'css',\\n+    'gitcommit',\\n+    'go',\\n+    'haskell',\\n+    'html',\\n+    'java',\\n+    'javascript',\\n+    'javascriptreact',\\n+    'lua',\\n+    'markdown',\\n+    'php',\\n+    'python',\\n+    'ruby',\\n+    'rust',\\n+    'toml',\\n+    'text',\\n+    'typescript',\\n+    'typescriptreact',\\n+  },\\n+  root_markers = { '.git', 'codebook.toml', '.codebook.toml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/codebook.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/codebook.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/coffeesense.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- https://github.com/phil294/coffeesense\\n+---\\n+--- CoffeeSense Language Server\\n+--- `coffeesense-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g coffeesense-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'coffeesense-language-server', '--stdio' },\\n+  filetypes = { 'coffee' },\\n+  root_markers = { 'package.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/coffeesense.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/coffeesense.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/contextive.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/dev-cycles/contextive\\n+---\\n+--- Language Server for Contextive.\\n+---\\n+--- Contextive allows you to define terms in a central file and provides auto-completion suggestions and hover panels for these terms wherever they're used.\\n+---\\n+--- To install the language server, you need to download the appropriate [GitHub release asset](https://github.com/dev-cycles/contextive/releases/) for your operating system and architecture.\\n+---\\n+--- After the download unzip the Contextive.LanguageServer binary and copy the file into a folder that is included in your system's PATH.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'Contextive.LanguageServer' },\\n+  root_markers = { '.contextive', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/contextive.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/contextive.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/copilot.lua\\n@@ -0,0 +1,108 @@\\n+---@brief\\n+---\\n+--- https://www.npmjs.com/package/@github/copilot-language-server\\n+---\\n+--- The Copilot Language Server enables any editor or IDE\\n+--- to integrate with GitHub Copilot via\\n+--- [the language server protocol](https://microsoft.github.io/language-server-protocol/).\\n+---\\n+--- **[GitHub Copilot](https://github.com/features/copilot)**\\n+--- is an AI pair programmer tool that helps you write code faster and smarter.\\n+---\\n+--- **Sign up for [GitHub Copilot Free](https://github.com/settings/copilot)!**\\n+---\\n+--- Please see [terms of use for GitHub Copilot](https://docs.github.com/en/site-policy/github-terms/github-terms-for-additional-products-and-features#github-copilot)\\n+---\\n+\\n+---@param bufnr integer,\\n+---@param client vim.lsp.Client\\n+local function sign_in(bufnr, client)\\n+  client:request(\\n+    ---@diagnostic disable-next-line: param-type-mismatch\\n+    'signIn',\\n+    vim.empty_dict(),\\n+    function(err, result)\\n+      if err then\\n+        vim.notify(err.message, vim.log.levels.ERROR)\\n+        return\\n+      end\\n+      if result.command then\\n+        local code = result.userCode\\n+        local command = result.command\\n+        vim.fn.setreg('+', code)\\n+        vim.fn.setreg('*', code)\\n+        local continue = vim.fn.confirm(\\n+          'Copied your one-time code to clipboard.\\\\n' .. 'Open the browser to complete the sign-in process?',\\n+          '\\u0026Yes\\\\n\\u0026No'\\n+        )\\n+        if continue == 1 then\\n+          client:exec_cmd(command, { bufnr = bufnr }, function(cmd_err, cmd_result)\\n+            if cmd_err then\\n+              vim.notify(err.message, vim.log.levels.ERROR)\\n+              return\\n+            end\\n+            if cmd_result.status == 'OK' then\\n+              vim.notify('Signed in as ' .. cmd_result.user .. '.')\\n+            end\\n+          end)\\n+        end\\n+      end\\n+\\n+      if result.status == 'PromptUserDeviceFlow' then\\n+        vim.notify('Enter your one-time code ' .. result.userCode .. ' in ' .. result.verificationUri)\\n+      elseif result.status == 'AlreadySignedIn' then\\n+        vim.notify('Already signed in as ' .. result.user .. '.')\\n+      end\\n+    end\\n+  )\\n+end\\n+\\n+---@param client vim.lsp.Client\\n+local function sign_out(_, client)\\n+  client:request(\\n+    ---@diagnostic disable-next-line: param-type-mismatch\\n+    'signOut',\\n+    vim.empty_dict(),\\n+    function(err, result)\\n+      if err then\\n+        vim.notify(err.message, vim.log.levels.ERROR)\\n+        return\\n+      end\\n+      if result.status == 'NotSignedIn' then\\n+        vim.notify('Not signed in.')\\n+      end\\n+    end\\n+  )\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'copilot-language-server',\\n+    '--stdio',\\n+  },\\n+  root_markers = { '.git' },\\n+  init_options = {\\n+    editorInfo = {\\n+      name = 'Neovim',\\n+      version = tostring(vim.version()),\\n+    },\\n+    editorPluginInfo = {\\n+      name = 'Neovim',\\n+      version = tostring(vim.version()),\\n+    },\\n+  },\\n+  settings = {\\n+    telemetry = {\\n+      telemetryLevel = 'all',\\n+    },\\n+  },\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspCopilotSignIn', function()\\n+      sign_in(bufnr, client)\\n+    end, { desc = 'Sign in Copilot with GitHub' })\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspCopilotSignOut', function()\\n+      sign_out(bufnr, client)\\n+    end, { desc = 'Sign out Copilot with GitHub' })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/copilot.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/copilot.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/coq_lsp.lua\\n@@ -0,0 +1,10 @@\\n+---@brief\\n+---\\n+--- https://github.com/ejgallego/coq-lsp/\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'coq-lsp' },\\n+  filetypes = { 'coq' },\\n+  root_markers = { '_CoqProject', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/coq_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/coq_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/crystalline.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/elbywan/crystalline\\n+---\\n+--- Crystal language server.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'crystalline' },\\n+  filetypes = { 'crystal' },\\n+  root_markers = { 'shard.yml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/crystalline.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/crystalline.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/csharp_ls.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/razzmatazz/csharp-language-server\\n+---\\n+--- Language Server for C#.\\n+---\\n+--- csharp-ls requires the [dotnet-sdk](https://dotnet.microsoft.com/download) to be installed.\\n+---\\n+--- The preferred way to install csharp-ls is with `dotnet tool install --global csharp-ls`.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'csharp-ls' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern '*.sln'(fname) or util.root_pattern '*.slnx'(fname) or util.root_pattern '*.csproj'(fname))\\n+  end,\\n+  filetypes = { 'cs' },\\n+  init_options = {\\n+    AutomaticWorkspaceInit = true,\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/csharp_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/csharp_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cspell_ls.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- [cspell language server](https://github.com/vlabo/cspell-lsp)\\n+---\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cspell-lsp', '--stdio' },\\n+  root_markers = {\\n+    '.git',\\n+    'cspell.json',\\n+    '.cspell.json',\\n+    'cspell.json',\\n+    '.cSpell.json',\\n+    'cSpell.json',\\n+    'cspell.config.js',\\n+    'cspell.config.cjs',\\n+    'cspell.config.json',\\n+    'cspell.config.yaml',\\n+    'cspell.config.yml',\\n+    'cspell.yaml',\\n+    'cspell.yml',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cspell_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cspell_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/css_variables.lua\\n@@ -0,0 +1,39 @@\\n+---@brief\\n+---\\n+--- https://github.com/vunguyentuan/vscode-css-variables/tree/master/packages/css-variables-language-server\\n+---\\n+--- CSS variables autocompletion and go-to-definition\\n+---\\n+--- `css-variables-language-server` can be 