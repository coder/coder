"files/nvim-lspconfig/lsp/dcmls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dcmls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/debputy.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://salsa.debian.org/debian/debputy\\n+---\\n+--- Language Server for Debian packages.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'debputy', 'lsp', 'server' },\\n+  filetypes = { 'debcontrol', 'debcopyright', 'debchangelog', 'autopkgtest', 'make', 'yaml' },\\n+  root_markers = { 'debian' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/debputy.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/debputy.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/denols.lua\\n@@ -0,0 +1,111 @@\\n+---@brief\\n+---\\n+--- https://github.com/denoland/deno\\n+---\\n+--- Deno's built-in language server\\n+---\\n+--- To appropriately highlight codefences returned from denols, you will need to augment vim.g.markdown_fenced languages\\n+---  in your init.lua. Example:\\n+---\\n+--- ```lua\\n+--- vim.g.markdown_fenced_languages = {\\n+---   \\\"ts=typescript\\\"\\n+--- }\\n+--- ```\\n+\\n+local lsp = vim.lsp\\n+\\n+local function virtual_text_document_handler(uri, res, client)\\n+  if not res then\\n+    return nil\\n+  end\\n+\\n+  local lines = vim.split(res.result, '\\\\n')\\n+  local bufnr = vim.uri_to_bufnr(uri)\\n+\\n+  local current_buf = vim.api.nvim_buf_get_lines(bufnr, 0, -1, false)\\n+  if #current_buf ~= 0 then\\n+    return nil\\n+  end\\n+\\n+  vim.api.nvim_buf_set_lines(bufnr, 0, -1, false, lines)\\n+  vim.api.nvim_set_option_value('readonly', true, { buf = bufnr })\\n+  vim.api.nvim_set_option_value('modified', false, { buf = bufnr })\\n+  vim.api.nvim_set_option_value('modifiable', false, { buf = bufnr })\\n+  lsp.buf_attach_client(bufnr, client.id)\\n+end\\n+\\n+local function virtual_text_document(uri, client)\\n+  local params = {\\n+    textDocument = {\\n+      uri = uri,\\n+    },\\n+  }\\n+  local result = client:request_sync('deno/virtualTextDocument', params)\\n+  virtual_text_document_handler(uri, result, client)\\n+end\\n+\\n+local function denols_handler(err, result, ctx, config)\\n+  if not result or vim.tbl_isempty(result) then\\n+    return nil\\n+  end\\n+\\n+  local client = vim.lsp.get_client_by_id(ctx.client_id)\\n+  for _, res in pairs(result) do\\n+    local uri = res.uri or res.targetUri\\n+    if uri:match '^deno:' then\\n+      virtual_text_document(uri, client)\\n+      res['uri'] = uri\\n+      res['targetUri'] = uri\\n+    end\\n+  end\\n+\\n+  lsp.handlers[ctx.method](err, result, ctx, config)\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'deno', 'lsp' },\\n+  cmd_env = { NO_COLOR = true },\\n+  filetypes = {\\n+    'javascript',\\n+    'javascriptreact',\\n+    'javascript.jsx',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'typescript.tsx',\\n+  },\\n+  root_markers = { 'deno.json', 'deno.jsonc', '.git' },\\n+  settings = {\\n+    deno = {\\n+      enable = true,\\n+      suggest = {\\n+        imports = {\\n+          hosts = {\\n+            ['https://deno.land'] = true,\\n+          },\\n+        },\\n+      },\\n+    },\\n+  },\\n+  handlers = {\\n+    ['textDocument/definition'] = denols_handler,\\n+    ['textDocument/typeDefinition'] = denols_handler,\\n+    ['textDocument/references'] = denols_handler,\\n+  },\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspDenolsCache', function()\\n+      client:exec_cmd({\\n+        command = 'deno.cache',\\n+        arguments = { {}, vim.uri_from_bufnr(bufnr) },\\n+      }, { bufnr = bufnr }, function(err, _, ctx)\\n+        if err then\\n+          local uri = ctx.params.arguments[2]\\n+          vim.notify('cache command failed for' .. vim.uri_to_fname(uri), vim.log.levels.ERROR)\\n+        end\\n+      end)\\n+    end, {\\n+      desc = 'Cache a module and all of its dependencies.',\\n+    })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/denols.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/denols.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dhall_lsp_server.lua\\n@@ -0,0 +1,18 @@\\n+---@brief\\n+---\\n+--- https://github.com/dhall-lang/dhall-haskell/tree/master/dhall-lsp-server\\n+---\\n+--- language server for dhall\\n+---\\n+--- `dhall-lsp-server` can be installed via cabal:\\n+--- ```sh\\n+--- cabal install dhall-lsp-server\\n+--- ```\\n+--- prebuilt binaries can be found [here](https://github.com/dhall-lang/dhall-haskell/releases).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'dhall-lsp-server' },\\n+  filetypes = { 'dhall' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dhall_lsp_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dhall_lsp_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/diagnosticls.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/iamcco/diagnostic-languageserver\\n+---\\n+--- Diagnostic language server integrate with linters.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  -- Configuration from https://github.com/iamcco/diagnostic-languageserver#config--document\\n+  cmd = { 'diagnostic-languageserver', '--stdio' },\\n+  root_markers = { '.git' },\\n+  -- Empty by default, override to add filetypes.\\n+  filetypes = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/diagnosticls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/diagnosticls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/digestif.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- https://github.com/astoff/digestif\\n+---\\n+--- Digestif is a code analyzer, and a language server, for LaTeX, ConTeXt et caterva. It provides\\n+---\\n+--- context-sensitive completion, documentation, code navigation, and related functionality to any\\n+---\\n+--- text editor that speaks the LSP protocol.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'digestif' },\\n+  filetypes = { 'tex', 'plaintex', 'context' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/digestif.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/digestif.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/djlsp.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/fourdigits/django-template-lsp\\n+---\\n+--- `djlsp`, a language server for Django templates.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'djlsp' },\\n+  filetypes = { 'html', 'htmldjango' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/djlsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/djlsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/docker_compose_language_service.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://github.com/microsoft/compose-language-service\\n+--- This project contains a language service for Docker Compose.\\n+---\\n+--- `compose-language-service` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install @microsoft/compose-language-service\\n+--- ```\\n+---\\n+--- Note: If the docker-compose-langserver doesn't startup when entering a `docker-compose.yaml` file, make sure that the filetype is `yaml.docker-compose`. You can set with: `:set filetype=yaml.docker-compose`.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'docker-compose-langserver', '--stdio' },\\n+  filetypes = { 'yaml.docker-compose' },\\n+  root_markers = { 'docker-compose.yaml', 'docker-compose.yml', 'compose.yaml', 'compose.yml' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/docker_compose_language_service.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/docker_compose_language_service.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/docker_language_server.lua\\n@@ -0,0 +1,32 @@\\n+---@brief\\n+---\\n+--- https://github.com/docker/docker-language-server\\n+---\\n+--- `docker-langserver-server` can be installed via `go`:\\n+--- ```sh\\n+--- go install github.com/docker/docker-language-server/cmd/docker-language-server@latest\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'docker-language-server', 'start', '--stdio' },\\n+  filetypes = { 'dockerfile', 'yaml.docker-compose' },\\n+  get_language_id = function(_, ftype)\\n+    if ftype == 'yaml.docker-compose' or ftype:lower():find('ya?ml') then\\n+      return 'dockercompose'\\n+    else\\n+      return ftype\\n+    end\\n+  end,\\n+  root_markers = {\\n+    'Dockerfile',\\n+    'docker-compose.yaml',\\n+    'docker-compose.yml',\\n+    'compose.yaml',\\n+    'compose.yml',\\n+    'docker-bake.json',\\n+    'docker-bake.hcl',\\n+    'docker-bake.override.json',\\n+    'docker-bake.override.hcl',\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/docker_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/docker_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dockerls.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/rcjsuen/dockerfile-language-server-nodejs\\n+---\\n+--- `docker-langserver` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g dockerfile-language-server-nodejs\\n+--- ```\\n+---\\n+--- Additional configuration can be applied in the following way:\\n+--- ```lua\\n+--- vim.lsp.config('dockerls', {\\n+---     settings = {\\n+---         docker = {\\n+--- \\t    languageserver = {\\n+--- \\t        formatter = {\\n+--- \\t\\t    ignoreMultilineInstructions = true,\\n+--- \\t\\t},\\n+--- \\t    },\\n+--- \\t}\\n+---     }\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'docker-langserver', '--stdio' },\\n+  filetypes = { 'dockerfile' },\\n+  root_markers = { 'Dockerfile' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dockerls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dockerls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dolmenls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/Gbury/dolmen/blob/master/doc/lsp.md\\n+---\\n+--- `dolmenls` can be installed via `opam`\\n+--- ```sh\\n+--- opam install dolmen_lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'dolmenls' },\\n+  filetypes = { 'smt2', 'tptp', 'p', 'cnf', 'icnf', 'zf' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dolmenls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dolmenls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dotls.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/nikeee/dot-language-server\\n+---\\n+--- `dot-language-server` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g dot-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'dot-language-server', '--stdio' },\\n+  filetypes = { 'dot' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dotls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dotls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dprint.lua\\n@@ -0,0 +1,26 @@\\n+---@brief\\n+---\\n+--- https://github.com/dprint/dprint\\n+---\\n+--- Pluggable and configurable code formatting platform written in Rust.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'dprint', 'lsp' },\\n+  filetypes = {\\n+    'javascript',\\n+    'javascriptreact',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'json',\\n+    'jsonc',\\n+    'markdown',\\n+    'python',\\n+    'toml',\\n+    'rust',\\n+    'roslyn',\\n+    'graphql',\\n+  },\\n+  root_markers = { 'dprint.json', '.dprint.json', 'dprint.jsonc', '.dprint.jsonc' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dprint.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dprint.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ds_pinyin_lsp.lua\\n@@ -0,0 +1,67 @@\\n+---@brief\\n+---\\n+--- https://github.com/iamcco/ds-pinyin-lsp\\n+--- Dead simple Pinyin language server for input Chinese without IME(input method).\\n+--- To install, download the latest [release](https://github.com/iamcco/ds-pinyin-lsp/releases) and ensure `ds-pinyin-lsp` is on your path.\\n+--- And make ensure the database file `dict.db3` is also downloaded. And put the path to `dict.dbs` in the following code.\\n+---\\n+--- ```lua\\n+---\\n+--- vim.lsp.config('ds_pinyin_lsp', {\\n+---     init_options = {\\n+---         db_path = \\\"your_path_to_database\\\"\\n+---     }\\n+--- })\\n+---\\n+--- ```\\n+\\n+local bin_name = 'ds-pinyin-lsp'\\n+if vim.fn.has 'win32' == 1 then\\n+  bin_name = bin_name .. '.exe'\\n+end\\n+\\n+local function ds_pinyin_lsp_off(bufnr)\\n+  local ds_pinyin_lsp_client = vim.lsp.get_clients({ bufnr = bufnr, name = 'ds_pinyin_lsp' })[1]\\n+  if ds_pinyin_lsp_client then\\n+    ds_pinyin_lsp_client:notify('$/turn/completion', {\\n+      ['completion_on'] = false,\\n+    })\\n+  else\\n+    vim.notify 'notification $/turn/completion is not supported by any servers active on the current buffer'\\n+  end\\n+end\\n+\\n+local function ds_pinyin_lsp_on(bufnr)\\n+  local ds_pinyin_lsp_client = vim.lsp.get_clients({ bufnr = bufnr, name = 'ds_pinyin_lsp' })[1]\\n+  if ds_pinyin_lsp_client then\\n+    ds_pinyin_lsp_client:notify('$/turn/completion', {\\n+      ['completion_on'] = true,\\n+    })\\n+  else\\n+    vim.notify 'notification $/turn/completion is not supported by any servers active on the current buffer'\\n+  end\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { bin_name },\\n+  filetypes = { 'markdown', 'org' },\\n+  root_markers = { '.git' },\\n+  init_options = {\\n+    completion_on = true,\\n+    show_symbols = true,\\n+    show_symbols_only_follow_by_hanzi = false,\\n+    show_symbols_by_n_times = 0,\\n+    match_as_same_as_input = true,\\n+    match_long_input = true,\\n+    max_suggest = 15,\\n+  },\\n+  on_attach = function(_, bufnr)\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspDsPinyinCompletionOff', function()\\n+      ds_pinyin_lsp_off(bufnr)\\n+    end, { desc = 'Turn off the ds-pinyin-lsp completion' })\\n+    vim.api.nvim_buf_create_user_command(bufnr, 'LspDsPinyinCompletionOn', function()\\n+      ds_pinyin_lsp_on(bufnr)\\n+    end, { desc = 'Turn on the ds-pinyin-lsp completion' })\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ds_pinyin_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ds_pinyin_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/dts_lsp.lua\\n@@ -0,0 +1,22 @@\\n+---@brief\\n+---\\n+--- `dts-lsp` is an LSP for Devicetree files built on top of tree-sitter-devicetree grammar.\\n+--- Language servers can be used in many editors, such as Visual Studio Code, Emacs\\n+--- or Vim\\n+---\\n+--- Install `dts-lsp` from https://github.com/igor-prusov/dts-lsp and add it to path\\n+---\\n+--- `dts-lsp` doesn't require any configuration.\\n+---\\n+--- More about Devicetree:\\n+--- https://www.devicetree.org/\\n+--- https://docs.zephyrproject.org/latest/build/dts/index.html\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  name = 'dts_lsp',\\n+  cmd = { 'dts-lsp' },\\n+  filetypes = { 'dts', 'dtsi', 'overlay' },\\n+  root_markers = { '.git' },\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/dts_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/dts_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/earthlyls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/glehmann/earthlyls\\n+---\\n+--- A fast language server for earthly.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'earthlyls' },\\n+  filetypes = { 'earthfile' },\\n+  root_markers = { 'Earthfile' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/earthlyls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/earthlyls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ecsact.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/ecsact-dev/ecsact_lsp_server\\n+---\\n+--- Language server for Ecsact.\\n+---\\n+--- The default cmd assumes `ecsact_lsp_server` is in your PATH. Typically from the\\n+--- Ecsact SDK: https://ecsact.dev/start\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ecsact_lsp_server', '--stdio' },\\n+  filetypes = { 'ecsact' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ecsact.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ecsact.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/efm.lua\\n@@ -0,0 +1,25 @@\\n+--- @brief\\n+---\\n+--- https://github.com/mattn/efm-langserver\\n+---\\n+--- General purpose Language Server that can use specified error message format generated from specified command.\\n+---\\n+--- Requires at minimum EFM version [v0.0.38](https://github.com/mattn/efm-langserver/releases/tag/v0.0.38) to support\\n+--- launching the language server on single files.\\n+---\\n+--- Note: In order for neovim's built-in language server client to send the appropriate `languageId` to EFM, **you must\\n+--- specify `filetypes` in your call to `vim.lsp.config`**. Otherwise the server will be launch on the `BufEnter` instead\\n+--- of the `FileType` autocommand, and the `filetype` variable used to populate the `languageId` will not yet be set.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('efm', {\\n+---   filetypes = { 'python','cpp','lua' }\\n+---   settings = ..., -- You must populate this according to the EFM readme\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'efm-langserver' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/efm.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/efm.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/elixirls.lua\\n@@ -0,0 +1,46 @@\\n+---@brief\\n+---\\n+--- https://github.com/elixir-lsp/elixir-ls\\n+---\\n+--- `elixir-ls` can be installed by following the instructions [here](https://github.com/elixir-lsp/elixir-ls#building-and-running).\\n+---\\n+--- 1. Download the zip from https://github.com/elixir-lsp/elixir-ls/releases/latest/\\n+--- 2. Unzip it and make it executable.\\n+---    ```bash\\n+---    unzip elixir-ls.zip -d /path/to/elixir-ls\\n+---    # Unix\\n+---    chmod +x /path/to/elixir-ls/language_server.sh\\n+---    ```\\n+---\\n+--- **By default, elixir-ls doesn't have a `cmd` set.** This is because nvim-lspconfig does not make assumptions about\\n+--- your path. You must add the following to your init.vim or init.lua to set `cmd` to the absolute path ($HOME and\\n+--- ~ are not expanded) of your unzipped elixir-ls.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('elixirls', {\\n+---     -- Unix\\n+---     cmd = { \\\"/path/to/elixir-ls/language_server.sh\\\" };\\n+---     -- Windows\\n+---     cmd = { \\\"/path/to/elixir-ls/language_server.bat\\\" };\\n+---     ...\\n+--- })\\n+--- ```\\n+---\\n+--- 'root_dir' is chosen like this: if two or more directories containing `mix.exs` were found when searching\\n+--- directories upward, the second one (higher up) is chosen, with the assumption that it is the root of an umbrella\\n+--- app. Otherwise the directory containing the single mix.exs that was found is chosen.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'elixir', 'eelixir', 'heex', 'surface' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    --- Elixir workspaces may have multiple `mix.exs` files, for an \\\"umbrella\\\" layout or monorepo.\\n+    --- So we specify `limit=2` and treat the highest one (if any) as the root of an umbrella app.\\n+    local matches = vim.fs.find({ 'mix.exs' }, { upward = true, limit = 2, path = fname })\\n+    local child_or_root_path, maybe_umbrella_path = unpack(matches)\\n+    local root_dir = vim.fs.dirname(maybe_umbrella_path or child_or_root_path)\\n+\\n+    on_dir(root_dir)\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/elixirls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/elixirls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/elmls.lua\\n@@ -0,0 +1,35 @@\\n+---@brief\\n+---\\n+--- https://github.com/elm-tooling/elm-language-server#installation\\n+---\\n+--- If you don't want to use Nvim to install it, then you can use:\\n+--- ```sh\\n+--- npm install -g elm elm-test elm-format @elm-tooling/elm-language-server\\n+--- ```\\n+\\n+local api = vim.api\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'elm-language-server' },\\n+  -- TODO(ashkan) if we comment this out, it will allow elmls to operate on elm.json. It seems like it could do that, but no other editor allows it right now.\\n+  filetypes = { 'elm' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = api.nvim_buf_get_name(bufnr)\\n+    local filetype = vim.bo[bufnr].filetype\\n+    if filetype == 'elm' or (filetype == 'json' and fname:match 'elm%.json$') then\\n+      on_dir(vim.fs.root(fname, 'elm.json'))\\n+      return\\n+    end\\n+    on_dir(nil)\\n+  end,\\n+  init_options = {\\n+    elmReviewDiagnostics = 'off', -- 'off' | 'warning' | 'error'\\n+    skipInstallPackageConfirmation = false,\\n+    disableElmLSDiagnostics = false,\\n+    onlyUpdateDiagnosticsOnSave = false,\\n+  },\\n+  capabilities = {\\n+    offsetEncoding = { 'utf-8', 'utf-16' },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/elmls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/elmls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/elp.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://whatsapp.github.io/erlang-language-platform\\n+---\\n+--- ELP integrates Erlang into modern IDEs via the language server protocol and was\\n+--- inspired by rust-analyzer.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'elp', 'server' },\\n+  filetypes = { 'erlang' },\\n+  root_markers = { 'rebar.config', 'erlang.mk', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/elp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/elp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ember.lua\\n@@ -0,0 +1,16 @@\\n+---@brief\\n+---\\n+--- https://github.com/ember-tooling/ember-language-server\\n+---\\n+--- `ember-language-server` can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm install -g @ember-tooling/ember-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ember-language-server', '--stdio' },\\n+  filetypes = { 'handlebars', 'typescript', 'javascript', 'typescript.glimmer', 'javascript.glimmer' },\\n+  root_markers = { 'ember-cli-build.js', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ember.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ember.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/emmet_language_server.lua\\n@@ -0,0 +1,31 @@\\n+---@brief\\n+---\\n+--- https://github.com/olrtg/emmet-language-server\\n+---\\n+--- Package can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g @olrtg/emmet-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'emmet-language-server', '--stdio' },\\n+  filetypes = {\\n+    'astro',\\n+    'css',\\n+    'eruby',\\n+    'html',\\n+    'htmlangular',\\n+    'htmldjango',\\n+    'javascriptreact',\\n+    'less',\\n+    'pug',\\n+    'sass',\\n+    'scss',\\n+    'svelte',\\n+    'templ',\\n+    'typescriptreact',\\n+    'vue',\\n+  },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/emmet_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/emmet_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/emmet_ls.lua\\n@@ -0,0 +1,31 @@\\n+---@brief\\n+---\\n+--- https://github.com/aca/emmet-ls\\n+---\\n+--- Package can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g emmet-ls\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'emmet-ls', '--stdio' },\\n+  filetypes = {\\n+    'astro',\\n+    'css',\\n+    'eruby',\\n+    'html',\\n+    'htmlangular',\\n+    'htmldjango',\\n+    'javascriptreact',\\n+    'less',\\n+    'pug',\\n+    'sass',\\n+    'scss',\\n+    'svelte',\\n+    'templ',\\n+    'typescriptreact',\\n+    'vue',\\n+  },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/emmet_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/emmet_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/emmylua_ls.lua\\n@@ -0,0 +1,24 @@\\n+---@brief\\n+---\\n+--- https://github.com/EmmyLuaLs/emmylua-analyzer-rust\\n+---\\n+--- Emmylua Analyzer Rust. Language Server for Lua.\\n+---\\n+--- `emmylua_ls` can be installed using `cargo` by following the instructions[here]\\n+--- (https://github.com/EmmyLuaLs/emmylua-analyzer-rust?tab=readme-ov-file#install).\\n+---\\n+--- The default `cmd` assumes that the `emmylua_ls` binary can be found in `$PATH`.\\n+--- It might require you to provide cargo binaries installation path in it.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'emmylua_ls' },\\n+  filetypes = { 'lua' },\\n+  root_markers = {\\n+    '.luarc.json',\\n+    '.emmyrc.json',\\n+    '.luacheckrc',\\n+    '.git',\\n+  },\\n+  workspace_required = false,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/emmylua_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/emmylua_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/erg_language_server.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://github.com/erg-lang/erg#flags ELS\\n+---\\n+--- ELS (erg-language-server) is a language server for the Erg programming language.\\n+---\\n+--- erg-language-server can be installed via `cargo` and used as follows:\\n+---\\n+--- ```sh\\n+--- cargo install erg --features els\\n+--- erg --language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'erg', '--language-server' },\\n+  filetypes = { 'erg' },\\n+  root_markers = { 'package.er', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/erg_language_server.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/erg_language_server.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/erlangls.lua\\n@@ -0,0 +1,21 @@\\n+---@brief\\n+---\\n+--- https://erlang-ls.github.io\\n+---\\n+--- Language Server for Erlang.\\n+---\\n+--- Clone [erlang_ls](https://github.com/erlang-ls/erlang_ls)\\n+--- Compile the project with `make` and copy resulting binaries somewhere in your $PATH eg. `cp _build/*/bin/* ~/local/bin`\\n+---\\n+--- Installation instruction can be found [here](https://github.com/erlang-ls/erlang_ls).\\n+---\\n+--- Installation requirements:\\n+---     - [Erlang OTP 21+](https://github.com/erlang/otp)\\n+---     - [rebar3 3.9.1+](https://github.com/erlang/rebar3)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'erlang_ls' },\\n+  filetypes = { 'erlang' },\\n+  root_markers = { 'rebar.config', 'erlang.mk', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/erlangls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/erlangls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/esbonio.lua\\n@@ -0,0 +1,51 @@\\n+---@brief\\n+---\\n+--- https://github.com/swyddfa/esbonio\\n+---\\n+--- Esbonio is a language server for [Sphinx](https://www.sphinx-doc.org/en/master/) documentation projects.\\n+--- The language server can be installed via pip\\n+---\\n+--- ```\\n+--- pip install esbonio\\n+--- ```\\n+---\\n+--- Since Sphinx is highly extensible you will get best results if you install the language server in the same\\n+--- Python environment as the one used to build your documentation. To ensure that the correct Python environment\\n+--- is picked up, you can either launch `nvim` with the correct environment activated.\\n+---\\n+--- ```\\n+--- source env/bin/activate\\n+--- nvim\\n+--- ```\\n+---\\n+--- Or you can modify the default `cmd` to include the full path to the Python interpreter.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('esbonio', {\\n+---   cmd = { '/path/to/virtualenv/bin/python', '-m', 'esbonio' }\\n+--- })\\n+--- ```\\n+---\\n+--- Esbonio supports a number of config values passed as `init_options` on startup, for example.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('esbonio', {\\n+---   init_options = {\\n+---     server = {\\n+---       logLevel = \\\"debug\\\"\\n+---     },\\n+---     sphinx = {\\n+---       confDir = \\\"/path/to/docs\\\",\\n+---       srcDir = \\\"${confDir}/../docs-src\\\"\\n+---     }\\n+--- })\\n+--- ```\\n+---\\n+--- A full list and explanation of the available options can be found [here](https://docs.esbon.io/en/esbonio-language-server-v0.16.4/lsp/getting-started.html?editor=neovim-lspconfig#configuration)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'python3', '-m', 'esbonio' },\\n+  filetypes = { 'rst' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/esbonio.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/esbonio.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/eslint.lua\\n@@ -0,0 +1,225 @@\\n+--- @brief\\n+---\\n+--- https://github.com/hrsh7th/vscode-langservers-extracted\\n+---\\n+--- `vscode-eslint-language-server` is a linting engine for JavaScript / Typescript.\\n+--- It can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm i -g vscode-langservers-extracted\\n+--- ```\\n+---\\n+--- The default `on_attach` config provides the `LspEslintFixAll` command that can be used to format a document on save:\\n+--- ```lua\\n+--- local base_on_attach = vim.lsp.config.eslint.on_attach\\n+--- vim.lsp.config(\\\"eslint\\\", {\\n+---   on_attach = function(client, bufnr)\\n+---     if not base_on_attach then return end\\n+---\\n+---     base_on_attach(client, bufnr)\\n+---     vim.api.nvim_create_autocmd(\\\"BufWritePre\\\", {\\n+---       buffer = bufnr,\\n+---       command = \\\"LspEslintFixAll\\\",\\n+---     })\\n+---   end,\\n+--- })\\n+--- ```\\n+---\\n+--- See [vscode-eslint](https://github.com/microsoft/vscode-eslint/blob/55871979d7af184bf09af491b6ea35ebd56822cf/server/src/eslintServer.ts#L216-L229) for configuration options.\\n+---\\n+--- Messages handled in lspconfig: `eslint/openDoc`, `eslint/confirmESLintExecution`, `eslint/probeFailed`, `eslint/noLibrary`\\n+---\\n+--- Additional messages you can handle: `eslint/noConfig`\\n+---\\n+--- ### Monorepo support\\n+---\\n+--- `vscode-eslint-language-server` supports monorepos by default. It will automatically find the config file corresponding to the package you are working on. You can use different configs in different packages.\\n+--- This works without the need of spawning multiple instances of `vscode-eslint-language-server`.\\n+--- You can use a different version of ESLint in each package, but it is recommended to use the same version of ESLint in all packages. The location of the ESLint binary will be determined automatically.\\n+---\\n+--- /!\\\\ When using flat config files, you need to use them across all your packages in your monorepo, as it's a global setting for the server.\\n+\\n+local util = require 'lspconfig.util'\\n+local lsp = vim.lsp\\n+\\n+local eslint_config_files = {\\n+  '.eslintrc',\\n+  '.eslintrc.js',\\n+  '.eslintrc.cjs',\\n+  '.eslintrc.yaml',\\n+  '.eslintrc.yml',\\n+  '.eslintrc.json',\\n+  'eslint.config.js',\\n+  'eslint.config.mjs',\\n+  'eslint.config.cjs',\\n+  'eslint.config.ts',\\n+  'eslint.config.mts',\\n+  'eslint.config.cts',\\n+}\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'vscode-eslint-language-server', '--stdio' },\\n+  filetypes = {\\n+    'javascript',\\n+    'javascriptreact',\\n+    'javascript.jsx',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'typescript.tsx',\\n+    'vue',\\n+    'svelte',\\n+    'astro',\\n+    'htmlangular',\\n+  },\\n+  workspace_required = true,\\n+  on_attach = function(client, bufnr)\\n+    vim.api.nvim_buf_create_user_command(0, 'LspEslintFixAll', function()\\n+      client:request_sync('workspace/executeCommand', {\\n+        command = 'eslint.applyAllFixes',\\n+        arguments = {\\n+          {\\n+            uri = vim.uri_from_bufnr(bufnr),\\n+            version = lsp.util.buf_versions[bufnr],\\n+          },\\n+        },\\n+      }, nil, bufnr)\\n+    end, {})\\n+  end,\\n+  root_dir = function(bufnr, on_dir)\\n+    -- The project root is where the LSP can be started from\\n+    -- As stated in the documentation above, this LSP supports monorepos and simple projects.\\n+    -- We select then from the project root, which is identified by the presence of a package\\n+    -- manager lock file.\\n+    local root_markers = { 'package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'bun.lockb', 'bun.lock' }\\n+    -- Give the root markers equal priority by wrapping them in a table\\n+    root_markers = vim.fn.has('nvim-0.11.3') == 1 and { root_markers, { '.git' } }\\n+      or vim.list_extend(root_markers, { '.git' })\\n+    -- We fallback to the current working directory if no project root is found\\n+    local project_root = vim.fs.root(bufnr, root_markers) or vim.fn.getcwd()\\n+\\n+    -- We know that the buffer is using ESLint if it has a config file\\n+    -- in its directory tree.\\n+    --\\n+    -- Eslint used to support package.json files as config files, but it doesn't anymore.\\n+    -- We keep this for backward compatibility.\\n+    local filename = vim.api.nvim_buf_get_name(bufnr)\\n+    local eslint_config_files_with_package_json =\\n+      util.insert_package_json(eslint_config_files, 'eslintConfig', filename)\\n+    local is_buffer_using_eslint = vim.fs.find(eslint_config_files_with_package_json, {\\n+      path = filename,\\n+      type = 'file',\\n+      limit = 1,\\n+      upward = true,\\n+      stop = vim.fs.dirname(project_root),\\n+    })[1]\\n+    if not is_buffer_using_eslint then\\n+      return\\n+    end\\n+\\n+    on_dir(project_root)\\n+  end,\\n+  -- Refer to https://github.com/Microsoft/vscode-eslint#settings-options for documentation.\\n+  settings = {\\n+    validate = 'on',\\n+    packageManager = nil,\\n+    useESLintClass = false,\\n+    experimental = {\\n+      useFlatConfig = false,\\n+    },\\n+    codeActionOnSave = {\\n+      enable = false,\\n+      mode = 'all',\\n+    },\\n+    format = true,\\n+    quiet = false,\\n+    onIgnoredFiles = 'off',\\n+    rulesCustomizations = {},\\n+    run = 'onType',\\n+    problems = {\\n+      shortenToSingleLine = false,\\n+    },\\n+    -- nodePath configures the directory in which the eslint server should start its node_modules resolution.\\n+    -- This path is relative to the workspace folder (root dir) of the server instance.\\n+    nodePath = '',\\n+    -- use the workspace folder location or the file location (if no workspace folder is open) as the working directory\\n+    workingDirectory = { mode = 'auto' },\\n+    codeAction = {\\n+      disableRuleComment = {\\n+        enable = true,\\n+        location = 'separateLine',\\n+      },\\n+      showDocumentation = {\\n+        enable = true,\\n+      },\\n+    },\\n+  },\\n+  before_init = function(_, config)\\n+    -- The \\\"workspaceFolder\\\" is a VSCode concept. It limits how far the\\n+    -- server will traverse the file system when locating the ESLint config\\n+    -- file (e.g., .eslintrc).\\n+    local root_dir = config.root_dir\\n+\\n+    if root_dir then\\n+      config.settings = config.settings or {}\\n+      config.settings.workspaceFolder = {\\n+        uri = root_dir,\\n+        name = vim.fn.fnamemodify(root_dir, ':t'),\\n+      }\\n+\\n+      -- Support flat config files\\n+      -- They contain 'config' in the file name\\n+      local flat_config_files = vim.tbl_filter(function(file)\\n+        return file:match('config')\\n+      end, eslint_config_files)\\n+\\n+      for _, file in ipairs(flat_config_files) do\\n+        local found_files = vim.fn.globpath(root_dir, file, true, true)\\n+\\n+        -- Filter out files inside node_modules\\n+        local filtered_files = {}\\n+        for _, found_file in ipairs(found_files) do\\n+          if string.find(found_file, '[/\\\\\\\\]node_modules[/\\\\\\\\]') == nil then\\n+            table.insert(filtered_files, found_file)\\n+          end\\n+        end\\n+\\n+        if #filtered_files \\u003e 0 then\\n+          config.settings.experimental = config.settings.experimental or {}\\n+          config.settings.experimental.useFlatConfig = true\\n+          break\\n+        end\\n+      end\\n+\\n+      -- Support Yarn2 (PnP) projects\\n+      local pnp_cjs = root_dir .. '/.pnp.cjs'\\n+      local pnp_js = root_dir .. '/.pnp.js'\\n+      if vim.uv.fs_stat(pnp_cjs) or vim.uv.fs_stat(pnp_js) then\\n+        local cmd = config.cmd\\n+        config.cmd = vim.list_extend({ 'yarn', 'exec' }, cmd)\\n+      end\\n+    end\\n+  end,\\n+  handlers = {\\n+    ['eslint/openDoc'] = function(_, result)\\n+      if result then\\n+        vim.ui.open(result.url)\\n+      end\\n+      return {}\\n+    end,\\n+    ['eslint/confirmESLintExecution'] = function(_, result)\\n+      if not result then\\n+        return\\n+      end\\n+      return 4 -- approved\\n+    end,\\n+    ['eslint/probeFailed'] = function()\\n+      vim.notify('[lspconfig] ESLint probe failed.', vim.log.levels.WARN)\\n+      return {}\\n+    end,\\n+    ['eslint/noLibrary'] = function()\\n+      vim.notify('[lspconfig] Unable to find ESLint library.', vim.log.levels.WARN)\\n+      return {}\\n+    end,\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/eslint.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/eslint.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/expert.lua\\n@@ -0,0 +1,26 @@\\n+---@brief\\n+---\\n+--- https://github.com/elixir-lang/expert\\n+---\\n+--- Expert is the official language server implementation for the Elixir programming language.\\n+---\\n+--- 'root_dir' is chosen like this: if two or more directories containing `mix.exs` were found when\\n+--- searching directories upward, the second one (higher up) is chosen, with the assumption that it\\n+--- is the root of an umbrella app. Otherwise the directory containing the single mix.exs that was\\n+--- found is chosen.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  filetypes = { 'elixir', 'eelixir', 'heex', 'surface' },\\n+  cmd = { 'expert' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    --- Elixir workspaces may have multiple `mix.exs` files, for an \\\"umbrella\\\" layout or monorepo.\\n+    --- So we specify `limit=2` and treat the highest one (if any) as the root of an umbrella app.\\n+    local matches = vim.fs.find({ 'mix.exs' }, { upward = true, limit = 2, path = fname })\\n+    local child_or_root_path, maybe_umbrella_path = unpack(matches)\\n+    local root_dir = vim.fs.dirname(maybe_umbrella_path or child_or_root_path)\\n+\\n+    on_dir(root_dir)\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/expert.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/expert.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/facility_language_server.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://