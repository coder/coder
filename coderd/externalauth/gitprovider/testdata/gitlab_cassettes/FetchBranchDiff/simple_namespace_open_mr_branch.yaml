ity for completion\\n+--- local capabilities = vim.lsp.protocol.make_client_capabilities()\\n+--- capabilities.textDocument.completion.completionItem.snippetSupport = true\\n+---\\n+--- vim.lsp.config('cssls', {\\n+---   capabilities = capabilities,\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'vscode-css-language-server', '--stdio' },\\n+  filetypes = { 'css', 'scss', 'less' },\\n+  init_options = { provideFormatter = true }, -- needed to enable formatting capabilities\\n+  root_markers = { 'package.json', '.git' },\\n+  settings = {\\n+    css = { validate = true },\\n+    scss = { validate = true },\\n+    less = { validate = true },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cssls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cssls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cssmodules_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/antonk52/cssmodules-language-server\\n+---\\n+--- Language server for autocompletion and go-to-definition functionality for CSS modules.\\n+---\\n+--- You can install cssmodules-language-server via npm:\\n+--- ```sh\\n+--- npm install -g cssmodules-language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'cssmodules-language-server' },\\n+  filetypes = { 'javascript', 'javascriptreact', 'typescript', 'typescriptreact' },\\n+  root_markers = { 'package.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/cssmodules_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/cssmodules_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/cucumber_language_server.lua\\n@@ -0,0 +1,1