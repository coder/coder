}'\\\"\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/bash_aliases\",\"old_path\":\"files/bash_aliases\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/bash_profile\\n@@ -0,0 +1,4 @@\\n+# shellcheck disable=SC1090\\n+if [ -f ~/.bashrc ]; then\\n+    . ~/.bashrc\\n+fi\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/bash_profile\",\"old_path\":\"files/bash_profile\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/bashrc\\n@@ -0,0 +1,49 @@\\n+# shellcheck disable=SC1090,SC1091\\n+if [ -f /etc/bash_completion ] \\u0026\\u0026 ! shopt -oq posix; then\\n+    . /etc/bash_completion\\n+fi\\n+\\n+# GPG signing\\n+GPG_TTY=$(tty)\\n+export GPG_TTY\\n+\\n+export TIMEZONE=\\\"Europe/Dublin\\\"\\n+export TZ=\\\"Europe/Dublin\\\"\\n+export EDITOR=nvim\\n+export FZF_DEFAULT_OPTS=\\\"--ansi\\\"\\n+export FZF_DEFAULT_COMMAND=\\\"fdfind --type file --color=always --follow --hidden --exclude .git\\\"\\n+export FZF_CTRL_T_COMMAND=\\\"${FZF_DEFAULT_COMMAND}\\\"\\n+export FZF_ALT_C_COMMAND=\\\"fdfind --type directory --color=always --follow --hidden --exclude .git\\\"\\n+export FZF_ALT_C_OPTS=\\\"--preview 'tree -C {} | head -200'\\\"\\n+export FZF_CTRL_R_OPTS=\\\"--preview 'echo {}'\\\"\\n+\\n+[ -f \\\"${HOME}/.fzf.bash\\\" ] \\u0026\\u0026 source \\\"${HOME}/.fzf.bash\\\"\\n+\\n+# use new auth plugin for gke\\n+export USE_GKE_GCLOUD_AUTH_PLUGIN=True\\n+\\n+# Most boxes I work on have about 16 cores.\\n+# See: https://github.com/golang/go/issues/33803\\n+export GOMAXPROCS=16\\n+export SRC_DIR=\\\"${HOME}/src\\\"\\n+export GOPATH=\\\"${HOME}/go\\\"\\n+export PATH=\\\"${HOME}/bin:${GOPATH}/bin:/usr/local/go/bin:${PATH}\\\"\\n+\\n+source ~/.bash_aliases\\n+\\n+export HISTCONTROL=ignoredups:erasedups\\n+shopt -s histappend\\n+\\n+complete -F __start_kubectl k\\n+\\n+POWERLINEGO=$(command -v powerline-go)\\n+\\n+function _update_ps1() {\\n+    PS1=\\\"$($POWERLINEGO -newline -error $? -colorize-hostname -mode patched -jobs \\\"$(jobs -p | wc -l)\\\")\\\"\\n+}\\n+\\n+if [ \\\"$TERM\\\" != \\\"linux\\\" ] \\u0026\\u0026 [ -f \\\"${POWERLINEGO}\\\" ]; then\\n+    PROMPT_COMMAND=\\\"_update_ps1; $PROMPT_COMMAND\\\"\\n+fi\\n+\\n+complete -C '/usr/bin/aws_completer' aws\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/bashrc\",\"old_path\":\"files/bashrc\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/config-nvim-init.lua\\n@@ -0,0 +1,128 @@\\n+local vim = vim\\n+local Plug = vim.fn['plug#']\\n+\\n+vim.call('plug#begin')\\n+Plug('junegunn/seoul256.vim')\\n+Plug('vim-airline/vim-airline')\\n+Plug('tpope/vim-sensible')\\n+Plug('tpope/vim-fugitive')\\n+Plug('mkitt/tabline.vim')\\n+Plug('airblade/vim-gitgutter')\\n+vim.cmd([[\\n+  Plug 'junegunn/fzf', { 'do': { -\\u003e fzf#install() } }\\n+]])\\n+Plug('junegunn/fzf.vim')\\n+Plug('neovim/nvim-lspconfig')\\n+Plug('leafgarland/typescript-vim')\\n+Plug('brianaung/compl.nvim')\\n+vim.call('plug#end')\\n+\\n+vim.cmd('silent! colorscheme seoul256')\\n+vim.cmd('silent! set background=dark')\\n+vim.cmd('silent! set cursorcolumn cursorline')\\n+vim.cmd('silent! set number relativenumber')\\n+vim.cmd('silent! set mouse=a')\\n+\\n+vim.keymap.set('n', '\\u003cC-p\\u003e', ':Files\\u003cCR\\u003e', { silent = true})\\n+vim.keymap.set('n', '\\u003cC-f\\u003e', ':Rg\\u003cCR\\u003e', { silent = true})\\n+\\n+vim.keymap.set('n', '[d', vim.diagnostic.goto_prev, { silent = true })\\n+vim.keymap.set('n', ']d', vim.diagnostic.goto_next, { silent = true })\\n+vim.keymap.set('n', '\\u003cleader\\u003ee', vim.diagnostic.open_float, { silent = true })\\n+vim.keymap.set('n', '\\u003cleader\\u003eq', vim.diagnostic.setloclist, { silent = true })\\n+-- Exit terminal mode with ESC\\n+vim.api.nvim_set_keymap('t', '\\u003cESC\\u003e\\u003cESC\\u003e', '\\u003cC-\\\\\\\\\\u003e\\u003cC-n\\u003e', {noremap = true, silent = true })\\n+-- Recommendations from https://github.com/brianaung/compl.nvim\\n+vim.opt.completeopt = { \\\"menuone\\\", \\\"noselect\\\", \\\"noinsert\\\" }\\n+vim.opt.shortmess:append \\\"c\\\"\\n+\\n+local function lsp_format(bufnr)\\n+  if vim.lsp.buf.format then\\n+    vim.lsp.buf.format({ bufnr = bufnr })\\n+  else\\n+    vim.lsp.buf.formatting_sync(nil, 2000)\\n+  end\\n+end\\n+\\n+local function on_attach(_, bufnr)\\n+  vim.bo[bufnr].omnifunc = 'v:lua.vim.lsp.omnifunc'\\n+\\n+  local opts = { silent = true, buffer = bufnr }\\n+  vim.keymap.set('n', 'gd', vim.lsp.buf.definition, opts)\\n+  vim.keymap.set('n', 'gD', vim.lsp.buf.declaration, opts)\\n+  vim.keymap.set('n', 'gi', vim.lsp.buf.implementation, opts)\\n+  vim.keymap.set('n', 'gr', vim.lsp.buf.references, opts)\\n+  vim.keymap.set('n', 'K', vim.lsp.buf.hover, opts)\\n+  vim.keymap.set('n', '\\u003cleader\\u003ern', vim.lsp.buf.rename, opts)\\n+  vim.keymap.set('n', '\\u003cleader\\u003eca', vim.lsp.buf.code_action, opts)\\n+  vim.keymap.set('n', '\\u003cleader\\u003ef', function()\\n+    lsp_format(bufnr)\\n+  end, opts)\\n+end\\n+\\n+vim.lsp.config('gopls', {\\n+  on_attach = on_attach,\\n+  settings = {\\n+    gopls = {\\n+      gofumpt = true,\\n+    },\\n+  },\\n+})\\n+\\n+-- Format Go files on save with gofumpt\\n+vim.api.nvim_create_autocmd('BufWritePre', {\\n+  pattern = '*.go',\\n+  callback = function()\\n+    lsp_format(vim.api.nvim_get_current_buf())\\n+  end,\\n+})\\n+\\n+-- Go test helpers\\n+local function go_test_at_cursor()\\n+  -- Find the test function name at cursor\\n+  local line = vim.fn.line('.')\\n+  local lines = vim.api.nvim_buf_get_lines(0, 0, line, false)\\n+\\n+  local test_name = nil\\n+  for i = #lines, 1, -1 do\\n+    local match = string.match(lines[i], '^func%s+(Test%w+)')\\n+    if match then\\n+      test_name = match\\n+      break\\n+    end\\n+  end\\n+\\n+  if test_name then\\n+    local dir = vim.fn.expand('%:p:h')\\n+    vim.cmd('botright split | terminal cd ' .. vim.fn.shellescape(dir) .. ' \\u0026\\u0026 go test -v -run ^' .. test_name .. '$')\\n+  else\\n+    vim.notify('No test function found at cursor', vim.log.levels.WARN)\\n+  end\\n+end\\n+\\n+local function go_test_file()\\n+  local dir = vim.fn.expand('%:p:h')\\n+  local file = vim.fn.expand('%:t:r') -- Get filename without extension\\n+  vim.cmd('botright split | terminal cd ' .. vim.fn.shellescape(dir) .. ' \\u0026\\u0026 go test -v -run ' .. file)\\n+end\\n+\\n+local function go_test_package()\\n+  local dir = vim.fn.expand('%:p:h')\\n+  vim.cmd('botright split | terminal cd ' .. vim.fn.shellescape(dir) .. ' \\u0026\\u0026 go test -v ./...')\\n+end\\n+\\n+-- Go test commands\\n+vim.api.nvim_create_user_command('GoTestAtCursor', go_test_at_cursor, {})\\n+vim.api.nvim_create_user_command('GoTestFile', go_test_file, {})\\n+vim.api.nvim_create_user_command('GoTestPackage', go_test_package, {})\\n+\\n+-- Go test keybindings (only in Go files)\\n+vim.api.nvim_create_autocmd('FileType', {\\n+  pattern = 'go',\\n+  callback = function()\\n+    local opts = { silent = true, buffer = true }\\n+    vim.keymap.set('n', '\\u003cleader\\u003etc', go_test_at_cursor, opts)\\n+    vim.keymap.set('n', '\\u003cleader\\u003etf', go_test_file, opts)\\n+    vim.keymap.set('n', '\\u003cleader\\u003etp', go_test_package, opts)\\n+  end,\\n+})\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/config-nvim-init.lua\",\"old_path\":\"files/config-nvim-init.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/gitconfig\\n@@ -0,0 +1,49 @@\\n+[user]\\n+\\temail = public@cianjohnston.ie\\n+\\tname = Cian Johnston\\n+\\tsigningkey = /home/cian/.ssh/id_ed25519.pub\\n+[core]\\n+\\texcludesfile = \\\"~/.gitignore\\\"\\n+[commit]\\n+\\tgpgsign = true\\n+[credential]\\n+\\thelper = cache\\n+\\ttimeout = 86400\\n+[url \\\"git@github.com:\\\"]\\n+\\tinsteadOf = https://github.com/\\n+\\n+[aliases]\\n+\\tadd = \\\"add -p\\\" #ALWAYS\\n+\\tas = \\\"! git rebase -i --autosquash master\\\"\\n+\\tdiff-file-last-commit = \\\"!f() { \\\\\\n+            project_root_dir=$(git rev-parse --show-toplevel); \\\\\\n+            echo finding full file path of $1 in $project_root_dir; \\\\\\n+            filepath=$(find $project_root_dir -type f -name $1); \\\\\\n+            echo full file path $filepath; \\\\\\n+            last_modified_commit_hash=$(git rev-list -1 HEAD $filepath); \\\\\\n+            echo last commit file modified $last_modified_commit_hash; \\\\\\n+            git difftool $last_modified_commit_hash^ $filepath; \\\\\\n+       }; f\\\"\\n+        f = \\\"! git c --fixup $(git log --pretty='%H' -1 --invert-grep --grep 'fixup! ')\\\"\\n+\\tls = \\\"!git for-each-ref --sort='-authordate' --format='%(authordate)%09%(objectname:short)%09%(refname)' refs/heads | sed -e 's-refs/heads/--'\\\"\\n+\\tl = log --pretty=format:\\\"%C(yellow)%h\\\\\\\\ %ad%Cred%d\\\\\\\\ %Creset%s%Cblue\\\\\\\\ [%cn]\\\" --decorate --date=short\\n+\\tpu = \\\"pull --all --rebase\\\"\\n+\\treleasenotes = \\\"! set -u; f() { git log  --no-merges --pretty=format:\\\\\\\"- %h %s\\\\\\\" $1; }; f\\\"\\n+\\tsubup = \\\"submodule update --recursive\\\"\\n+\\tsup = \\\"submodule update --recursive\\\"\\n+\\n+[rebase]\\n+\\tautosquash = true\\n+[rerere]\\n+        enabled = true\\n+[pull]\\n+\\tff = only\\n+[gpg]\\n+\\tformat = ssh\\n+[gpg \\\"ssh\\\"]\\n+\\tdefaultKeyCommand = ssh-add -L\\n+\\tallowedSignersFile = ~/.ssh/allowed_signers\\n+[safe]\\n+\\tdirectory = \\\"*\\\"\\n+[tag]\\n+\\tgpgsign = true\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/gitconfig\",\"old_path\":\"files/gitconfig\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\