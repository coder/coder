ithub.com/tweag/nickel.git\\n+--- ```\\n+---\\n+--- Nix:\\n+--- ```sh\\n+--- cd nickel\\n+--- nix-env -f . -i\\n+--- ```\\n+---\\n+--- cargo:\\n+--- ```sh\\n+--- cd nickel/lsp/nls\\n+--- cargo install --path .\\n+--- ```\\n+---\\n+--- In order to have lspconfig detect Nickel filetypes (a prerequisite for autostarting a server),\\n+--- install the [Nickel vim plugin](https://github.com/nickel-lang/vim-nickel).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nls' },\\n+  filetypes = { 'ncl', 'nickel' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nickel_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nickel_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nil_ls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/oxalica/nil\\n+---\\n+--- A new language server for Nix Expression Language.\\n+---\\n+--- If you are using Nix with Flakes support, run `nix profile install github:oxalica/nil` to install.\\n+--- Check the repository README for more information.\\n+---\\n+--- _See an example config at https://github.com/oxalica/nil/blob/main/dev/nvim-lsp.nix._\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nil' },\\n+  filetypes = { 'nix' },\\n+  root_markers = { 'flake.nix', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nil_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nil_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nim_langserver.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- https://github.com/nim-lang/langserver\\n+---\\n+---\\n+--- `nim-langserver` can be installed via the `nimble` package manager:\\n+--- ```sh\\n+--- nimble install nimlangserver\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nimlangserver' },\\n+  filetypes = { 'nim' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(\\n+      util.root_pattern '*.nimble'(fname) or vim.fs.dirname(vim.fs.find('.git', { path = fname, upward = true })[1])\\n+    )\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nim_langserver.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nim_langserver.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nimls.lua\\n@@ -0,0 +1,23 @@\\n+---@brief\\n+---\\n+--- https://github.com/PMunch/nimlsp\\n+---\\n+--- `nimlsp` can be installed via the `nimble` package manager:\\n+---\\n+--- ```sh\\n+--- nimble install nimlsp\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nimlsp' },\\n+  filetypes = { 'nim' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(\\n+      util.root_pattern '*.nimble'(fname) or vim.fs.dirname(vim.fs.find('.git', { path = fname, upward = true })[1])\\n+    )\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nimls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nimls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nixd.lua\\n@@ -0,0 +1,15 @@\\n+---@brief\\n+---\\n+--- https://github.com/nix-community/nixd\\n+---\\n+--- Nix language server, based on nix libraries.\\n+---\\n+--- If you are using Nix with Flakes support, run `nix profile install github:nix-community/nixd` to install.\\n+--- Check the repository README for more information.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nixd' },\\n+  filetypes = { 'nix' },\\n+  root_markers = { 'flake.nix', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nixd.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nixd.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nomad_lsp.lua\\n@@ -0,0 +1,34 @@\\n+---@brief\\n+---\\n+--- https://github.com/juliosueiras/nomad-lsp\\n+---\\n+--- Written in Go, compilation is needed for `nomad_lsp` to be used. Please see the [original repository](https://github.com/juliosuieras/nomad-lsp).\\n+---\\n+--- Add the executable to your system or vim PATH and it will be set to go.\\n+---\\n+--- No configuration option is needed unless you choose not to add `nomad-lsp` executable to the PATH. You should know what you are doing if you choose so.\\n+---\\n+--- ```lua\\n+--- vim.lsp.enable('nomad_lsp')\\n+--- ```\\n+---\\n+--- However, a `hcl.nomad` or `nomad` filetype should be defined.\\n+---\\n+--- Description of your jobs should be written in `.nomad` files for the LSP client to configure the server's `root_dir` configuration option.\\n+\\n+local util = require 'lspconfig.util'\\n+local bin_name = 'nomad-lsp'\\n+\\n+if vim.fn.has 'win32' == 1 then\\n+  bin_name = bin_name .. '.exe'\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { bin_name },\\n+  filetypes = { 'hcl.nomad', 'nomad' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern '*.nomad'(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nomad_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nomad_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ntt.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://github.com/nokia/ntt\\n+--- Installation instructions can be found [here](https://github.com/nokia/ntt#Install).\\n+--- Can be configured by passing a \\\"settings\\\" object to vim.lsp.config('ntt'):\\n+--- ```lua\\n+--- vim.lsp.config('ntt', {\\n+---     settings = {\\n+---       ntt = {\\n+---       }\\n+---     }\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ntt', 'langserver' },\\n+  filetypes = { 'ttcn' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ntt.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ntt.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nushell.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/nushell/nushell\\n+---\\n+--- Nushell built-in language server.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nu', '--lsp' },\\n+  filetypes = { 'nu' },\\n+  root_dir = function(bufnr, on_dir)\\n+    on_dir(vim.fs.root(bufnr, { '.git' }) or vim.fs.dirname(vim.api.nvim_buf_get_name(bufnr)))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nushell.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nushell.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/nxls.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/nrwl/nx-console/tree/master/apps/nxls\\n+---\\n+--- nxls, a language server for Nx Workspaces\\n+---\\n+--- `nxls` can be installed via `npm`:\\n+--- ```sh\\n+--- npm i -g nxls\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'nxls', '--stdio' },\\n+  filetypes = { 'json', 'jsonc' },\\n+  root_markers = { 'nx.json', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/nxls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/nxls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ocamlls.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- https://github.com/ocaml-lsp/ocaml-language-server\\n+---\\n+--- `ocaml-language-server` can be installed via `npm`\\n+--- ```sh\\n+--- npm install -g ocaml-language-server\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ocaml-language-server', '--stdio' },\\n+  filetypes = { 'ocaml', 'reason' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.opam', 'esy.json', 'package.json')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ocamlls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ocamlls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ocamllsp.lua\\n@@ -0,0 +1,36 @@\\n+---@brief\\n+---\\n+--- https://github.com/ocaml/ocaml-lsp\\n+---\\n+--- `ocaml-lsp` can be installed as described in [installation guide](https://github.com/ocaml/ocaml-lsp#installation).\\n+---\\n+--- To install the lsp server in a particular opam switch:\\n+--- ```sh\\n+--- opam install ocaml-lsp-server\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+local language_id_of = {\\n+  menhir = 'ocaml.menhir',\\n+  ocaml = 'ocaml',\\n+  ocamlinterface = 'ocaml.interface',\\n+  ocamllex = 'ocaml.ocamllex',\\n+  reason = 'reason',\\n+  dune = 'dune',\\n+}\\n+\\n+local get_language_id = function(_, ftype)\\n+  return language_id_of[ftype]\\n+end\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ocamllsp' },\\n+  filetypes = { 'ocaml', 'menhir', 'ocamlinterface', 'ocamllex', 'reason', 'dune' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.opam', 'esy.json', 'package.json', '.git', 'dune-project', 'dune-workspace')(fname))\\n+  end,\\n+  get_language_id = get_language_id,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ocamllsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ocamllsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/ols.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/DanielGavin/ols\\n+---\\n+--- `Odin Language Server`.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'ols' },\\n+  filetypes = { 'odin' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('ols.json', '.git', '*.odin')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/ols.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/ols.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/omnisharp.lua\\n@@ -0,0 +1,92 @@\\n+---@brief\\n+---\\n+--- https://github.com/omnisharp/omnisharp-roslyn\\n+--- OmniSharp server based on Roslyn workspaces\\n+---\\n+--- `omnisharp-roslyn` can be installed by downloading and extracting a release from [here](https://github.com/OmniSharp/omnisharp-roslyn/releases).\\n+--- OmniSharp can also be built from source by following the instructions [here](https://github.com/omnisharp/omnisharp-roslyn#downloading-omnisharp).\\n+---\\n+--- OmniSharp requires the [dotnet-sdk](https://dotnet.microsoft.com/download) to be installed.\\n+---\\n+--- **By default, omnisharp-roslyn doesn't have a `cmd` set.** This is because nvim-lspconfig does not make assumptions about your path. You must add the following to your init.vim or init.lua to set `cmd` to the absolute path ($HOME and ~ are not expanded) of the unzipped run script or binary.\\n+---\\n+--- For `go_to_definition` to work fully, extended `textDocument/definition` handler is needed, for example see [omnisharp-extended-lsp.nvim](https://github.com/Hoffs/omnisharp-extended-lsp.nvim)\\n+---\\n+---\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    vim.fn.executable('OmniSharp') == 1 and 'OmniSharp' or 'omnisharp',\\n+    '-z', -- https://github.com/OmniSharp/omnisharp-vscode/pull/4300\\n+    '--hostPID',\\n+    tostring(vim.fn.getpid()),\\n+    'DotNet:enablePackageRestore=false',\\n+    '--encoding',\\n+    'utf-8',\\n+    '--languageserver',\\n+  },\\n+  filetypes = { 'cs', 'vb' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(\\n+      util.root_pattern '*.sln'(fname)\\n+        or util.root_pattern '*.csproj'(fname)\\n+        or util.root_pattern 'omnisharp.json'(fname)\\n+        or util.root_pattern 'function.json'(fname)\\n+    )\\n+  end,\\n+  init_options = {},\\n+  capabilities = {\\n+    workspace = {\\n+      workspaceFolders = false, -- https://github.com/OmniSharp/omnisharp-roslyn/issues/909\\n+    },\\n+  },\\n+  settings = {\\n+    FormattingOptions = {\\n+      -- Enables support for reading code style, naming convention and analyzer\\n+      -- settings from .editorconfig.\\n+      EnableEditorConfigSupport = true,\\n+      -- Specifies whether 'using' directives should be grouped and sorted during\\n+      -- document formatting.\\n+      OrganizeImports = nil,\\n+    },\\n+    MsBuild = {\\n+      -- If true, MSBuild project system will only load projects for files that\\n+      -- were opened in the editor. This setting is useful for big C# codebases\\n+      -- and allows for faster initialization of code navigation features only\\n+      -- for projects that are relevant to code that is being edited. With this\\n+      -- setting enabled OmniSharp may load fewer projects and may thus display\\n+      -- incomplete reference lists for symbols.\\n+      LoadProjectsOnDemand = nil,\\n+    },\\n+    RoslynExtensionsOptions = {\\n+      -- Enables support for roslyn analyzers, code fixes and rulesets.\\n+      EnableAnalyzersSupport = nil,\\n+      -- Enables support for showing unimported types and unimported extension\\n+      -- methods in completion lists. When committed, the appropriate using\\n+      -- directive will be added at the top of the current file. This option can\\n+      -- have a negative impact on initial completion responsiveness,\\n+      -- particularly for the first few completion sessions after opening a\\n+      -- solution.\\n+      EnableImportCompletion = nil,\\n+      -- Only run analyzers against open files when 'enableRoslynAnalyzers' is\\n+      -- true\\n+      AnalyzeOpenDocumentsOnly = nil,\\n+      -- Enables the possibility to see the code in external nuget dependencies\\n+      EnableDecompilationSupport = nil,\\n+    },\\n+    RenameOptions = {\\n+      RenameInComments = nil,\\n+      RenameOverloads = nil,\\n+      RenameInStrings = nil,\\n+    },\\n+    Sdk = {\\n+      -- Specifies whether to include preview versions of the .NET SDK when\\n+      -- determining which version to use for project loading.\\n+      IncludePrereleases = true,\\n+    },\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/omnisharp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/omnisharp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/opencl_ls.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/Galarius/opencl-language-server\\n+---\\n+--- Build instructions can be found [here](https://github.com/Galarius/opencl-language-server/blob/main/_dev/build.md).\\n+---\\n+--- Prebuilt binaries are available for Linux, macOS and Windows [here](https://github.com/Galarius/opencl-language-server/releases).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'opencl-language-server' },\\n+  filetypes = { 'opencl' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/opencl_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/opencl_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/openscad_ls.lua\\n@@ -0,0 +1,27 @@\\n+---@brief\\n+---\\n+--- https://github.com/dzhu/openscad-language-server\\n+---\\n+--- A Language Server Protocol server for OpenSCAD\\n+---\\n+--- You can build and install `openscad-language-server` binary with `cargo`:\\n+--- ```sh\\n+--- cargo install openscad-language-server\\n+--- ```\\n+---\\n+--- Vim does not have built-in syntax for the `openscad` filetype currently.\\n+---\\n+--- This can be added via an autocmd:\\n+---\\n+--- ```lua\\n+--- vim.cmd [[ autocmd BufRead,BufNewFile *.scad set filetype=openscad ]]\\n+--- ```\\n+---\\n+--- or by installing a filetype plugin such as https://github.com/sirtaj/vim-openscad\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'openscad-language-server' },\\n+  filetypes = { 'openscad' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/openscad_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/openscad_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/openscad_lsp.lua\\n@@ -0,0 +1,17 @@\\n+---@brief\\n+---\\n+--- https://github.com/Leathong/openscad-LSP\\n+---\\n+--- A Language Server Protocol server for OpenSCAD\\n+---\\n+--- You can build and install `openscad-lsp` binary with `cargo`:\\n+--- ```sh\\n+--- cargo install openscad-lsp\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'openscad-lsp', '--stdio' },\\n+  filetypes = { 'openscad' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/openscad_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/openscad_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/oxlint.lua\\n@@ -0,0 +1,31 @@\\n+--- @brief\\n+---\\n+--- https://github.com/oxc-project/oxc\\n+---\\n+--- `oxc` is a linter / formatter for JavaScript / Typescript supporting over 500 rules from ESLint and its popular plugins\\n+--- It can be installed via `npm`:\\n+---\\n+--- ```sh\\n+--- npm i -g oxlint\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'oxc_language_server' },\\n+  filetypes = {\\n+    'javascript',\\n+    'javascriptreact',\\n+    'javascript.jsx',\\n+    'typescript',\\n+    'typescriptreact',\\n+    'typescript.tsx',\\n+  },\\n+  workspace_required = true,\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    local root_markers = util.insert_package_json({ '.oxlintrc.json' }, 'oxlint', fname)\\n+    on_dir(vim.fs.dirname(vim.fs.find(root_markers, { path = fname, upward = true })[1]))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/oxlint.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/oxlint.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pact_ls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/kadena-io/pact-lsp\\n+---\\n+--- The Pact language server\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pact-lsp' },\\n+  filetypes = { 'pact' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pact_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pact_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pasls.lua\\n@@ -0,0 +1,28 @@\\n+---@brief\\n+---\\n+--- https://github.com/genericptr/pascal-language-server\\n+---\\n+--- An LSP server implementation for Pascal variants that are supported by Free Pascal, including Object Pascal. It uses CodeTools from Lazarus as backend.\\n+---\\n+--- First set `cmd` to the Pascal lsp binary.\\n+---\\n+--- Customization options are passed to pasls as environment variables for example in your `.bashrc`:\\n+--- ```bash\\n+--- export FPCDIR='/usr/lib/fpc/src'      # FPC source directory (This is the only required option for the server to work).\\n+--- export PP='/usr/lib/fpc/3.2.2/ppcx64' # Path to the Free Pascal compiler executable.\\n+--- export LAZARUSDIR='/usr/lib/lazarus'  # Path to the Lazarus sources.\\n+--- export FPCTARGET=''                   # Target operating system for cross compiling.\\n+--- export FPCTARGETCPU='x86_64'          # Target CPU for cross compiling.\\n+--- ```\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pasls' },\\n+  filetypes = { 'pascal' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.lpi', '*.lpk', '.git')(fname))\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pasls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pasls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pbls.lua\\n@@ -0,0 +1,19 @@\\n+---@brief\\n+---\\n+--- https://git.sr.ht/~rrc/pbls\\n+---\\n+--- Prerequisites: Ensure protoc is on your $PATH.\\n+---\\n+--- `pbls` can be installed via `cargo install`:\\n+--- ```sh\\n+--- cargo install --git https://git.sr.ht/~rrc/pbls\\n+--- ```\\n+---\\n+--- pbls is a Language Server for protobuf\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pbls' },\\n+  filetypes = { 'proto' },\\n+  root_markers = { '.pbls.toml', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pbls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pbls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/perlls.lua\\n@@ -0,0 +1,30 @@\\n+---@brief\\n+---\\n+--- https://github.com/richterger/Perl-LanguageServer/tree/master/clients/vscode/perl\\n+---\\n+--- `Perl-LanguageServer`, a language server for Perl.\\n+---\\n+--- To use the language server, ensure that you have Perl::LanguageServer installed and perl command is on your path.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = {\\n+    'perl',\\n+    '-MPerl::LanguageServer',\\n+    '-e',\\n+    'Perl::LanguageServer::run',\\n+    '--',\\n+    '--port 13603',\\n+    '--nostdio 0',\\n+  },\\n+  settings = {\\n+    perl = {\\n+      perlCmd = 'perl',\\n+      perlInc = ' ',\\n+      fileFilter = { '.pm', '.pl' },\\n+      ignoreDirs = '.git',\\n+    },\\n+  },\\n+  filetypes = { 'perl' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/perlls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/perlls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/perlnavigator.lua\\n@@ -0,0 +1,28 @@\\n+---@brief\\n+---\\n+--- https://github.com/bscan/PerlNavigator\\n+---\\n+--- A Perl language server. It can be installed via npm:\\n+---\\n+--- ```sh\\n+--- npm i -g perlnavigator-server\\n+--- ```\\n+---\\n+--- At minimum, you will need `perl` in your path. If you want to use a non-standard `perl` you will need to set your configuration like so:\\n+--- ```lua\\n+--- settings = {\\n+---   perlnavigator = {\\n+---     perlPath = '/some/odd/location/my-perl'\\n+---   }\\n+--- }\\n+--- ```\\n+---\\n+--- The `contributes.configuration.properties` section of `perlnavigator`'s `package.json` has all available configuration settings. All\\n+--- settings have a reasonable default, but, at minimum, you may want to point `perlnavigator` at your `perltidy` and `perlcritic` configurations.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'perlnavigator' },\\n+  filetypes = { 'perl' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/perlnavigator.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/perlnavigator.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/perlpls.lua\\n@@ -0,0 +1,21 @@\\n+---@brief\\n+---\\n+--- https://github.com/FractalBoy/perl-language-server\\n+--- https://metacpan.org/pod/PLS\\n+---\\n+--- `PLS`, another language server for Perl.\\n+---\\n+--- To use the language server, ensure that you have PLS installed and that it is in your path\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pls' },\\n+  settings = {\\n+    perl = {\\n+      perlcritic = { enabled = false },\\n+      syntax = { enabled = true },\\n+    },\\n+  },\\n+  filetypes = { 'perl' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/perlpls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/perlpls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pest_ls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/pest-parser/pest-ide-tools\\n+---\\n+--- Language server for pest grammars.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pest-language-server' },\\n+  filetypes = { 'pest' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pest_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pest_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/phan.lua\\n@@ -0,0 +1,32 @@\\n+---@brief\\n+---\\n+--- https://github.com/phan/phan\\n+---\\n+--- Installation: https://github.com/phan/phan#getting-started\\n+\\n+local cmd = {\\n+  'phan',\\n+  '-m',\\n+  'json',\\n+  '--no-color',\\n+  '--no-progress-bar',\\n+  '-x',\\n+  '-u',\\n+  '-S',\\n+  '--language-server-on-stdin',\\n+  '--allow-polyfill-parser',\\n+}\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = cmd,\\n+  filetypes = { 'php' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    local cwd = assert(vim.uv.cwd())\\n+    local root = vim.fs.root(fname, { 'composer.json', '.git' })\\n+\\n+    -- prefer cwd if root is a descendant\\n+    on_dir(root and vim.fs.relpath(cwd, root) and cwd)\\n+  end,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/phan.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/phan.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/phpactor.lua\\n@@ -0,0 +1,13 @@\\n+---@brief\\n+---\\n+--- https://github.com/phpactor/phpactor\\n+---\\n+--- Installation: https://phpactor.readthedocs.io/en/master/usage/standalone.html#global-installation\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'phpactor', 'language-server' },\\n+  filetypes = { 'php' },\\n+  root_markers = { '.git', 'composer.json', '.phpactor.json', '.phpactor.yml' },\\n+  workspace_required = true,\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/phpactor.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/phpactor.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/phptools.lua\\n@@ -0,0 +1,36 @@\\n+---@brief\\n+---\\n+--- https://www.devsense.com/\\n+---\\n+--- `devsense-php-ls` can be installed via `npm`:\\n+--- ```sh\\n+--- npm install -g devsense-php-ls\\n+--- ```\\n+---\\n+--- ```lua\\n+--- -- See https://www.npmjs.com/package/devsense-php-ls\\n+--- init_options = {\\n+--- }\\n+--- -- See https://docs.devsense.com/vscode/configuration/\\n+--- settings = {\\n+---   php = {\\n+---   };\\n+--- }\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'devsense-php-ls', '--stdio' },\\n+  filetypes = { 'php' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    local cwd = assert(vim.uv.cwd())\\n+    local root = vim.fs.root(fname, { 'composer.json', '.git' })\\n+\\n+    -- prefer cwd if root is a descendant\\n+    on_dir(root and vim.fs.relpath(cwd, root) and cwd)\\n+  end,\\n+  init_options = {\\n+    ['0'] = '{}', --optional premium license validation from https://www.devsense.com/purchase/validation\\n+  },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/phptools.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/phptools.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pico8_ls.lua\\n@@ -0,0 +1,18 @@\\n+---@brief\\n+---\\n+--- https://github.com/japhib/pico8-ls\\n+---\\n+--- Full language support for the PICO-8 dialect of Lua.\\n+\\n+local util = require 'lspconfig.util'\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pico8-ls', '--stdio' },\\n+  filetypes = { 'p8' },\\n+  root_dir = function(bufnr, on_dir)\\n+    local fname = vim.api.nvim_buf_get_name(bufnr)\\n+    on_dir(util.root_pattern('*.p8')(fname))\\n+  end,\\n+  settings = {},\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pico8_ls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pico8_ls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/please.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://github.com/thought-machine/please\\n+---\\n+--- High-performance extensible build system for reproducible multi-language builds.\\n+---\\n+--- The `plz` binary will automatically install the LSP for you on first run\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'plz', 'tool', 'lps' },\\n+  filetypes = { 'bzl' },\\n+  root_markers = { '.plzconfig' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/please.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/please.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/pli.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- `pli_language_server` is a language server for the PL/I language used on IBM SystemZ mainframes.\\n+---\\n+--- To learn how to configure the PL/I language server, see the [PL/I Language Support documentation](https://github.com/zowe/zowe-pli-language-support).\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'pli_language_server' },\\n+  filetypes = { 'pli' },\\n+  root_markers = { '.pliplugin' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/pli.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/pli.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/poryscript_pls.lua\\n@@ -0,0 +1,12 @@\\n+---@brief\\n+---\\n+--- https://github.com/huderlem/poryscript-pls\\n+---\\n+--- Language server for poryscript (a high level scripting language for GBA-era Pokémon decompilation projects)\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'poryscript-pls' },\\n+  filetypes = { 'pory' },\\n+  root_markers = { '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/poryscript_pls.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/poryscript_pls.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/postgres_lsp.lua\\n@@ -0,0 +1,14 @@\\n+---@brief\\n+---\\n+--- https://pgtools.dev\\n+---\\n+--- A collection of language tools and a Language Server Protocol (LSP) implementation for Postgres, focusing on developer experience and reliable SQL tooling.\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'postgrestools', 'lsp-proxy' },\\n+  filetypes = {\\n+    'sql',\\n+  },\\n+  root_markers = { 'postgrestools.jsonc' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/postgres_lsp.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/postgres_lsp.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/powershell_es.lua\\n@@ -0,0 +1,56 @@\\n+--- @brief\\n+---\\n+--- https://github.com/PowerShell/PowerShellEditorServices\\n+---\\n+--- Language server for PowerShell.\\n+---\\n+--- To install, download and extract PowerShellEditorServices.zip\\n+--- from the [releases](https://github.com/PowerShell/PowerShellEditorServices/releases).\\n+--- To configure the language server, set the property `bundle_path` to the root\\n+--- of the extracted PowerShellEditorServices.zip.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('powershell_es', {\\n+---   bundle_path = 'c:/w/PowerShellEditorServices',\\n+--- })\\n+--- ```\\n+---\\n+--- By default the language server is started in `pwsh` (PowerShell Core). This can be changed by specifying `shell`.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('powershell_es', {\\n+---   bundle_path = 'c:/w/PowerShellEditorServices',\\n+---   shell = 'powershell.exe',\\n+--- })\\n+--- ```\\n+---\\n+--- Note that the execution policy needs to be set to `Unrestricted` for the languageserver run under PowerShell\\n+---\\n+--- If necessary, specific `cmd` can be defined instead of `bundle_path`.\\n+--- See [PowerShellEditorServices](https://github.com/PowerShell/PowerShellEditorServices#standard-input-and-output)\\n+--- to learn more.\\n+---\\n+--- ```lua\\n+--- vim.lsp.config('powershell_es', {\\n+---   cmd = {'pwsh', '-NoLogo', '-NoProfile', '-Command', \\\"c:/PSES/Start-EditorServices.ps1 ...\\\"},\\n+--- })\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = function(dispatchers)\\n+    local temp_path = vim.fn.stdpath('cache')\\n+    local bundle_path = vim.lsp.config.powershell_es.bundle_path\\n+\\n+    local shell = vim.lsp.config.powershell_es.shell or 'pwsh'\\n+\\n+    local command_fmt =\\n+      [[\\u0026 '%s/PowerShellEditorServices/Start-EditorServices.ps1' -BundledModulesPath '%s' -LogPath '%s/powershell_es.log' -SessionDetailsPath '%s/powershell_es.session.json' -FeatureFlags @() -AdditionalModules @() -HostName nvim -HostProfileId 0 -HostVersion 1.0.0 -Stdio -LogLevel Normal]]\\n+    local command = command_fmt:format(bundle_path, bundle_path, temp_path, temp_path)\\n+    local cmd = { shell, '-NoLogo', '-NoProfile', '-Command', command }\\n+\\n+    return vim.lsp.rpc.start(cmd, dispatchers)\\n+  end,\\n+  filetypes = { 'ps1' },\\n+  root_markers = { 'PSScriptAnalyzerSettings.psd1', '.git' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/powershell_es.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/powershell_es.lua\",\"a_mode\":\"0\",\"b_mode\":\"100644\",\"new_file\":true,\"renamed_file\":false,\"deleted_file\":false,\"generated_file\":null},{\"diff\":\"--- /dev/null\\n+++ b/files/nvim-lspconfig/lsp/prismals.lua\\n@@ -0,0 +1,20 @@\\n+---@brief\\n+---\\n+--- Language Server for the Prisma JavaScript and TypeScript ORM\\n+---\\n+--- `@prisma/language-server` can be installed via npm\\n+--- ```sh\\n+--- npm install -g @prisma/language-server\\n+--- ```\\n+\\n+---@type vim.lsp.Config\\n+return {\\n+  cmd = { 'prisma-language-server', '--stdio' },\\n+  filetypes = { 'prisma' },\\n+  settings = {\\n+    prisma = {\\n+      prismaFmtBinPath = '',\\n+    },\\n+  },\\n+  root_markers = { '.git', 'package.json' },\\n+}\\n\",\"collapsed\":false,\"too_large\":false,\"new_path\":\"files/nvim-lspconfig/lsp/prismals.lua\",\"old_path\":\"files/nvim-lspconfig/lsp/prismals.lu