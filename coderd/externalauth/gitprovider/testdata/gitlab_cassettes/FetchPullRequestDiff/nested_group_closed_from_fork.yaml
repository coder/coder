            +package gitlab_test
            +
            +import (
            +	"fmt"
            +	"net/http"
            +	"net/http/httptest"
            +	gitlab "gitlab.com/gitlab-org/api/client-go"
            +)
            +
            +func ExampleApplicationsService() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	mux.HandleFunc("/api/v4/applications", func(w http.ResponseWriter, r *http.Request) {
            +		if r.Method == http.MethodPost {
            +			fmt.Fprint(w, `{"id":1,"application_id":"app123","redirect_uri":"http://example.org"}`)
            +			return
            +		}
            +		fmt.Fprint(w, `[{"id":1,"application_id":"app123"}]`)
            +	})
            +
            +	mux.HandleFunc("/api/v4/applications/1", func(w http.ResponseWriter, r *http.Request) {
            +		w.WriteHeader(http.StatusNoContent)
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	opts := &gitlab.CreateApplicationOptions{
            +		Name:        gitlab.Ptr("Travis"),
            +		RedirectURI: gitlab.Ptr("http://example.org"),
            +		Scopes:      gitlab.Ptr("api"),
            +	}
            +	created, _, _ := git.Applications.CreateApplication(opts)
            +	fmt.Printf("Created application ID: %d\n", created.ID)
            +
            +	applications, _, _ := git.Applications.ListApplications(&gitlab.ListApplicationsOptions{})
            +	fmt.Printf("Found %d application(s)\n", len(applications))
            +
            +	resp, _ := git.Applications.DeleteApplication(created.ID)
            +	fmt.Printf("Delete status: %d\n", resp.StatusCode)
            +
            +	// Output:
            +	// Created application ID: 1
            +	// Found 1 application(s)
            +	// Delete status: 204
            +}
