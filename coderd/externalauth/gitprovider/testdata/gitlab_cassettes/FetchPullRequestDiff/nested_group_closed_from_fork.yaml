            +package gitlab_test
            +
            +import (
            +	"fmt"
            +	"net/http"
            +	"net/http/httptest"
            +
            +	gitlab "gitlab.com/gitlab-org/api/client-go"
            +)
            +
            +// Example_basicAuth demonstrates how to create a client with username and password.
            +func Example_basicAuth() {
            +	handler := http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            +		w.Header().Set("Content-Type", "application/json")
            +
            +		// Handle OAuth token request first
            +		if r.URL.Path == "/oauth/token" {
            +			fmt.Fprint(w, `{"access_token":"mock-token","token_type":"Bearer"}`)
            +			return
            +		}
            +
            +		// Handle projects list request
            +		if r.URL.Path == "/api/v4/projects" {
            +			fmt.Fprint(w, `[{"id":1,"name":"project1"},{"id":2,"name":"project2"}]`)
            +			return
            +		}
            +
            +		http.NotFound(w, r)
            +	})
            +
            +	server := httptest.NewServer(handler)
            +	defer server.Close()
            +
            +	git, _ := gitlab.NewBasicAuthClient(
            +		"username",
            +		"password",
            +		gitlab.WithBaseURL(server.URL),
            +	)
            +
            +	projects, _, _ := git.Projects.ListProjects(nil)
            +	fmt.Printf("Found %d projects\n", len(projects))
            +
            +	// Output: Found 2 projects
            +}
