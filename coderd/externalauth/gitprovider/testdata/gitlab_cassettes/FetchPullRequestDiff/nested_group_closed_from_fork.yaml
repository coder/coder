            +
            +func ExampleImportService_bitbucketCloud() {
            +	handler := http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            +		w.Header().Set("Content-Type", "application/json")
            +		fmt.Fprint(w, `{"id":1,"name":"some-repo","path":"some-repo","path_with_namespace":"some-group/some-repo"}`)
            +	})
            +
            +	server := httptest.NewServer(handler)
            +	defer server.Close()
            +
            +	git, err := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +	if err != nil {
            +		log.Fatal(err)
            +	}
            +
            +	cloudOpt := &gitlab.ImportRepositoryFromBitbucketCloudOptions{
            +		BitbucketUsername:    gitlab.Ptr("username"),
            +		BitbucketAppPassword: gitlab.Ptr("password"),
            +		RepoPath:             gitlab.Ptr("some/repo"),
            +		TargetNamespace:      gitlab.Ptr("some-group"),
            +		NewName:              gitlab.Ptr("some-repo"),
            +	}
            +	cloudResp, _, err := git.Import.ImportRepositoryFromBitbucketCloud(cloudOpt)
            +	if err != nil {
            +		log.Fatal(err)
            +	}
            +
            +	if cloudResp != nil {
            +		fmt.Printf("Imported project: %s (ID: %d)\n", cloudResp.Name, cloudResp.ID)
            +	}
            +
            +	// Output: Imported project: some-repo (ID: 1)
            +}
