            +package gitlab_test
            +
            +import (
            +	"fmt"
            +	"net/http"
            +	"net/http/httptest"
            +
            +	gitlab "gitlab.com/gitlab-org/api/client-go"
            +)
            +
            +func ExampleRepositoryFilesService() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	mux.HandleFunc("/api/v4/projects/myname%2Fmyproject/repository/files/file.go", func(w http.ResponseWriter, r *http.Request) {
            +		if r.Method == http.MethodPost {
            +			fmt.Fprint(w, `{"file_path":"file.go","branch":"master"}`)
            +			return
            +		}
            +		if r.Method == "PUT" {
            +			fmt.Fprint(w, `{"file_path":"file.go","branch":"master"}`)
            +			return
            +		}
            +		fmt.Fprint(w, `{"file_path":"file.go","content":"TXkgZmlsZSBjb250ZW50"}`)
            +	})
            +
            +	mux.HandleFunc("/api/v4/projects/myname%2Fmyproject/repository/files/file.go/blame", func(w http.ResponseWriter, r *http.Request) {
            +		fmt.Fprint(w, `[{"lines":["line1"]},{"lines":["line2"]}]`)
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	file, _, _ := git.RepositoryFiles.CreateFile("myname/myproject", "file.go", &gitlab.CreateFileOptions{
            +		Branch:        gitlab.Ptr("master"),
            +		Content:       gitlab.Ptr("My file contents"),
            +		CommitMessage: gitlab.Ptr("Adding a test file"),
            +	})
            +	fmt.Printf("Created: %s\n", file.FilePath)
            +
            +	git.RepositoryFiles.UpdateFile("myname/myproject", file.FilePath, &gitlab.UpdateFileOptions{
            +		Branch:        gitlab.Ptr("master"),
            +		Content:       gitlab.Ptr("My file content"),
            +		CommitMessage: gitlab.Ptr("Fixing typo"),
            +	})
            +
            +	f, _, _ := git.RepositoryFiles.GetFile("myname/myproject", file.FilePath, &gitlab.GetFileOptions{Ref: gitlab.Ptr("master")})
            +	fmt.Printf("Retrieved: %s\n", f.FilePath)
            +
            +	fb, _, _ := git.RepositoryFiles.GetFileBlame("myname/myproject", file.FilePath, &gitlab.GetFileBlameOptions{Ref: gitlab.Ptr("master")})
            +	fmt.Printf("Blame ranges: %d\n", len(fb))
            +
            +	// Output:
            +	// Created: file.go
            +	// Retrieved: file.go
            +	// Blame ranges: 2
            +}
