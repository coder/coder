            +
            +func ExampleMergeRequestsService_autoMerge() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	mux.HandleFunc("/api/v4/projects/example%2Fexample/merge_requests", func(w http.ResponseWriter, r *http.Request) {
            +		fmt.Fprint(w, `{"id":1,"iid":1,"title":"New MergeRequest"}`)
            +	})
            +
            +	mux.HandleFunc("/api/v4/projects/example%2Fexample/merge_requests/1/merge", func(w http.ResponseWriter, r *http.Request) {
            +		fmt.Fprint(w, `{"id":1,"iid":1,"state":"merged"}`)
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	mr, _, _ := git.MergeRequests.CreateMergeRequest("example/example", &gitlab.CreateMergeRequestOptions{
            +		SourceBranch: gitlab.Ptr("my-topic-branch"),
            +		TargetBranch: gitlab.Ptr("main"),
            +		Title:        gitlab.Ptr("New MergeRequest"),
            +	})
            +	fmt.Printf("Created MR #%d\n", mr.IID)
            +
            +	git.MergeRequests.AcceptMergeRequest("example/example", mr.IID, &gitlab.AcceptMergeRequestOptions{AutoMerge: gitlab.Ptr(true)})
            +	fmt.Println("Auto-merge enabled")
            +
            +	// Output:
            +	// Created MR #1
