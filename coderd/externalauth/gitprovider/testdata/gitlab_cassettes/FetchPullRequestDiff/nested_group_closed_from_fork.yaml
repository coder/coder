            +package gitlab_test
            +
            +import (
            +	"fmt"
            +	"net/http"
            +	"net/http/httptest"
            +	"strings"
            +
            +	gitlab "gitlab.com/gitlab-org/api/client-go"
            +)
            +
            +func ExampleProjectsService() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	// Catch all API requests
            +	mux.HandleFunc("/api/v4/", func(w http.ResponseWriter, r *http.Request) {
            +		// Create project
            +		if r.URL.Path == "/api/v4/projects" && r.Method == http.MethodPost {
            +			fmt.Fprint(w, `{"id":1,"name":"My Project","path_with_namespace":"myname/myproject"}`)
            +			return
            +		}
            +
            +		// Create snippet
            +		if strings.Contains(r.URL.Path, "/snippets") && r.Method == http.MethodPost {
            +			fmt.Fprint(w, `{"id":1,"title":"Dummy Snippet"}`)
            +			return
            +		}
            +
            +		// List snippets - handle both numeric ID and path_with_namespace
            +		if strings.Contains(r.URL.Path, "/snippets") && r.Method == http.MethodGet {
            +			fmt.Fprint(w, `[{"id":1,"title":"Dummy Snippet"}]`)
            +			return
            +		}
            +
            +		w.WriteHeader(http.StatusNotFound)
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	project, _, _ := git.Projects.CreateProject(&gitlab.CreateProjectOptions{
            +		Name:       gitlab.Ptr("My Project"),
            +		Visibility: gitlab.Ptr(gitlab.PublicVisibility),
            +	})
            +	fmt.Printf("Created: %s\n", project.Name)
            +
            +	git.ProjectSnippets.CreateSnippet(project.ID, &gitlab.CreateProjectSnippetOptions{
            +		Title:    gitlab.Ptr("Dummy Snippet"),
            +		FileName: gitlab.Ptr("snippet.go"),
            +		Content:  gitlab.Ptr("package main...."),
            +	})
            +
            +	snippets, _, _ := git.ProjectSnippets.ListSnippets(project.PathWithNamespace, &gitlab.ListProjectSnippetsOptions{})
            +	fmt.Printf("Found %d snippet(s)\n", len(snippets))
            +
            +	// Output:
            +	// Created: My Project
            +	// Found 1 snippet(s)
            +}
