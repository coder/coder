            @@ -0,0 +1,78 @@
            +package gitlab_test
            +
            +import (
            +	"fmt"
            +	"net/http"
            +	"net/http/httptest"
            +
            +	gitlab "gitlab.com/gitlab-org/api/client-go"
            +)
            +
            +func Example_pagination() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	callCount := 0
            +	mux.HandleFunc("/api/v4/projects", func(w http.ResponseWriter, r *http.Request) {
            +		callCount++
            +		if callCount == 1 {
            +			w.Header().Set("X-Next-Page", "2")
            +			fmt.Fprint(w, `[{"id":1,"name":"project1"}]`)
            +		} else {
            +			fmt.Fprint(w, `[{"id":2,"name":"project2"}]`)
            +		}
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	opt := &gitlab.ListProjectsOptions{
            +		ListOptions: gitlab.ListOptions{PerPage: 10, Page: 1},
            +		Owned:       gitlab.Ptr(true),
            +	}
            +
            +	count := 0
            +	for range gitlab.Must(gitlab.Scan2(func(p gitlab.PaginationOptionFunc) ([]*gitlab.Project, *gitlab.Response, error) {
            +		return git.Projects.ListProjects(opt, p)
            +	})) {
            +		count++
            +	}
            +	fmt.Printf("Iterated %d projects\n", count)
            +
            +	// Output: Iterated 2 projects
            +}
            +
            +func Example_keysetPagination() {
            +	mux := http.NewServeMux()
            +	server := httptest.NewServer(mux)
            +	defer server.Close()
            +
            +	callCount := 0
            +	mux.HandleFunc("/api/v4/projects", func(w http.ResponseWriter, r *http.Request) {
            +		callCount++
            +		if callCount == 1 {
            +			w.Header().Set("Link", `<next>; rel="next"`)
            +			fmt.Fprint(w, `[{"id":1,"name":"project1"}]`)
            +		} else {
            +			fmt.Fprint(w, `[{"id":2,"name":"project2"}]`)
            +		}
            +	})
            +
            +	git, _ := gitlab.NewClient("token", gitlab.WithBaseURL(server.URL))
            +
            +	opt := &gitlab.ListProjectsOptions{
            +		ListOptions: gitlab.ListOptions{OrderBy: "id", Pagination: "keyset", PerPage: 5, Sort: "asc"},
            +		Owned:       gitlab.Ptr(true),
            +	}
            +
            +	count := 0
            +	for range gitlab.Must(gitlab.Scan2(func(p gitlab.PaginationOptionFunc) ([]*gitlab.Project, *gitlab.Response, error) {
            +		return git.Projects.ListProjects(opt, p)
            +	})) {
            +		count++
            +	}
            +	fmt.Printf("Iterated %d projects\n", count)
            +
            +	// Output: Iterated 2 projects
            +}
            +
