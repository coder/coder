{{/* This template is used by application handlers to render allowing oauth2
links */}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application {{.AppName}}</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background-color: #05060b;
        color: #f7f9fd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        font-size: 16px;
        height: 100%;
      }

      .container {
        --side-padding: 24px;
        width: 100%;
        max-width: calc(320px + var(--side-padding) * 2);
        padding: 0 var(--side-padding);
        text-align: center;
      }

      .icons-container {
        align-items: center;
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }

      .coder-svg,
      .app-icon {
        width: 80px;
      }

      .connect-symbol {
        font-size: 40px;
        font-weight: bold;
        margin: 0 10px;
      }

      h1 {
        font-weight: 700;
        font-size: 36px;
        margin-bottom: 8px;
      }

      p,
      li {
        color: #b2bfd7;
        line-height: 140%;
      }

      .user-name {
        font-weight: bold;
      }

      .button-group {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 24px;
      }

      .button-group a,
      .button-group button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 16px;
        border-radius: 4px;
        border: 1px solid #2c3854;
        text-decoration: none;
        background: none;
        font-size: inherit;
        color: inherit;
        width: 200px;
        height: 42px;
        cursor: pointer;
      }

      .button-group a:hover,
      .button-group button:hover {
        border-color: hsl(222, 31%, 40%);
      }

      .button-group .primary-button {
        background-color: #2c3854;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icons-container">
        {{- if .AppIcon }}
        <img class="app-icon" src="{{ .AppIcon }}" />
        <div class="connect-symbol">+</div>
        {{end}}
        <img class="coder-svg" src="/icon/coder.svg" alt="Coder" />
      </div>
      <h1>Authorize {{ .AppName }}</h1>
      <p>
        Allow {{ .AppName }} to have full access to your
        <span class="user-name">{{ .Username }}</span> account?
      </p>
      <div class="button-group">
        <form id="allow-form" method="POST" style="display: inline;">
          <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}" />
          <button type="submit" class="primary-button">Allow</button>
        </form>
        <a id="cancel-link" href="{{ .CancelURI }}">Cancel</a>
      </div>
    </div>
    <script>
      // Opens a popup synchronously inside the user-gesture handler and
      // paints a confirmation message into it, then retargets the form (or
      // cancel link) into it so the browser delivers the authorization code
      // or access_denied error to the client's redirect URI there, then navigate
      // this tab navigates to the dashboard. If the popup is blocked, fall
      // back to the default submission/navigation in the current tab — the
      // OAuth2 callback still fires in that case.
      (function () {
        var dashboardURL = "{{ .DashboardURL }}";
        var popupName = "coder_oauth2_callback";
        var popupFeatures = "popup=yes,width=640,height=720";
        var appName = "{{ .AppName }}";

        var allowForm = document.getElementById("allow-form");
        var cancelLink = document.getElementById("cancel-link");

        function paintPopupMessage(popup, title) {
          try {
            var doc = popup.document;
            doc.title = title;
            doc.body.style.cssText =
              "font-family:sans-serif;background:#05060b;color:#f7f9fd;" +
              "display:flex;align-items:center;justify-content:center;" +
              "height:100vh;margin:0;text-align:center;padding:24px";
            var wrap = doc.createElement("div");
            var h1 = doc.createElement("h1");
            h1.textContent = title;
            h1.style.cssText = "font-size:24px;margin-bottom:8px";
            var p = doc.createElement("p");
            p.textContent = "You can now close this pop-up.";
            p.style.color = "#b2bfd7";
            wrap.appendChild(h1);
            wrap.appendChild(p);
            doc.body.appendChild(wrap);
          } catch (err) {
            // if the popup is in an unexpected state, skip the message
          }
        }

        function gotoDashboard() {
          // Defer so the popup's navigation has kicked off before this tab
          // leaves; otherwise the browser may cancel the popup's in-flight
          // request.
          setTimeout(function () {
            window.location.replace(dashboardURL);
          }, 0);
        }

        allowForm.addEventListener("submit", function (e) {
          var popup = window.open("about:blank", popupName, popupFeatures);
          if (!popup) return;

          e.preventDefault();
          paintPopupMessage(popup, appName + " is authorized.");
          allowForm.target = popupName;
          allowForm.submit();
          gotoDashboard();
        });

        cancelLink.addEventListener("click", function (e) {
          var popup = window.open("about:blank", popupName, popupFeatures);
          if (!popup) return;

          e.preventDefault();
          paintPopupMessage(popup, appName + " authorization was denied.");
          popup.location.href = cancelLink.href;
          gotoDashboard();
        });
      })();
    </script>
  </body>
</html>
