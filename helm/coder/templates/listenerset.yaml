{{- if and .Values.coder.listenerset.enable (empty .Values.coder.listenerset.parentRef) -}}
{{- fail "coder.listenerset.parentRef is required when coder.listenerset.enable=true" -}}
{{- end -}}

{{- if and .Values.coder.listenerset.enable (empty .Values.coder.listenerset.listeners) -}}
{{- fail "coder.listenerset.listeners is required when coder.listenerset.enable=true" -}}
{{- end -}}

{{- if .Values.coder.listenerset.enable -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: coder
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coder.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.coder.listenerset.annotations | nindent 4 }}
spec:
  parentRef:
    {{- with .Values.coder.listenerset.parentRef }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.coder.listenerset.listeners }}
  listeners:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
