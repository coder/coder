name: coder
platform: linux
arch: "${GOARCH}"
version: "${CODER_VERSION}"
version_schema: semver
release: 1

vendor: Coder
homepage: https://coder.com
maintainer: Coder <support@coder.com>
description: |
  Provision development environments with infrastructure with code
license: AGPL-3.0
suggests:
  - postgresql

scripts:
  preinstall: preinstall.sh

contents:
  - src: coder
    dst: /usr/bin/coder
  - src: coder.env
    dst: /etc/coder.d/coder.env
    type: "config|noreplace"
  - src: coder.service
    dst: /usr/lib/systemd/system/coder.service
    packager: deb
  - src: coder.service
    dst: /usr/lib/systemd/system/coder.service
    packager: rpm
  - src: coder-workspace-proxy.service
    dst: /usr/lib/systemd/system/coder-workspace-proxy.service
    packager: deb
  - src: coder-workspace-proxy.service
    dst: /usr/lib/systemd/system/coder-workspace-proxy.service
    packager: rpm
  - src: coder.openrc
    dst: /etc/init.d/coder
    file_info:
      mode: 0755
    packager: apk
  - src: coder-workspace-proxy.openrc
    dst: /etc/init.d/coder-workspace-proxy
    file_info:
      mode: 0755
    packager: apk
